<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Attendant Dashboard · Omocreations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --sidebar-width: 280px; --header-height: 70px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 40; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    
    .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .quick-action { background: white; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .quick-action:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(255,77,166,0.1); border-color: var(--primary); }
    .quick-action i { font-size: 1.8rem; color: var(--primary); margin-bottom: 10px; }
    .quick-action h4 { font-size: 0.85rem; color: var(--dark); }
    
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    
    .announcement-card { background: var(--primary-soft); border-radius: 14px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
    .announcement-card h4 { font-size: 0.9rem; margin-bottom: 6px; }
    
    .task-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .task-info h4 { font-size: 0.9rem; margin-bottom: 4px; }
    
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-info { background: rgba(59,130,246,0.1); color: var(--info); }
    
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; background: white; border: 1px solid rgba(0,0,0,0.08); display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-success { background: var(--success); color: white; }
    .btn-sm { padding: 5px 12px; font-size: 0.7rem; }
    
    .empty-state { text-align: center; padding: 30px; color: var(--gray); }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 500px; width: 100%; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; }
    
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); }
    .toast.show { transform: translateX(0); }
    
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .quick-actions { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">✨</div><div class="logo-text"><span>Omo</span>creations</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item" onclick="window.location.href='attendant-profile.html'"><i class="fas fa-user"></i><span>Profile</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Attendant Dashboard</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  
  <div class="content-wrapper">
    
    <div class="quick-actions">
      <div class="quick-action" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><h4>New Sale</h4></div>
      <div class="quick-action" onclick="openAssignTaskModal()"><i class="fas fa-plus-circle"></i><h4>Assign Task</h4></div>
      <div class="quick-action" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><h4>Inventory</h4></div>
      <div class="quick-action" onclick="window.location.href='purchases.html'"><i class="fas fa-cart-plus"></i><h4>Purchase</h4></div>
    </div>
    
    <!-- ANNOUNCEMENTS -->
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-bullhorn"></i> Announcements</h3></div>
      <div id="announcementsList" style="max-height: 200px; overflow-y: auto;">
        <div class="empty-state"><i class="fas fa-bullhorn"></i><p>Loading...</p></div>
      </div>
    </div>
    
    <!-- STAFF & TASKS -->
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-users"></i> Staff & Tasks</h3></div>
      <div id="staffTasksList">
        <div class="empty-state"><i class="fas fa-users"></i><p>Loading staff...</p></div>
      </div>
    </div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Assign Task</h3><button onclick="hideModal()">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, allStaff = [], unsubscribes = [];

  function formatDate(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';
  function showModal(title, content) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').style.display = 'flex'; }

  function loadDashboard() {
    if (!currentUser) return;
    unsubscribes.forEach(u => u()); unsubscribes = [];
    
    console.log('🔄 Loading attendant dashboard');
    
    // User data
    unsubscribes.push(onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
      if (!snap.exists()) return;
      userData = snap.data();
      document.getElementById('userAvatar').textContent = (userData.fullName || 'A').charAt(0).toUpperCase();
      document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'Attendant';
    }));
    
    // ANNOUNCEMENTS - For attendants
    const announcementQuery = query(
      collection(db, 'announcements'), 
      where('target', 'in', ['all', 'attendants']),
      orderBy('createdAt', 'desc')
    );
    
    unsubscribes.push(onSnapshot(announcementQuery, (snap) => {
      console.log('📢 Announcements:', snap.size);
      const div = document.getElementById('announcementsList');
      if (snap.empty) { div.innerHTML = '<div class="empty-state">No announcements</div>'; return; }
      div.innerHTML = snap.docs.map(d => {
        const a = d.data();
        return `<div class="announcement-card"><h4>📢 ${a.title}</h4><p>${a.message}</p><div style="font-size:0.7rem;color:var(--gray);margin-top:8px;">From: ${a.sentByName} · ${formatDate(a.createdAt)}</div></div>`;
      }).join('');
    }));
    
    // STAFF LIST
    const staffQuery = query(collection(db, 'users'), where('role', '==', 'staff'), where('status', '==', 'active'));
    unsubscribes.push(onSnapshot(staffQuery, async (snap) => {
      allStaff = snap.docs.map(d => ({id: d.id, ...d.data()}));
      console.log('👥 Staff loaded:', allStaff.length);
      
      const div = document.getElementById('staffTasksList');
      if (allStaff.length === 0) { div.innerHTML = '<div class="empty-state">No staff members</div>'; return; }
      
      let html = '';
      
      for (const staff of allStaff) {
        // Get tasks for this staff
        const tasksSnap = await getDocs(query(collection(db, 'tasks'), where('assignedTo', '==', staff.id)));
        const tasks = tasksSnap.docs.map(d => ({id: d.id, ...d.data()}));
        
        const pending = tasks.filter(t => t.status === 'pending').length;
        const inProgress = tasks.filter(t => t.status === 'in_progress').length;
        const completed = tasks.filter(t => t.status === 'completed').length;
        
        html += `<div style="margin-bottom:20px;padding:15px;background:var(--gray-light);border-radius:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h4 style="font-size:1rem;">${staff.fullName}</h4>
            <div style="display:flex;gap:10px;">
              <span class="badge badge-warning">Pending: ${pending}</span>
              <span class="badge badge-info">Progress: ${inProgress}</span>
              <span class="badge badge-success">Done: ${completed}</span>
            </div>
          </div>`;
        
        // Show in-progress tasks that can be submitted
        const inProgressTasks = tasks.filter(t => t.status === 'in_progress');
        if (inProgressTasks.length > 0) {
          html += '<div style="margin-top:10px;">';
          inProgressTasks.forEach(t => {
            html += `<div class="task-item">
              <div class="task-info"><h4>${t.title}</h4><p>Started: ${formatDate(t.startedAt)} · Deadline: ${formatDate(t.deadline)}</p></div>
              <button class="btn btn-success btn-sm" onclick="submitForStaff('${staff.id}', '${t.id}')">Submit</button>
            </div>`;
          });
          html += '</div>';
        }
        
        html += '</div>';
      }
      
      div.innerHTML = html;
    }));
  }

  window.openAssignTaskModal = () => {
    let opts = '';
    allStaff.forEach(s => opts += `<option value="${s.id}">${s.fullName}</option>`);
    showModal('Assign Task', `
      <div class="form-group"><label>Task Title</label><input class="form-control" id="taskTitle" placeholder="e.g., Restock shelves"></div>
      <div class="form-group"><label>Assign To</label><select class="form-control" id="taskAssignee">${opts}</select></div>
      <div class="form-group"><label>Deadline</label><input type="datetime-local" class="form-control" id="taskDeadline"></div>
      <button class="btn btn-primary" onclick="createTask()">Assign Task</button>
      <p style="font-size:0.75rem;color:var(--gray);margin-top:15px;"><i class="fas fa-info-circle"></i> Task will be created as PENDING. Staff must press START to begin working.</p>
    `);
  };

  window.createTask = async () => {
    const title = document.getElementById('taskTitle')?.value.trim();
    const assignee = document.getElementById('taskAssignee')?.value;
    const deadline = document.getElementById('taskDeadline')?.value;
    
    if (!title || !assignee || !deadline) { showToast('All fields required', 'error'); return; }
    
    // Create task with status 'pending' - WILL NOT SHOW until staff clicks START
    await addDoc(collection(db, 'tasks'), {
      title,
      assignedTo: assignee,
      assignedBy: currentUser.uid,
      assignedByName: userData.fullName,
      deadline: new Date(deadline),
      status: 'pending',  // IMPORTANT: Starts as pending, staff must click START
      pointsValue: 5,
      createdAt: serverTimestamp()
    });
    
    // Notify staff
    await addDoc(collection(db, 'notifications'), {
      userId: assignee,
      type: 'task_assigned',
      title: 'New Task Assigned',
      message: `${title}. Click START when you begin working.`,
      isRead: false,
      createdAt: serverTimestamp()
    });
    
    console.log('✅ Task created with status: pending');
    showToast('Task assigned! Staff will see it in their "Available to Start" section.', 'success');
    hideModal();
  };

  window.submitForStaff = async (staffId, taskId) => {
    const taskRef = doc(db, 'tasks', taskId);
    const taskSnap = await getDoc(taskRef);
    const task = taskSnap.data();
    const early = new Date() <= task.deadline.toDate();
    const points = early ? 5 : -5;
    
    await updateDoc(taskRef, { 
      status: 'completed', 
      submittedAt: serverTimestamp(), 
      submittedBy: currentUser.uid, 
      pointsEarned: points 
    });
    
    await updateDoc(doc(db, 'users', staffId), { 
      totalPoints: increment(points), 
      tasksCompleted: increment(1) 
    });
    
    await addDoc(collection(db, 'coin_transactions'), { 
      userId: staffId, points, reason: task.title, createdAt: serverTimestamp() 
    });
    
    showToast(`Task submitted! ${points>0?'+':''}${points} points`, 'success');
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    const userSnap = await getDoc(doc(db, 'users', user.uid));
    if (!userSnap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; }
    userData = userSnap.data();
    if (userData.role !== 'attendant' && userData.role !== 'attendant_chief') { window.location.href = 'auth.html'; return; }
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    loadDashboard();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
  window.addEventListener('beforeunload', () => unsubscribes.forEach(u => u()));
</script>
</body>
</html>
