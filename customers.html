<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Customers · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 64px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; min-height: 100vh; width: 100%; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
    .sidebar-overlay.active { display: block; }
    .sidebar { width: 280px; background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.active { transform: translateX(0); }
    .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
    .logo-text { font-size: 1.2rem; font-weight: 700; }
    .logo-text span { color: var(--primary); }
    .sidebar-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.3rem; cursor: pointer; padding: 8px; }
    .sidebar-nav { padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; text-align: left; }
    .nav-item i { width: 22px; font-size: 1.1rem; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 16px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: auto; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
    .user-details h4 { font-size: 0.9rem; font-weight: 600; }
    .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { min-height: 100vh; width: 100%; }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 40; }
    .top-bar-left { display: flex; align-items: center; gap: 16px; }
    .menu-toggle { background: none; border: none; font-size: 1.3rem; color: var(--gray); cursor: pointer; padding: 8px; }
    .page-title { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.8rem; font-weight: 600; background: var(--primary-soft); padding: 8px 14px; border-radius: 30px; border: none; cursor: pointer; }
    .content-wrapper { padding: 16px; max-width: 1400px; margin: 0 auto; }
    @media (min-width: 768px) { .content-wrapper { padding: 24px; } .page-title { font-size: 1.4rem; } }
    .stats-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
    @media (min-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    .stat-card { background: white; padding: 18px 16px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.7rem; color: var(--gray); font-weight: 600; text-transform: uppercase; }
    .stat-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1rem; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--dark); }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-wrapper { flex: 1; min-width: 180px; position: relative; }
    .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .search-input { width: 100%; padding: 10px 14px 10px 40px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.8rem; outline: none; }
    .panel { background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .panel-header h3 { font-size: 1rem; font-weight: 700; color: var(--dark); }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 0.8rem; }
    .data-table th { text-align: left; padding: 12px 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-pending { background: rgba(107,114,128,0.1); color: var(--gray); }
    .btn { padding: 8px 14px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 5px 12px; font-size: 0.65rem; }
    .btn-success { background: var(--success); color: white; }
    .empty-state { text-align: center; padding: 30px; color: var(--gray); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal { background: white; border-radius: 24px; padding: 24px; max-width: 460px; width: 100%; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 11px 14px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 12px; font-size: 0.85rem; outline: none; }
    .toast-container { position: fixed; bottom: 16px; right: 16px; left: 16px; z-index: 9999; }
    @media (min-width: 480px) { .toast-container { left: auto; } }
    .toast { background: white; padding: 12px 16px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 10px; transform: translateY(100px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 8px; }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><div class="sidebar-brand"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div><button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">U</div><div class="user-details"><h4 id="userName">Loading...</h4><p id="userRole">•••</p></div></div></div>
</aside>
<main class="main-content">
  <header class="top-bar"><div class="top-bar-left"><button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button><h1 class="page-title">Customer Records</h1></div><div class="top-bar-right"><button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Dashboard</button></div></header>
  <div class="content-wrapper">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Total Customers</span><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-value" id="totalCustomers">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Total Revenue</span><div class="stat-icon"><i class="fas fa-naira-sign"></i></div></div><div class="stat-value" id="totalRevenue">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Month</span><div class="stat-icon"><i class="fas fa-calendar"></i></div></div><div class="stat-value" id="monthRevenue">₦0</div></div>
    </div>
    <div class="filter-bar">
      <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search by name or phone..."></div>
      <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> Export</button>
    </div>
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-list"></i> Customer List</h3><div><button class="btn btn-outline btn-sm" id="refreshBtn"><i class="fas fa-sync-alt"></i></button><button class="btn btn-primary btn-sm" id="addCustomerBtn"><i class="fas fa-plus"></i> Add Customer</button></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Birthday</th><th>Total Spent</th><th>Last Purchase</th><th>Status</th><th>Actions</th></tr></thead><tbody id="customersTable"></tbody></table></div>
    </div>
  </div>
</main>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" id="modalClose">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribe = null, allCustomers = [];
  function formatDate(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type = 'success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => { t.classList.remove('show'); t.remove(); }, 4000); }
  function showModal(title, content) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').style.display = 'flex'; }
  function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  function filterAndRender() {
    let filtered = [...allCustomers]; const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(c => (c.fullName||'').toLowerCase().includes(search) || (c.phone||'').includes(search));
    const tbody = document.getElementById('customersTable'); tbody.innerHTML = '';
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">No customers found</div></td></tr>'; return; }
    filtered.forEach(c => { tbody.innerHTML += `<tr><td>${c.fullName||'-'}</td><td>${c.phone||'-'}</td><td>${c.email||'-'}</td><td>${c.birthday||'-'}</td><td>${formatCurrency(c.totalSpent||0)}</td><td>${formatDate(c.lastPurchase)}</td><td><span class="badge badge-${c.status==='approved'?'success':'pending'}">${c.status||'pending'}</span></td><td style="display:flex;gap:5px;"><button class="btn btn-sm btn-outline" onclick="window.viewCustomer('${c.id}')"><i class="fas fa-eye"></i></button>${c.status==='pending'&&(userData?.role==='admin'||userData?.role==='super_admin')?`<button class="btn btn-sm btn-success" onclick="window.approveCustomer('${c.id}')">Approve</button>`:''}</td></tr>`; });
    document.getElementById('totalCustomers').textContent = allCustomers.length;
    const total = allCustomers.reduce((s, c) => s + (c.totalSpent||0), 0); document.getElementById('totalRevenue').textContent = formatCurrency(total);
    const now = new Date(); const month = now.getMonth(); const year = now.getFullYear(); let monthTotal = 0;
    allCustomers.forEach(c => { if (c.purchases) { c.purchases.forEach(p => { const d = p.date?.toDate(); if (d && d.getMonth()===month && d.getFullYear()===year) monthTotal += p.amount||0; }); } });
    document.getElementById('monthRevenue').textContent = formatCurrency(monthTotal);
  }
  function loadCustomers() { if (unsubscribe) unsubscribe(); const q = query(collection(db, 'customers'), orderBy('createdAt', 'desc')); unsubscribe = onSnapshot(q, (snap) => { allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() })); filterAndRender(); }); }
  window.viewCustomer = (id) => { const c = allCustomers.find(x => x.id === id); if (!c) return; let html = `<p><strong>${c.fullName}</strong></p><p>📞 ${c.phone||'-'}</p><p>📧 ${c.email||'-'}</p><p>🎂 ${c.birthday||'-'}</p><p>💰 Total Spent: ${formatCurrency(c.totalSpent||0)}</p><h4 style="margin:15px 0 10px;">Purchase History</h4>`; if (c.purchases?.length) { html += '<table style="width:100%;"><tr><th>Date</th><th>Items</th><th>Amount</th></tr>'; c.purchases.forEach(p => { html += `<tr><td>${formatDate(p.date)}</td><td>${p.items||'-'}</td><td>${formatCurrency(p.amount)}</td></tr>`; }); html += '</table>'; } else { html += '<p>No purchases yet</p>'; } showModal('Customer Details', html); };
  window.approveCustomer = async (id) => { await updateDoc(doc(db, 'customers', id), { status: 'approved', approvedBy: currentUser.uid, approvedAt: serverTimestamp() }); await logAudit('approve_customer', `Approved customer`); showToast('Customer approved', 'success'); };
  window.addCustomer = () => { showModal('Add Customer', `<div class="form-group"><label>Full Name *</label><input class="form-control" id="custName"></div><div class="form-group"><label>Phone *</label><input class="form-control" id="custPhone"></div><div class="form-group"><label>Email</label><input type="email" class="form-control" id="custEmail"></div><div class="form-group"><label>Birthday</label><input type="date" class="form-control" id="custBirthday"></div><button class="btn btn-primary" onclick="window.saveCustomer()">Save Customer</button>`); };
  window.saveCustomer = async () => { const name = document.getElementById('custName').value; const phone = document.getElementById('custPhone').value; if (!name || !phone) { showToast('Name and phone required', 'error'); return; } await addDoc(collection(db, 'customers'), { fullName: name, phone, email: document.getElementById('custEmail').value, birthday: document.getElementById('custBirthday').value, totalSpent: 0, status: (userData?.role==='admin'||userData?.role==='super_admin')?'approved':'pending', createdBy: currentUser.uid, createdAt: serverTimestamp() }); await logAudit('add_customer', `Added ${name}`); showToast('Customer added', 'success'); hideModal(); };
  document.getElementById('exportBtn').addEventListener('click', () => { const csv = [['Name','Phone','Email','Birthday','Total Spent','Status'].join(',')]; allCustomers.forEach(c => csv.push([c.fullName,c.phone,c.email,c.birthday,c.totalSpent,c.status].map(v => `"${v||''}"`).join(','))); const blob = new Blob([csv.join('\n')], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Exported', 'success'); });
  function setupSidebar(role) { const nav = document.getElementById('sidebarNav'); nav.innerHTML = `<button class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>${role==='admin'||role==='super_admin'?'<button class="nav-item" onclick="window.location.href=\'staff-management.html\'"><i class="fas fa-users-cog"></i><span>Staff</span></button>':''}<button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button><button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button><button class="nav-item active"><i class="fas fa-users"></i><span>Customers</span></button><button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>`; document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; }); }
  onAuthStateChanged(auth, async (user) => { if (!user) { window.location.href = 'auth.html'; return; } currentUser = user; const userSnap = await getDoc(doc(db, 'users', user.uid)); if (!userSnap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; } userData = userSnap.data(); document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User'; document.getElementById('userRole').textContent = userData.role?.replace('_', ' ') || 'Staff'; document.getElementById('userAvatar').textContent = (userData.fullName || 'U').charAt(0).toUpperCase(); setupSidebar(userData.role); loadCustomers(); });
  const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebarOverlay');
  document.getElementById('menuToggle').addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
  document.getElementById('sidebarClose').addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
  overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
  document.getElementById('modalClose').addEventListener('click', hideModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) hideModal(); });
  document.getElementById('refreshBtn').addEventListener('click', loadCustomers);
  document.getElementById('addCustomerBtn').addEventListener('click', () => window.addCustomer());
  document.getElementById('searchInput').addEventListener('input', filterAndRender);
  window.viewCustomer = viewCustomer; window.approveCustomer = approveCustomer; window.addCustomer = addCustomer; window.saveCustomer = saveCustomer;
</script>
</body>
</html>
