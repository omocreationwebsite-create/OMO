<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Customers · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 70px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; font-weight: 600; }
    .stat-icon { width: 40px; height: 40px; border-radius: 14px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; }
    .search-wrapper { flex: 1; position: relative; }
    .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .search-input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; outline: none; }
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .data-table th { text-align: left; padding: 14px 10px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    .badge { padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-pending { background: rgba(107,114,128,0.1); color: var(--gray); }
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 6px 12px; }
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; }
    .form-control:focus { border-color: var(--primary); }
    .pin-input-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .pin-input { width: 55px; height: 65px; text-align: center; font-size: 1.8rem; font-weight: 700; border: 2px solid rgba(255,77,166,0.2); border-radius: 14px; outline: none; }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item active"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item" onclick="window.location.href='tasks.html'"><i class="fas fa-clipboard-list"></i><span>Tasks</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Customer Records</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Total Customers</span><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-value" id="totalCustomers">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Total Revenue</span><div class="stat-icon"><i class="fas fa-naira-sign"></i></div></div><div class="stat-value" id="totalRevenue">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Month</span><div class="stat-icon"><i class="fas fa-calendar"></i></div></div><div class="stat-value" id="monthRevenue">₦0</div></div>
    </div>
    
    <div class="filter-bar">
      <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search by name or phone..."></div>
      <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> Export</button>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-list"></i> Customer List</h3><div><button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button><button class="btn btn-primary btn-sm" onclick="openAddCustomerModal()"><i class="fas fa-plus"></i> Add Customer</button></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Birthday</th><th>Total Spent</th><th>Last Purchase</th><th>Status</th><th>Actions</th></tr></thead><tbody id="customersTable"></tbody></table></div>
    </div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="hideModal()">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allCustomers = [];

  function formatDate(d) { if (!d) return '-'; return d.toDate().toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';

  function showPinModal(title, action, onSuccess) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalContent').innerHTML = `<p style="text-align:center;margin-bottom:20px;">Enter PIN to ${action}</p><div class="pin-input-container"><input type="password" maxlength="1" class="pin-input" id="pin1"><input type="password" maxlength="1" class="pin-input" id="pin2"><input type="password" maxlength="1" class="pin-input" id="pin3"><input type="password" maxlength="1" class="pin-input" id="pin4"></div><button class="btn btn-primary" id="verifyPinBtn" style="width:100%;">Verify</button>`;
    document.getElementById('modalOverlay').style.display = 'flex'; document.getElementById('pin1').focus();
    document.querySelectorAll('.pin-input').forEach((inp,i,arr)=>inp.addEventListener('input',e=>{if(e.target.value&&i<arr.length-1)arr[i+1].focus();}));
    document.getElementById('verifyPinBtn').onclick=()=>{if(['pin1','pin2','pin3','pin4'].map(id=>document.getElementById(id).value).join('')===(userData?.attendantPin||'1234')){hideModal();onSuccess();}else{showToast('Invalid PIN','error');}};
  }

  function renderCustomers() {
    let filtered = [...allCustomers];
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(c => (c.fullName||'').toLowerCase().includes(search) || (c.phone||'').includes(search));
    
    document.getElementById('totalCustomers').textContent = allCustomers.length;
    const total = allCustomers.reduce((s,c) => s + (c.totalSpent||0), 0); document.getElementById('totalRevenue').textContent = formatCurrency(total);
    const now = new Date(); let month = 0; allCustomers.forEach(c => { if (c.lastPurchase) { const d = c.lastPurchase.toDate(); if (d.getMonth()===now.getMonth()) month += c.totalSpent||0; } }); document.getElementById('monthRevenue').textContent = formatCurrency(month);
    
    const tbody = document.getElementById('customersTable'); tbody.innerHTML = '';
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">No customers found</div></td></tr>'; return; }
    filtered.forEach(c => { tbody.innerHTML += `<tr><td>${c.fullName||'-'}</td><td>${c.phone||'-'}</td><td>${c.email||'-'}</td><td>${c.birthday||'-'}</td><td>${formatCurrency(c.totalSpent)}</td><td>${formatDate(c.lastPurchase)}</td><td><span class="badge badge-${c.status==='approved'?'success':'pending'}">${c.status||'pending'}</span></td><td><button class="btn btn-sm btn-outline" onclick="viewCustomer('${c.id}')"><i class="fas fa-eye"></i></button></td></tr>`; });
  }

  function loadCustomers() { unsubscribes.forEach(u => u()); unsubscribes = []; unsubscribes.push(onSnapshot(query(collection(db, 'customers'), orderBy('createdAt', 'desc')), snap => { allCustomers = snap.docs.map(d => ({id:d.id, ...d.data()})); renderCustomers(); })); }

  window.viewCustomer = (id) => { const c = allCustomers.find(x => x.id === id); if(!c) return; let html = `<p><strong>${c.fullName}</strong></p><p>📞 ${c.phone||'-'}</p><p>📧 ${c.email||'-'}</p><p>🎂 ${c.birthday||'-'}</p><p>💰 Total Spent: ${formatCurrency(c.totalSpent||0)}</p><h4 style="margin:15px 0 10px;">Purchase History</h4>`; if(c.purchases?.length){html+='<table style="width:100%;"><tr><th>Date</th><th>Items</th><th>Amount</th></tr>'; c.purchases.forEach(p=>{html+=`<tr><td>${formatDate(p.date)}</td><td>${p.items||'-'}</td><td>${formatCurrency(p.amount)}</td></tr>`;}); html+='</table>';}else{html+='<p>No purchases yet</p>';} document.getElementById('modalTitle').textContent='Customer Details'; document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').style.display='flex'; };

  window.openAddCustomerModal = () => { document.getElementById('modalTitle').textContent = 'Add Customer'; document.getElementById('modalContent').innerHTML = `<div class="form-group"><label>Full Name *</label><input class="form-control" id="custName"></div><div class="form-group"><label>Phone *</label><input class="form-control" id="custPhone"></div><div class="form-group"><label>Email</label><input type="email" class="form-control" id="custEmail"></div><div class="form-group"><label>Birthday</label><input type="date" class="form-control" id="custBirthday"></div><button class="btn btn-primary" onclick="addCustomer()">Add Customer (Pending Approval)</button>`; document.getElementById('modalOverlay').style.display = 'flex'; };
  window.addCustomer = () => { const name = document.getElementById('custName')?.value; const phone = document.getElementById('custPhone')?.value; if(!name||!phone) { showToast('Name and phone required', 'error'); return; } showPinModal('Add Customer', 'add customer', async () => { await addDoc(collection(db, 'customers'), { fullName: name, phone, email: document.getElementById('custEmail')?.value||'', birthday: document.getElementById('custBirthday')?.value||'', totalSpent: 0, status: 'pending', createdBy: currentUser.uid, createdByName: userData.fullName, createdAt: serverTimestamp() }); await logAudit('add_customer', `Added ${name}`); showToast('Customer added, pending approval', 'success'); hideModal(); }); };

  window.refreshData = () => loadCustomers();

  document.getElementById('exportBtn').addEventListener('click', () => { const csv = ['Name,Phone,Email,Birthday,Total Spent,Status'].concat(allCustomers.map(c => `"${c.fullName||''}","${c.phone||''}","${c.email||''}","${c.birthday||''}",${c.totalSpent||0},${c.status}`)).join('\n'); const b = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Exported', 'success'); });
  document.getElementById('searchInput').addEventListener('input', renderCustomers);

  onAuthStateChanged(auth, async (u) => { if (!u) { window.location.href = 'auth.html'; return; } currentUser = u; const snap = await getDoc(doc(db, 'users', u.uid)); if (!snap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; } userData = snap.data(); if (userData.status !== 'active') { await signOut(auth); window.location.href = 'auth.html'; return; } document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User'; document.getElementById('userRole').textContent = userData.role?.replace('_',' ') || 'Staff'; document.getElementById('userAvatar').textContent = (userData.fullName||'U').charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadCustomers(); });
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
</script>
</body>
</html>
