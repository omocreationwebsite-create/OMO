<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Sales · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 64px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; min-height: 100vh; width: 100%; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
    .sidebar-overlay.active { display: block; }
    .sidebar { width: 280px; background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.active { transform: translateX(0); }
    .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
    .logo-text { font-size: 1.2rem; font-weight: 700; }
    .logo-text span { color: var(--primary); }
    .sidebar-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.3rem; cursor: pointer; padding: 8px; }
    .sidebar-nav { padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; text-align: left; }
    .nav-item i { width: 22px; font-size: 1.1rem; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 16px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: auto; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
    .user-details h4 { font-size: 0.9rem; font-weight: 600; }
    .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { min-height: 100vh; width: 100%; }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 40; }
    .top-bar-left { display: flex; align-items: center; gap: 16px; }
    .menu-toggle { background: none; border: none; font-size: 1.3rem; color: var(--gray); cursor: pointer; padding: 8px; }
    .page-title { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--primary); font-size: 0.8rem; font-weight: 600; background: var(--primary-soft); padding: 8px 14px; border-radius: 30px; border: none; cursor: pointer; }
    .content-wrapper { padding: 16px; max-width: 1400px; margin: 0 auto; }
    @media (min-width: 768px) { .content-wrapper { padding: 24px; } .page-title { font-size: 1.4rem; } }
    .stats-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
    @media (min-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: white; padding: 18px 16px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.7rem; color: var(--gray); font-weight: 600; text-transform: uppercase; }
    .stat-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1rem; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--dark); }
    .panel { background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .panel-header h3 { font-size: 1rem; font-weight: 700; color: var(--dark); }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 0.8rem; }
    .data-table th { text-align: left; padding: 12px 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .btn { padding: 8px 14px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 5px 12px; font-size: 0.65rem; }
    .empty-state { text-align: center; padding: 30px; color: var(--gray); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal { background: white; border-radius: 24px; padding: 24px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 11px 14px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 12px; font-size: 0.85rem; outline: none; }
    .toast-container { position: fixed; bottom: 16px; right: 16px; left: 16px; z-index: 9999; }
    @media (min-width: 480px) { .toast-container { left: auto; } }
    .toast { background: white; padding: 12px 16px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 10px; transform: translateY(100px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 8px; }
    .toast.show { transform: translateY(0); }
    .payment-methods { display: flex; gap: 10px; margin-top: 5px; }
    .payment-method { flex: 1; text-align: center; padding: 10px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 12px; cursor: pointer; }
    .payment-method.selected { border-color: var(--primary); background: var(--primary-soft); }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><div class="sidebar-brand"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div><button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">U</div><div class="user-details"><h4 id="userName">Loading...</h4><p id="userRole">•••</p></div></div></div>
</aside>
<main class="main-content">
  <header class="top-bar"><div class="top-bar-left"><button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button><h1 class="page-title">Sales & Transactions</h1></div><div class="top-bar-right"><button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Dashboard</button></div></header>
  <div class="content-wrapper">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Today's Sales</span><div class="stat-icon"><i class="fas fa-calendar-day"></i></div></div><div class="stat-value" id="todaySales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Week</span><div class="stat-icon"><i class="fas fa-calendar-week"></i></div></div><div class="stat-value" id="weekSales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Month</span><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div></div><div class="stat-value" id="monthSales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Transactions</span><div class="stat-icon"><i class="fas fa-receipt"></i></div></div><div class="stat-value" id="totalTransactions">0</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-history"></i> Recent Sales</h3><div><button class="btn btn-outline btn-sm" id="refreshBtn"><i class="fas fa-sync-alt"></i></button><button class="btn btn-primary btn-sm" id="newSaleBtn"><i class="fas fa-plus"></i> New Sale</button></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Time</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Attendant</th></tr></thead><tbody id="salesTable"></tbody></table></div>
    </div>
  </div>
</main>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" id="modalClose">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, where, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribe = null, allSales = [], selectedPayment = 'cash';
  function formatTime(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type = 'success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => { t.classList.remove('show'); t.remove(); }, 4000); }
  function showModal(title, content) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').style.display = 'flex'; }
  function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  function updateStats() {
    const today = new Date().toISOString().split('T')[0]; let todayTotal = 0, weekTotal = 0, monthTotal = 0;
    const now = new Date(); const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    allSales.forEach(s => { const d = s.createdAt?.toDate(); if (d) { if (d.toISOString().split('T')[0] === today) todayTotal += s.totalAmount||0; if (d >= weekStart) weekTotal += s.totalAmount||0; if (d.getMonth() === now.getMonth()) monthTotal += s.totalAmount||0; } });
    document.getElementById('todaySales').textContent = formatCurrency(todayTotal);
    document.getElementById('weekSales').textContent = formatCurrency(weekTotal);
    document.getElementById('monthSales').textContent = formatCurrency(monthTotal);
    document.getElementById('totalTransactions').textContent = allSales.length;
  }
  function renderSales() {
    const tbody = document.getElementById('salesTable'); tbody.innerHTML = '';
    if (allSales.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No sales yet</div></td></tr>'; return; }
    allSales.slice(0, 20).forEach(s => { tbody.innerHTML += `<tr><td>${formatTime(s.createdAt)}</td><td>${s.customerName||'Walk-in'}</td><td>${s.items?.length||0} items</td><td>${formatCurrency(s.totalAmount)}</td><td>${s.paymentMethod}</td><td>${s.attendantName||'-'}</td></tr>`; });
    updateStats();
  }
  function loadSales() { if (unsubscribe) unsubscribe(); const q = query(collection(db, 'sales'), orderBy('createdAt', 'desc'), limit(50)); unsubscribe = onSnapshot(q, (snap) => { allSales = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderSales(); }); }
  window.newSale = () => {
    Promise.all([getDocs(collection(db, 'stock_items')), getDocs(collection(db, 'customers'))]).then(([stockSnap, custSnap]) => {
      let stockOpts = '', custOpts = '<option value="">Walk-in Customer</option>';
      stockSnap.forEach(d => { const i = d.data(); stockOpts += `<option value="${d.id}" data-name="${i.name}" data-price="${i.unitPrice||0}" data-stock="${i.quantityAvailable||0}">${i.name} (₦${i.unitPrice||0}, Stock: ${i.quantityAvailable||0})</option>`; });
      custSnap.forEach(d => { const c = d.data(); custOpts += `<option value="${d.id}" data-name="${c.fullName}">${c.fullName} (${c.phone||'-'})</option>`; });
      showModal('New Sale', `
        <div class="form-group"><label>Customer</label><select class="form-control" id="saleCustomer">${custOpts}</select></div>
        <div id="saleItems"><div class="form-group" style="display:flex;gap:10px;"><select class="form-control item-select">${stockOpts}</select><input type="number" class="form-control item-qty" placeholder="Qty" value="1" style="width:70px;"></div></div>
        <button type="button" class="btn btn-outline btn-sm" onclick="window.addSaleItem()"><i class="fas fa-plus"></i> Add Item</button>
        <div class="form-group"><label>Payment Method</label><div class="payment-methods"><div class="payment-method selected" data-method="cash">💵 Cash</div><div class="payment-method" data-method="transfer">🏦 Transfer</div><div class="payment-method" data-method="pos">💳 POS</div></div></div>
        <div class="form-group"><label>Transfer Reference (if applicable)</label><input class="form-control" id="transferRef" placeholder="Optional"></div>
        <button class="btn btn-primary" onclick="window.processSale()">Process Sale</button>
      `);
      document.querySelectorAll('.payment-method').forEach(el => el.addEventListener('click', function() { document.querySelectorAll('.payment-method').forEach(x => x.classList.remove('selected')); this.classList.add('selected'); selectedPayment = this.dataset.method; }));
    });
  };
  window.addSaleItem = () => { getDocs(collection(db, 'stock_items')).then(snap => { let opts = ''; snap.forEach(d => { const i = d.data(); opts += `<option value="${d.id}" data-name="${i.name}" data-price="${i.unitPrice||0}">${i.name} (₦${i.unitPrice||0})</option>`; }); const div = document.createElement('div'); div.className = 'form-group'; div.style.display = 'flex'; div.style.gap = '10px'; div.innerHTML = `<select class="form-control item-select">${opts}</select><input type="number" class="form-control item-qty" value="1" style="width:70px;"><button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`; document.getElementById('saleItems').appendChild(div); }); };
  window.processSale = async () => {
    const customerSelect = document.getElementById('saleCustomer'); const customerId = customerSelect.value; const customerName = customerSelect.options[customerSelect.selectedIndex]?.dataset.name || 'Walk-in';
    const items = []; document.querySelectorAll('#saleItems .form-group').forEach(el => { const select = el.querySelector('.item-select'); const qty = el.querySelector('.item-qty'); if (select && qty) { const opt = select.options[select.selectedIndex]; items.push({ id: select.value, name: opt.dataset.name, quantity: parseInt(qty.value) || 1, unitPrice: parseFloat(opt.dataset.price) || 0 }); } });
    if (items.length === 0) { showToast('Add at least one item', 'error'); return; }
    const total = items.reduce((s, i) => s + (i.quantity * i.unitPrice), 0);
    for (const item of items) { const stockRef = doc(db, 'stock_items', item.id); const stockSnap = await getDoc(stockRef); if (stockSnap.exists()) { const current = stockSnap.data().quantityAvailable || 0; const newQty = current - item.quantity; await updateDoc(stockRef, { quantityAvailable: newQty, quantitySold: increment(item.quantity), status: newQty <= 0 ? 'out_of_stock' : newQty <= (stockSnap.data().threshold||10) ? 'low' : 'available' }); } }
    await addDoc(collection(db, 'sales'), { customerId, customerName, items, totalAmount: total, paymentMethod: selectedPayment, transferRef: document.getElementById('transferRef')?.value || null, attendantId: currentUser.uid, attendantName: userData.fullName, createdAt: serverTimestamp() });
    if (customerId) { const custRef = doc(db, 'customers', customerId); await updateDoc(custRef, { totalSpent: increment(total), lastPurchase: serverTimestamp() }); }
    await logAudit('sale', `Sale of ₦${total} to ${customerName}`);
    showToast(`Sale completed: ${formatCurrency(total)}`, 'success'); hideModal();
  };
  function setupSidebar(role) { const nav = document.getElementById('sidebarNav'); nav.innerHTML = `<button class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>${role==='admin'||role==='super_admin'?'<button class="nav-item" onclick="window.location.href=\'staff-management.html\'"><i class="fas fa-users-cog"></i><span>Staff</span></button>':''}<button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button><button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button><button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button><button class="nav-item active"><i class="fas fa-cash-register"></i><span>Sales</span></button><button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>`; document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; }); }
  onAuthStateChanged(auth, async (user) => { if (!user) { window.location.href = 'auth.html'; return; } currentUser = user; const userSnap = await getDoc(doc(db, 'users', user.uid)); if (!userSnap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; } userData = userSnap.data(); document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User'; document.getElementById('userRole').textContent = userData.role?.replace('_', ' ') || 'Staff'; document.getElementById('userAvatar').textContent = (userData.fullName || 'U').charAt(0).toUpperCase(); setupSidebar(userData.role); loadSales(); });
  const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebarOverlay');
  document.getElementById('menuToggle').addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
  document.getElementById('sidebarClose').addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
  overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
  document.getElementById('modalClose').addEventListener('click', hideModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) hideModal(); });
  document.getElementById('refreshBtn').addEventListener('click', loadSales);
  document.getElementById('newSaleBtn').addEventListener('click', () => window.newSale());
  window.newSale = newSale; window.addSaleItem = addSaleItem; window.processSale = processSale;
</script>
</body>
</html>
