<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Sales · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 70px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; font-weight: 600; }
    .stat-icon { width: 40px; height: 40px; border-radius: 14px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .data-table th { text-align: left; padding: 14px 10px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 6px 12px; }
    .btn-success { background: var(--success); color: white; }
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; }
    .form-control:focus { border-color: var(--primary); }
    .payment-methods { display: flex; gap: 10px; margin-top: 5px; }
    .payment-method { flex: 1; text-align: center; padding: 12px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 12px; cursor: pointer; }
    .payment-method.selected { border-color: var(--primary); background: var(--primary-soft); }
    .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .item-row select { flex: 2; } .item-row input { flex: 1; }
    .pin-input-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .pin-input { width: 55px; height: 65px; text-align: center; font-size: 1.8rem; font-weight: 700; border: 2px solid rgba(255,77,166,0.2); border-radius: 14px; outline: none; }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item active"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item" onclick="window.location.href='tasks.html'"><i class="fas fa-clipboard-list"></i><span>Tasks</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Sales & Transactions</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Today's Sales</span><div class="stat-icon"><i class="fas fa-calendar-day"></i></div></div><div class="stat-value" id="todaySales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Week</span><div class="stat-icon"><i class="fas fa-calendar-week"></i></div></div><div class="stat-value" id="weekSales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>This Month</span><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div></div><div class="stat-value" id="monthSales">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Transactions</span><div class="stat-icon"><i class="fas fa-receipt"></i></div></div><div class="stat-value" id="totalTransactions">0</div></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-history"></i> Recent Sales</h3><div><button class="btn btn-outline btn-sm" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button><button class="btn btn-primary btn-sm" onclick="openNewSaleModal()"><i class="fas fa-plus"></i> New Sale</button></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Time</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Attendant</th></tr></thead><tbody id="salesTable"></tbody></table></div>
    </div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="hideModal()">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allSales = [], selectedPayment = 'cash';

  function formatTime(d) { if (!d) return '-'; return d.toDate().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';

  function showPinModal(title, action, onSuccess) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalContent').innerHTML = `<p style="text-align:center;margin-bottom:20px;">Enter PIN to ${action}</p><div class="pin-input-container"><input type="password" maxlength="1" class="pin-input" id="pin1"><input type="password" maxlength="1" class="pin-input" id="pin2"><input type="password" maxlength="1" class="pin-input" id="pin3"><input type="password" maxlength="1" class="pin-input" id="pin4"></div><button class="btn btn-primary" id="verifyPinBtn" style="width:100%;">Verify</button>`;
    document.getElementById('modalOverlay').style.display = 'flex'; document.getElementById('pin1').focus();
    document.querySelectorAll('.pin-input').forEach((inp,i,arr)=>inp.addEventListener('input',e=>{if(e.target.value&&i<arr.length-1)arr[i+1].focus();}));
    document.getElementById('verifyPinBtn').onclick=()=>{if(['pin1','pin2','pin3','pin4'].map(id=>document.getElementById(id).value).join('')===(userData?.attendantPin||'1234')){hideModal();onSuccess();}else{showToast('Invalid PIN','error');}};
  }

  function updateStats() {
    const today = new Date().toISOString().split('T')[0]; let todayTotal = 0, weekTotal = 0, monthTotal = 0;
    const now = new Date(); const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    allSales.forEach(s => { const d = s.createdAt?.toDate(); if (d) { if (d.toISOString().split('T')[0] === today) todayTotal += s.totalAmount||0; if (d >= weekStart) weekTotal += s.totalAmount||0; if (d.getMonth() === now.getMonth()) monthTotal += s.totalAmount||0; } });
    document.getElementById('todaySales').textContent = formatCurrency(todayTotal);
    document.getElementById('weekSales').textContent = formatCurrency(weekTotal);
    document.getElementById('monthSales').textContent = formatCurrency(monthTotal);
    document.getElementById('totalTransactions').textContent = allSales.length;
  }

  function renderSales() {
    const tbody = document.getElementById('salesTable'); tbody.innerHTML = '';
    if (allSales.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No sales yet</div></td></tr>'; return; }
    allSales.slice(0, 20).forEach(s => { tbody.innerHTML += `<tr><td>${formatTime(s.createdAt)}</td><td>${s.customerName||'Walk-in'}</td><td>${s.items?.length||0} items</td><td>${formatCurrency(s.totalAmount)}</td><td>${s.paymentMethod}</td><td>${s.attendantName||'-'}</td></tr>`; });
    updateStats();
  }

  function loadSales() { unsubscribes.forEach(u => u()); unsubscribes = []; unsubscribes.push(onSnapshot(query(collection(db, 'sales'), orderBy('createdAt', 'desc')), snap => { allSales = snap.docs.map(d => ({id:d.id, ...d.data()})); renderSales(); })); }

  window.openNewSaleModal = () => {
    Promise.all([getDocs(collection(db, 'stock_items')), getDocs(collection(db, 'customers'))]).then(([stockSnap, custSnap]) => {
      let stockOpts = '', custOpts = '<option value="">Walk-in Customer</option>';
      stockSnap.forEach(d => { const i = d.data(); if (i.quantityAvailable > 0) stockOpts += `<option value="${d.id}" data-name="${i.name}" data-price="${i.unitPrice||0}">${i.name} (₦${i.unitPrice||0}, Stock: ${i.quantityAvailable})</option>`; });
      custSnap.forEach(d => { const c = d.data(); if (c.status === 'approved') custOpts += `<option value="${d.id}" data-name="${c.fullName}">${c.fullName} (${c.phone||'-'})</option>`; });
      document.getElementById('modalTitle').textContent = 'New Sale';
      document.getElementById('modalContent').innerHTML = `
        <div class="form-group"><label>Customer</label><select class="form-control" id="saleCustomer">${custOpts}</select></div>
        <div id="saleItems"><div class="item-row"><select class="form-control item-select">${stockOpts}</select><input type="number" class="form-control item-qty" value="1"></div></div>
        <button class="btn btn-outline btn-sm" onclick="addSaleItem()"><i class="fas fa-plus"></i> Add Item</button>
        <div class="form-group"><label>Payment Method</label><div class="payment-methods"><div class="payment-method selected" data-method="cash">💵 Cash</div><div class="payment-method" data-method="transfer">🏦 Transfer</div><div class="payment-method" data-method="pos">💳 POS</div></div></div>
        <div class="form-group"><label>Transfer Reference</label><input class="form-control" id="transferRef" placeholder="Optional"></div>
        <button class="btn btn-primary" onclick="processSale()">Process Sale</button>
      `;
      document.querySelectorAll('.payment-method').forEach(el => el.addEventListener('click', function() { document.querySelectorAll('.payment-method').forEach(x => x.classList.remove('selected')); this.classList.add('selected'); selectedPayment = this.dataset.method; }));
      document.getElementById('modalOverlay').style.display = 'flex';
    });
  };

  window.addSaleItem = () => { getDocs(collection(db, 'stock_items')).then(snap => { let opts = ''; snap.forEach(d => { const i = d.data(); if (i.quantityAvailable > 0) opts += `<option value="${d.id}" data-name="${i.name}" data-price="${i.unitPrice||0}">${i.name} (₦${i.unitPrice||0})</option>`; }); const div = document.createElement('div'); div.className = 'item-row'; div.innerHTML = `<select class="form-control item-select">${opts}</select><input type="number" class="form-control item-qty" value="1"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`; document.getElementById('saleItems').appendChild(div); }); };

  window.processSale = () => {
    const custSelect = document.getElementById('saleCustomer'); const customerId = custSelect.value; const customerName = custSelect.options[custSelect.selectedIndex]?.dataset.name || 'Walk-in';
    const items = []; document.querySelectorAll('#saleItems .item-row').forEach(el => { const s = el.querySelector('.item-select'); const q = el.querySelector('.item-qty'); if(s&&q) { const opt = s.options[s.selectedIndex]; items.push({ id: s.value, name: opt.dataset.name, quantity: parseInt(q.value)||1, unitPrice: parseFloat(opt.dataset.price)||0 }); } });
    if (!items.length) { showToast('Add at least one item', 'error'); return; }
    const total = items.reduce((s,i) => s + (i.quantity * i.unitPrice), 0);
    showPinModal('Process Sale', `process sale of ${formatCurrency(total)}`, async () => {
      for (const item of items) { const ref = doc(db, 'stock_items', item.id); const snap = await getDoc(ref); if (snap.exists()) { const cur = snap.data().quantityAvailable || 0; await updateDoc(ref, { quantityAvailable: cur - item.quantity, quantitySold: increment(item.quantity), status: (cur-item.quantity)<=0?'out_of_stock':(cur-item.quantity)<=(snap.data().threshold||10)?'low':'available' }); } }
      await addDoc(collection(db, 'sales'), { customerId, customerName, items, totalAmount: total, paymentMethod: selectedPayment, transferRef: document.getElementById('transferRef')?.value||null, attendantId: currentUser.uid, attendantName: userData.fullName, createdAt: serverTimestamp() });
      if (customerId) { await updateDoc(doc(db, 'customers', customerId), { totalSpent: increment(total), lastPurchase: serverTimestamp() }); }
      await logAudit('sale', `Sale of ${formatCurrency(total)} to ${customerName}`);
      showToast(`Sale completed: ${formatCurrency(total)}`, 'success'); hideModal();
    });
  };

  window.refreshData = () => loadSales();

  onAuthStateChanged(auth, async (u) => { if (!u) { window.location.href = 'auth.html'; return; } currentUser = u; const snap = await getDoc(doc(db, 'users', u.uid)); if (!snap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; } userData = snap.data(); if (userData.status !== 'active') { await signOut(auth); window.location.href = 'auth.html'; return; } document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User'; document.getElementById('userRole').textContent = userData.role?.replace('_',' ') || 'Staff'; document.getElementById('userAvatar').textContent = (userData.fullName||'U').charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadSales(); });
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
</script>
</body>
</html>
