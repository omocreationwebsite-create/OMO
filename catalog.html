<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Catalog Management · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 64px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; background: inherit; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 40; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1400px; }
    
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-select { padding: 10px 16px; border-radius: 40px; border: 1px solid #ddd; font-size: 0.85rem; background: white; }
    
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); transition: transform 0.15s; }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,77,166,0.1); }
    .product-image { width: 100%; aspect-ratio: 1; background: var(--gray-light); display: flex; align-items: center; justify-content: center; position: relative; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-image .no-image { font-size: 3rem; color: var(--gray); }
    .product-info { padding: 16px; }
    .product-name { font-weight: 700; margin-bottom: 4px; color: var(--dark); }
    .product-category { font-size: 0.7rem; color: var(--gray); margin-bottom: 4px; }
    .product-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
    .product-stock { font-size: 0.75rem; color: var(--gray); margin-bottom: 10px; }
    .product-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .btn { padding: 8px 14px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 5px 10px; font-size: 0.65rem; }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; display: inline-block; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-header h3 { font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; }
    .form-control:focus { border-color: var(--primary); }
    textarea.form-control { min-height: 80px; resize: vertical; }
    
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    .empty-state i { font-size: 2.5rem; color: var(--primary-light); margin-bottom: 10px; }
    
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } .product-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item" onclick="window.location.href='tasks.html'"><i class="fas fa-clipboard-list"></i><span>Tasks</span></button>
    <button class="nav-item active"><i class="fas fa-tags"></i><span>Catalog</span></button>
    <button class="nav-item" onclick="window.location.href='orders-admin.html'"><i class="fas fa-truck"></i><span>Orders</span></button>
    <button class="nav-item" onclick="window.location.href='attendant-profile.html'"><i class="fas fa-user"></i><span>Profile</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Catalog Management</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    
    <div class="filter-bar">
      <select class="filter-select" id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="rhinestones">Rhinestones</option><option value="beads">Beads</option>
        <option value="bridal">Bridal</option><option value="paperstones">Paperstones</option><option value="other">Other</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="refreshCatalog()"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="syncFromInventory()"><i class="fas fa-sync"></i> Sync from Inventory</button>
      <span style="margin-left:auto;font-size:0.8rem;color:var(--gray);" id="productCount">0 products</span>
    </div>
    
    <div class="product-grid" id="productGrid">
      <div class="empty-state"><i class="fas fa-box-open"></i><p>No products in catalog. Click "Sync from Inventory" to add products.</p></div>
    </div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Edit Product</h3><button class="modal-close" onclick="hideModal()">&times;</button></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allProducts = [], currentCategory = 'all';

  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';
  function showModal(title, content) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').style.display = 'flex'; }

  function renderProducts() {
    let filtered = [...allProducts];
    if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
    
    document.getElementById('productCount').textContent = `${filtered.length} products`;
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>No products in this category. Click "Sync from Inventory" to add.</p></div>';
      return;
    }
    
    filtered.forEach(p => {
      const imageHtml = p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : '<i class="fas fa-image no-image"></i>';
      grid.innerHTML += `
        <div class="product-card">
          <div class="product-image">${imageHtml}</div>
          <div class="product-info">
            <div class="product-name">${p.name || 'Unnamed'}</div>
            <div class="product-category">${p.category || 'Uncategorized'}</div>
            <div class="product-price">${formatCurrency(p.price)}</div>
            <div class="product-stock">📦 ${p.inStock || 0} in stock</div>
            <div style="margin-bottom:8px;">
              <span class="badge badge-${p.published ? 'success' : 'warning'}">${p.published ? 'Published' : 'Draft'}</span>
              ${p.description ? '<span class="badge" style="background:rgba(59,130,246,0.1);color:#3b82f6;">Has description</span>' : ''}
            </div>
            <div class="product-actions">
              <button class="btn btn-sm btn-outline" onclick="openEditModal('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-sm ${p.published ? 'btn-warning' : 'btn-success'}" onclick="togglePublish('${p.id}')">
                <i class="fas fa-${p.published ? 'eye-slash' : 'eye'}"></i> ${p.published ? 'Unpublish' : 'Publish'}
              </button>
            </div>
          </div>
        </div>
      `;
    });
  }

  function loadProducts() {
    if (unsubscribes.length) unsubscribes.forEach(u => u()); unsubscribes = [];
    unsubscribes.push(onSnapshot(collection(db, 'catalog'), (snap) => {
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProducts();
    }));
  }

  window.openEditModal = (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    
    showModal('Edit Product', `
      <div class="form-group"><label>Product Name</label><input class="form-control" id="editName" value="${p.name || ''}"></div>
      <div class="form-group"><label>Category</label><select class="form-control" id="editCategory">
        <option value="rhinestones" ${p.category==='rhinestones'?'selected':''}>Rhinestones</option>
        <option value="beads" ${p.category==='beads'?'selected':''}>Beads</option>
        <option value="bridal" ${p.category==='bridal'?'selected':''}>Bridal</option>
        <option value="paperstones" ${p.category==='paperstones'?'selected':''}>Paperstones</option>
        <option value="other" ${p.category==='other'?'selected':''}>Other</option>
      </select></div>
      <div class="form-group"><label>Description</label><textarea class="form-control" id="editDesc" placeholder="Describe the product...">${p.description || ''}</textarea></div>
      <div class="form-group"><label>Price (₦)</label><input type="number" class="form-control" id="editPrice" value="${p.price || 0}"></div>
      <div class="form-group"><label>Image URL</label><input class="form-control" id="editImageUrl" placeholder="https://res.cloudinary.com/.../image.jpg" value="${p.imageUrl || ''}"></div>
      <p style="font-size:0.75rem;color:var(--gray);margin-bottom:15px;"><i class="fas fa-info-circle"></i> Upload images to Cloudinary and paste the URL here.</p>
      ${p.imageUrl ? `<div style="margin-bottom:15px;"><img src="${p.imageUrl}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;"></div>` : ''}
      <button class="btn btn-primary" onclick="saveProduct('${id}')"><i class="fas fa-save"></i> Save Changes</button>
    `);
  };

  window.saveProduct = async (id) => {
    try {
      await updateDoc(doc(db, 'catalog', id), {
        name: document.getElementById('editName').value,
        category: document.getElementById('editCategory').value,
        description: document.getElementById('editDesc').value,
        price: parseFloat(document.getElementById('editPrice').value) || 0,
        imageUrl: document.getElementById('editImageUrl').value,
        updatedAt: serverTimestamp()
      });
      showToast('Product updated!', 'success');
      hideModal();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  };

  window.togglePublish = async (id) => {
    const p = allProducts.find(x => x.id === id);
    await updateDoc(doc(db, 'catalog', id), { published: !p.published });
    showToast(p.published ? 'Unpublished' : 'Published!', 'success');
  };

  window.syncFromInventory = async () => {
    try {
      const stockSnap = await getDocs(query(collection(db, 'stock_items'), where('status', 'in', ['available', 'low'])));
      let count = 0;
      
      for (const d of stockSnap.docs) {
        const item = d.data();
        const existing = allProducts.find(p => p.stockId === d.id);
        
        if (!existing) {
          await addDoc(collection(db, 'catalog'), {
            stockId: d.id,
            name: item.name,
            category: item.category || 'other',
            description: '',
            price: item.unitPrice || 0,
            inStock: item.quantityAvailable || 0,
            imageUrl: '',
            published: false,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          count++;
        } else {
          await updateDoc(doc(db, 'catalog', existing.id), {
            inStock: item.quantityAvailable || 0,
            price: item.unitPrice || 0,
            updatedAt: serverTimestamp()
          });
        }
      }
      
      showToast(`Synced ${count} new products from inventory!`, 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  };

  window.refreshCatalog = () => { loadProducts(); showToast('Refreshed', 'success'); };

  document.getElementById('categoryFilter').addEventListener('change', e => { currentCategory = e.target.value; renderProducts(); });

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; }
    userData = snap.data();
    if (!['attendant','attendant_chief','admin','super_admin'].includes(userData.role)) { window.location.href = 'staff-dashboard.html'; return; }
    document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User';
    document.getElementById('userRole').textContent = userData.role || 'Staff';
    document.getElementById('userAvatar').textContent = (userData.fullName||'U').charAt(0);
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    loadProducts();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
  window.addEventListener('beforeunload', () => unsubscribes.forEach(u => u()));
</script>
</body>
</html>
