<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Staff · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 64px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; min-height: 100vh; display: flex; }
    .sidebar { width: 280px; background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-header { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
    .logo-text { font-size: 1.2rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
    .nav-item i { width: 22px; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; background: inherit; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.9rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: 280px; }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; font-weight: 600; }
    .stat-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    .panel { background: white; border-radius: 20px; padding: 22px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 18px; }
    .panel-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th { text-align: left; padding: 12px 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-info { background: rgba(59,130,246,0.1); color: var(--info); }
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.85rem; }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    .toast { background: white; padding: 12px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 10px; transform: translateX(400px); transition: transform 0.25s; }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="window.location.href='staff-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>Profile</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">S</div><div class="user-details"><h4 id="userName">Staff</h4><p id="userRole">Staff</p></div></div></div>
</aside>
<main class="main-content">
  <header class="top-bar"><h1 class="page-title">My Dashboard</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>My Points</span><div class="stat-icon"><i class="fas fa-coins"></i></div></div><div class="stat-value" id="myPoints">0</div><div style="font-size:0.7rem;color:var(--gray);">₦<span id="pointValue">100</span>/point</div></div>
      <div class="stat-card"><div class="stat-header"><span>Tasks Done</span><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div><div class="stat-value" id="tasksDone">0</div><div style="font-size:0.7rem;color:var(--gray);">This month</div></div>
      <div class="stat-card"><div class="stat-header"><span>Leave Days</span><div class="stat-icon"><i class="fas fa-umbrella-beach"></i></div></div><div class="stat-value" id="leaveDays">2</div><div style="font-size:0.7rem;color:var(--gray);">Remaining</div></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-tasks"></i> My Assigned Tasks</h3></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Task</th><th>Deadline</th><th>Status</th><th>Points</th></tr></thead><tbody id="myTasksTable"></tbody></table></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-calendar-alt"></i> My Recent Attendance</h3></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Date</th><th>Check-in</th><th>Status</th></tr></thead><tbody id="myAttendanceTable"></tbody></table></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-calendar-plus"></i> Request Leave</h3></div>
      <div style="display:flex;gap:15px;flex-wrap:wrap;">
        <input type="date" id="leaveStart" class="form-control" style="flex:1;">
        <input type="date" id="leaveEnd" class="form-control" style="flex:1;">
        <button class="btn btn-primary" id="requestLeaveBtn">Request</button>
      </div>
      <p style="font-size:0.7rem;color:var(--gray);margin-top:10px;">Max 2 days per month. Admin approval required.</p>
    </div>
  </div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null;

  function formatDate(d) { if (!d) return '-'; return d.toDate().toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }
  function formatTime(d) { if (!d) return '-'; return d.toDate().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }

  function loadDashboard() {
    if (!currentUser) return;
    const userRef = doc(db, 'users', currentUser.uid);
    onSnapshot(userRef, (snap) => { const d = snap.data(); document.getElementById('myPoints').textContent = d.totalPoints||0; document.getElementById('pointValue').textContent = d.pointValueNaira||100; document.getElementById('leaveDays').textContent = d.leaveDaysRemaining||2; });

    const tasksQuery = query(collection(db, 'tasks'), where('assignedTo', '==', currentUser.uid), orderBy('createdAt', 'desc'));
    onSnapshot(tasksQuery, (snap) => {
      const tbody = document.getElementById('myTasksTable'); tbody.innerHTML = '';
      let done = 0; const now = new Date();
      if (snap.empty) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;">No tasks assigned</td></tr>'; }
      else { snap.forEach(d => { const t = d.data(); if (t.status === 'completed') { const dt = t.submittedAt?.toDate(); if (dt && dt.getMonth()===now.getMonth()) done++; } tbody.innerHTML += `<tr><td>${t.title}</td><td>${formatDate(t.deadline)}</td><td><span class="badge badge-${t.status==='completed'?'success':t.status==='in_progress'?'info':'warning'}">${t.status}</span></td><td>${t.pointsEarned||0}</td></tr>`; }); }
      document.getElementById('tasksDone').textContent = done;
    });

    const attQuery = query(collection(db, 'attendance'), where('userId', '==', currentUser.uid), orderBy('date', 'desc'), limit(5));
    onSnapshot(attQuery, (snap) => {
      const tbody = document.getElementById('myAttendanceTable'); tbody.innerHTML = '';
      if (snap.empty) { tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;">No attendance records</td></tr>'; return; }
      snap.forEach(d => { const a = d.data(); tbody.innerHTML += `<tr><td>${a.date}</td><td>${formatTime(a.checkInTime)}</td><td><span class="badge ${a.status==='late'?'badge-warning':'badge-success'}">${a.status}</span></td></tr>`; });
    });
  }

  document.getElementById('requestLeaveBtn').addEventListener('click', async () => {
    const start = document.getElementById('leaveStart').value, end = document.getElementById('leaveEnd').value;
    if (!start || !end) { showToast('Select dates', 'error'); return; }
    await addDoc(collection(db, 'leave_requests'), { userId: currentUser.uid, requestedDates: [start, end], status: 'pending', createdAt: serverTimestamp() });
    showToast('Leave requested', 'success');
    document.getElementById('leaveStart').value = document.getElementById('leaveEnd').value = '';
  });

  onAuthStateChanged(auth, async (u) => { if (!u) { window.location.href = 'auth.html'; return; } currentUser = u; const data = (await getDoc(doc(db, 'users', u.uid))).data(); if (data.role !== 'staff') { window.location.href = data.role?.includes('admin') ? 'admin-dashboard.html' : 'attendant-dashboard.html'; return; } userData = data; document.getElementById('userName').textContent = data.fullName?.split(' ')[0]; document.getElementById('userRole').textContent = 'Staff'; document.getElementById('userAvatar').textContent = data.fullName?.charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadDashboard(); });
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href='auth.html'));
</script>
</body>
</html>
