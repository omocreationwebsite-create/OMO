<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Inventory · FashionStone</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 70px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; font-weight: 600; }
    .stat-icon { width: 40px; height: 40px; border-radius: 14px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrapper { flex: 1; min-width: 200px; position: relative; }
    .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .search-input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; outline: none; }
    .filter-select { padding: 12px 20px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; background: white; }
    
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .data-table th { text-align: left; padding: 14px 10px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    
    .badge { padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
    .badge-pending { background: rgba(107,114,128,0.1); color: var(--gray); }
    
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 6px 12px; }
    
    .lowstock-banner { background: rgba(245,158,11,0.1); border-left: 4px solid var(--warning); padding: 14px 18px; border-radius: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; }
    .form-control:focus { border-color: var(--primary); }
    .pin-input-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    .pin-input { width: 55px; height: 65px; text-align: center; font-size: 1.8rem; font-weight: 700; border: 2px solid rgba(255,77,166,0.2); border-radius: 14px; outline: none; }
    
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    
    @media (max-width: 992px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item active"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item" onclick="window.location.href='tasks.html'"><i class="fas fa-clipboard-list"></i><span>Tasks</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Inventory Management</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  
  <div class="content-wrapper">
    
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Total Items</span><div class="stat-icon"><i class="fas fa-boxes"></i></div></div><div class="stat-value" id="totalItems">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Low Stock</span><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div></div><div class="stat-value" id="lowStock">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Out of Stock</span><div class="stat-icon"><i class="fas fa-times-circle"></i></div></div><div class="stat-value" id="outOfStock">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Total Value</span><div class="stat-icon"><i class="fas fa-naira-sign"></i></div></div><div class="stat-value" id="totalValue">₦0</div></div>
    </div>
    
    <div class="lowstock-banner" id="lowStockBanner" style="display:none;"><i class="fas fa-box-open"></i><p><span id="lowStockCount">0</span> items running low.</p><button class="btn btn-sm" style="background:var(--warning);color:white;" onclick="window.location.href='purchases.html'">Create Purchase Request</button></div>
    
    <div class="filter-bar">
      <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search items..."></div>
      <select class="filter-select" id="categoryFilter"><option value="all">All Categories</option><option value="rhinestones">Rhinestones</option><option value="beads">Beads</option><option value="bridal">Bridal</option><option value="paperstones">Paperstones</option><option value="other">Other</option></select>
      <select class="filter-select" id="statusFilter"><option value="all">All Status</option><option value="available">Available</option><option value="low">Low Stock</option><option value="out_of_stock">Out of Stock</option></select>
      <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> Export</button>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-warehouse"></i> Stock Items</h3><div><button class="btn btn-outline btn-sm" onclick="refreshInventory()"><i class="fas fa-sync-alt"></i> Refresh</button><button class="btn btn-primary btn-sm" onclick="openAddItemModal()"><i class="fas fa-plus"></i> Add Item</button></div></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Item Name</th><th>Category</th><th>Available</th><th>Sold</th><th>Unit Price</th><th>Total Value</th><th>Status</th><th>Actions</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
    </div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="hideModal()">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, serverTimestamp, increment, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allItems = [];

  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';

  function showPinModal(title, action, onSuccess) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalContent').innerHTML = `<p style="text-align:center;margin-bottom:20px;">Enter PIN to ${action}</p><div class="pin-input-container"><input type="password" maxlength="1" class="pin-input" id="pin1"><input type="password" maxlength="1" class="pin-input" id="pin2"><input type="password" maxlength="1" class="pin-input" id="pin3"><input type="password" maxlength="1" class="pin-input" id="pin4"></div><button class="btn btn-primary" id="verifyPinBtn" style="width:100%;">Verify</button>`;
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('pin1').focus();
    document.querySelectorAll('.pin-input').forEach((inp, i, arr) => inp.addEventListener('input', e => { if(e.target.value && i<arr.length-1) arr[i+1].focus(); }));
    document.getElementById('verifyPinBtn').onclick = () => { if(['pin1','pin2','pin3','pin4'].map(id=>document.getElementById(id).value).join('') === (userData?.attendantPin||'1234')) { hideModal(); onSuccess(); } else { showToast('Invalid PIN', 'error'); } };
  }

  function renderInventory() {
    let filtered = [...allItems];
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(i => i.name?.toLowerCase().includes(search));
    const cat = document.getElementById('categoryFilter').value;
    if (cat !== 'all') filtered = filtered.filter(i => i.category === cat);
    const stat = document.getElementById('statusFilter').value;
    if (stat !== 'all') filtered = filtered.filter(i => i.status === stat);
    
    document.getElementById('totalItems').textContent = allItems.length;
    document.getElementById('lowStock').textContent = allItems.filter(i => i.status === 'low').length;
    document.getElementById('outOfStock').textContent = allItems.filter(i => i.status === 'out_of_stock').length;
    const totalVal = allItems.reduce((s,i) => s + ((i.quantityAvailable||0)*(i.unitPrice||0)), 0);
    document.getElementById('totalValue').textContent = formatCurrency(totalVal);
    
    const lowCount = allItems.filter(i => i.status === 'low' || i.status === 'out_of_stock').length;
    document.getElementById('lowStockBanner').style.display = lowCount ? 'flex' : 'none';
    document.getElementById('lowStockCount').textContent = lowCount;
    
    const tbody = document.getElementById('inventoryTable'); tbody.innerHTML = '';
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-box"></i><p>No items found</p></div></td></tr>'; return; }
    filtered.forEach(i => { tbody.innerHTML += `<tr><td>${i.name}</td><td>${i.category||'-'}</td><td>${i.quantityAvailable||0}</td><td>${i.quantitySold||0}</td><td>${formatCurrency(i.unitPrice)}</td><td>${formatCurrency((i.quantityAvailable||0)*(i.unitPrice||0))}</td><td><span class="badge badge-${i.status==='available'?'success':i.status==='low'?'warning':i.status==='out_of_stock'?'danger':'pending'}">${i.status||'pending'}</span></td><td style="display:flex;gap:5px;"><button class="btn btn-sm btn-outline" onclick="openEditItem('${i.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline" onclick="openRestock('${i.id}')"><i class="fas fa-plus"></i></button></td></tr>`; });
  }

  function loadInventory() { unsubscribes.forEach(u => u()); unsubscribes = []; unsubscribes.push(onSnapshot(collection(db, 'stock_items'), snap => { allItems = snap.docs.map(d => ({id:d.id, ...d.data()})); renderInventory(); })); }

  window.openAddItemModal = () => { document.getElementById('modalTitle').textContent = 'Add New Item'; document.getElementById('modalContent').innerHTML = `<div class="form-group"><label>Item Name</label><input class="form-control" id="itemName"></div><div class="form-group"><label>Category</label><select class="form-control" id="itemCategory"><option value="rhinestones">Rhinestones</option><option value="beads">Beads</option><option value="bridal">Bridal</option><option value="paperstones">Paperstones</option><option value="other">Other</option></select></div><div class="form-group"><label>Quantity</label><input type="number" class="form-control" id="itemQty" value="0"></div><div class="form-group"><label>Unit Price (₦)</label><input type="number" class="form-control" id="itemPrice" value="0"></div><div class="form-group"><label>Low Stock Threshold</label><input type="number" class="form-control" id="itemThreshold" value="10"></div><button class="btn btn-primary" onclick="addItem()">Add Item (Requires Admin Approval)</button>`; document.getElementById('modalOverlay').style.display = 'flex'; };
  window.addItem = () => { const name = document.getElementById('itemName')?.value; if(!name) { showToast('Item name required', 'error'); return; } showPinModal('Add Item', 'add stock item', async () => { const qty = parseInt(document.getElementById('itemQty')?.value)||0; const threshold = parseInt(document.getElementById('itemThreshold')?.value)||10; const isAdmin = userData?.role === 'admin' || userData?.role === 'super_admin'; await addDoc(collection(db, 'stock_items'), { name, category: document.getElementById('itemCategory')?.value, quantityAvailable: qty, quantitySold: 0, unitPrice: parseFloat(document.getElementById('itemPrice')?.value)||0, threshold, status: isAdmin ? (qty===0?'out_of_stock':qty<=threshold?'low':'available') : 'pending_approval', createdBy: currentUser.uid, createdByName: userData.fullName, createdAt: serverTimestamp() }); await logAudit('add_item', `Added ${name}`); showToast(isAdmin?'Item added':'Item submitted for approval', 'success'); hideModal(); }); };

  window.openEditItem = (id) => { const i = allItems.find(x => x.id === id); if(!i) return; document.getElementById('modalTitle').textContent = 'Edit Item'; document.getElementById('modalContent').innerHTML = `<div class="form-group"><label>Name</label><input class="form-control" id="editName" value="${i.name||''}"></div><div class="form-group"><label>Category</label><select class="form-control" id="editCategory"><option value="rhinestones" ${i.category==='rhinestones'?'selected':''}>Rhinestones</option><option value="beads" ${i.category==='beads'?'selected':''}>Beads</option><option value="bridal" ${i.category==='bridal'?'selected':''}>Bridal</option><option value="paperstones" ${i.category==='paperstones'?'selected':''}>Paperstones</option><option value="other" ${i.category==='other'?'selected':''}>Other</option></select></div><div class="form-group"><label>Available</label><input type="number" class="form-control" id="editQty" value="${i.quantityAvailable||0}"></div><div class="form-group"><label>Unit Price</label><input type="number" class="form-control" id="editPrice" value="${i.unitPrice||0}"></div><div class="form-group"><label>Threshold</label><input type="number" class="form-control" id="editThreshold" value="${i.threshold||10}"></div><button class="btn btn-primary" onclick="saveEdit('${id}')">Save Changes</button>`; document.getElementById('modalOverlay').style.display = 'flex'; };
  window.saveEdit = (id) => { showPinModal('Edit Item', 'edit stock item', async () => { const qty = parseInt(document.getElementById('editQty')?.value)||0; const threshold = parseInt(document.getElementById('editThreshold')?.value)||10; await updateDoc(doc(db, 'stock_items', id), { name: document.getElementById('editName')?.value, category: document.getElementById('editCategory')?.value, quantityAvailable: qty, unitPrice: parseFloat(document.getElementById('editPrice')?.value)||0, threshold, status: qty===0?'out_of_stock':qty<=threshold?'low':'available', updatedAt: serverTimestamp() }); await logAudit('edit_item', `Updated item`); showToast('Item updated', 'success'); hideModal(); }); };

  window.openRestock = (id) => { const i = allItems.find(x => x.id === id); document.getElementById('modalTitle').textContent = 'Restock Item'; document.getElementById('modalContent').innerHTML = `<p><strong>${i?.name}</strong> (Current: ${i?.quantityAvailable||0})</p><div class="form-group"><label>Quantity to Add</label><input type="number" class="form-control" id="restockQty" value="10"></div><button class="btn btn-primary" onclick="confirmRestock('${id}')">Restock</button>`; document.getElementById('modalOverlay').style.display = 'flex'; };
  window.confirmRestock = (id) => { showPinModal('Restock', 'restock item', async () => { const qty = parseInt(document.getElementById('restockQty')?.value)||0; const i = allItems.find(x => x.id === id); const newQty = (i.quantityAvailable||0) + qty; await updateDoc(doc(db, 'stock_items', id), { quantityAvailable: newQty, status: newQty===0?'out_of_stock':newQty<=(i.threshold||10)?'low':'available', updatedAt: serverTimestamp() }); await addDoc(collection(db, 'stock_history'), { itemId: id, itemName: i.name, type: 'restock', quantity: qty, performedBy: currentUser.uid, performedByName: userData.fullName, createdAt: serverTimestamp() }); await logAudit('restock', `Restocked by ${qty}`); showToast(`Added ${qty} units`, 'success'); hideModal(); }); };

  window.refreshInventory = () => { loadInventory(); showToast('Refreshed', 'success'); };

  document.getElementById('exportBtn').addEventListener('click', () => { const csv = ['Name,Category,Available,Sold,Unit Price,Total Value,Status'].concat(allItems.map(i => `"${i.name}","${i.category||''}",${i.quantityAvailable||0},${i.quantitySold||0},${i.unitPrice||0},${(i.quantityAvailable||0)*(i.unitPrice||0)},${i.status}`)).join('\n'); const b = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `inventory_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Exported', 'success'); });
  document.getElementById('searchInput').addEventListener('input', renderInventory);
  document.getElementById('categoryFilter').addEventListener('change', renderInventory);
  document.getElementById('statusFilter').addEventListener('change', renderInventory);

  onAuthStateChanged(auth, async (u) => { if (!u) { window.location.href = 'auth.html'; return; } currentUser = u; const snap = await getDoc(doc(db, 'users', u.uid)); if (!snap.exists()) { await signOut(auth); window.location.href = 'auth.html'; return; } userData = snap.data(); if (userData.status !== 'active') { await signOut(auth); window.location.href = 'auth.html'; return; } document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'User'; document.getElementById('userRole').textContent = userData.role?.replace('_',' ') || 'Staff'; document.getElementById('userAvatar').textContent = (userData.fullName||'U').charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadInventory(); });
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
</script>
</body>
</html>
