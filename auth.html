<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>O.M.Ocreation - Sign Up</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#111,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card {
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:350px;
}
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
button {
  width:100%;
  padding:12px;
  background:#ff4da6;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.msg {
  margin-top:10px;
  font-size:14px;
  padding:10px;
  border-radius:8px;
}
.msg.error {
  background:#f8d7da;
  color:#721c24;
}
.msg.success {
  background:#d4edda;
  color:#155724;
}
.debug {
  background:#1a1a2e;
  color:#0f0;
  font-family:monospace;
  font-size:11px;
  padding:10px;
  margin-top:15px;
  border-radius:8px;
  height:150px;
  overflow:auto;
}
</style>
</head>
<body>

<div class="card">
  <h2>Sign Up</h2>

  <input type="text" id="name" placeholder="Full Name" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button id="signupBtn">Create Account</button>

  <div id="msg" class="msg" style="display:none"></div>
  <div class="debug" id="debug">[Ready] Click the button above...</div>
</div>

<script>
// Supabase
const supabase = window.supabase.createClient(
  "https://gogrmiflvfdetvtggzrk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ"
);

// Elements
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const btn = document.getElementById("signupBtn");
const msgDiv = document.getElementById("msg");
const debugDiv = document.getElementById("debug");

function log(msg) {
  const timestamp = new Date().toLocaleTimeString();
  debugDiv.innerHTML += `\n[${timestamp}] ${msg}`;
  debugDiv.scrollTop = debugDiv.scrollHeight;
  console.log(msg);
}

function showMessage(text, type) {
  msgDiv.className = "msg " + type;
  msgDiv.innerHTML = text;
  msgDiv.style.display = "block";
  setTimeout(() => {
    msgDiv.style.display = "none";
  }, 5000);
}

// THIS IS THE SIGNUP FUNCTION
async function handleSignup() {
  log("🔴 BUTTON CLICKED! Function started!");
  
  const fullName = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  
  log(`Name: ${fullName}, Email: ${email}, Password length: ${password.length}`);
  
  if (!fullName || !email || !password) {
    log("❌ Validation failed: Missing fields");
    showMessage("Please fill all fields", "error");
    return;
  }
  
  if (password.length < 6) {
    log("❌ Validation failed: Password too short");
    showMessage("Password must be at least 6 characters", "error");
    return;
  }
  
  btn.disabled = true;
  btn.innerText = "Creating...";
  log("📡 Calling Supabase auth.signUp...");
  
  try {
    // STEP 1: Auth
    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password
    });
    
    if (error) {
      log("❌ Auth error: " + error.message);
      showMessage("Auth error: " + error.message, "error");
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }
    
    const userId = data?.user?.id;
    log("✅ Auth success! User ID: " + userId);
    
    if (!userId) {
      log("❌ No user ID returned");
      showMessage("No user ID returned", "error");
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }
    
    // STEP 2: Insert into users table
    log("📡 Inserting into users table...");
    const { error: insertError } = await supabase
      .from("users")
      .insert([{
        id: userId,
        full_name: fullName,
        email: email,
        role: "pending",
        status: "pending",
        created_at: new Date().toISOString()
      }]);
    
    if (insertError) {
      log("❌ Insert error: " + insertError.message);
      showMessage("Database error: " + insertError.message, "error");
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }
    
    log("✅ ALL DONE! User created successfully!");
    showMessage("Account created! Redirecting to login...", "success");
    
    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);
    
  } catch (err) {
    log("💥 Unexpected error: " + err.message);
    showMessage("Error: " + err.message, "error");
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
}

// ATTACH EVENT LISTENER - This is critical!
btn.addEventListener("click", handleSignup);

log("✅ Page loaded. Click the 'Create Account' button to test.");
log(`Button exists: ${!!btn}`);
log(`Button text: ${btn.innerText}`);
</script>
</body>
</html>
