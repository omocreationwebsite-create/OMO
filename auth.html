<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .signup-card {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 45px 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .logo { text-align: center; margin-bottom: 35px; }
    .logo i { font-size: 2.5rem; color: #ff4da6; }
    .logo h1 { font-size: 1.8rem; font-family: 'Playfair Display', serif; color: #1a1a2e; }
    .logo h1 span { color: #ff4da6; }
    .logo p { color: #666; font-size: 0.85rem; margin-top: 5px; }
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
    }
    .input-group input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.95rem;
    }
    .input-group input:focus { outline: none; border-color: #ff4da6; }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-link { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
    .login-link a { color: #ff4da6; text-decoration: none; font-weight: 600; }
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .signup-card { padding: 30px 25px; } }
  </style>
</head>
<body>
<div class="signup-card">
  <div class="logo"><i class="fas fa-gem"></i><h1>O.M.O<span>creation</span></h1><p>Create your account</p></div>
  <form id="signupForm">
    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="fullName" placeholder="Full name" required></div>
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="Email address" required></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required></div>
    <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="confirmPassword" placeholder="Confirm password" required></div>
    <button type="submit" class="btn" id="signupBtn">Create Account <i class="fas fa-user-plus"></i></button>
    <div class="login-link"><p>Already have an account? <a href="login.html">Login</a></p></div>
  </form>
  <div id="messageContainer"></div>
</div>
<script>
(function() {
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ";
  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  const form = document.getElementById('signupForm');
  const btn = document.getElementById('signupBtn');
  const msgDiv = document.getElementById('messageContainer');
  
  function showMessage(text, type) {
    msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
    setTimeout(() => { msgDiv.innerHTML = ''; }, 5000);
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    
    if (!fullName || !email || !password) {
      showMessage('Please fill all fields', 'error');
      return;
    }
    if (password !== confirm) {
      showMessage('Passwords do not match', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    try {
      const { data, error } = await _supabase.auth.signUp({ email, password });
      
      if (error) throw error;
      
      // IMPORTANT: WAIT for user object safely
      const userId = data?.user?.id;
      
      if (!userId) {
        showMessage("Signup failed: No user ID returned", "error");
        btn.disabled = false;
        btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
        return;
      }
      
      const { error: insertError } = await _supabase.from('users').insert([{
        id: userId,
        full_name: fullName,
        email: email,
        role: 'pending',
        status: 'pending',
        created_at: new Date().toISOString()
      }]);
      
      if (insertError) throw insertError;
      
      showMessage('Account created! Please wait for admin approval.', 'success');
      
      // Reset form
      document.getElementById('fullName').value = '';
      document.getElementById('signupEmail').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      
      // Redirect to login after 2 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
      
    } catch (err) {
      console.error('Signup error:', err);
      showMessage(err.message || 'Signup failed. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
    }
  });
})();
</script>
</body>
</html>
