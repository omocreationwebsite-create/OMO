<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>O.M.Ocreation - Sign Up</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#111,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:350px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  background:#ff4da6;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
}

.msg {
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Sign Up</h2>

  <input id="name" placeholder="Full Name" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="btn" onclick="signup()">Create Account</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://gogrmiflvfdetvtggzrk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ"
);

const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

async function signup() {

  const fullName = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  console.log("START SIGNUP");

  if (!fullName || !email || !password) {
    msg.innerText = "Please fill all fields";
    return;
  }

  btn.disabled = true;
  msg.innerText = "Creating account...";

  try {

    // STEP 1: CREATE AUTH USER
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    console.log("AUTH RESULT:", data, error);

    if (error) {
      msg.innerText = "Auth Error: " + error.message;
      btn.disabled = false;
      return;
    }

    const user = data?.user;

    if (!user) {
      msg.innerText = "No user returned from auth";
      btn.disabled = false;
      return;
    }

    console.log("USER CREATED:", user.id);

    // STEP 2: INSERT PROFILE (SAFE)
    const { error: insertError } = await supabase
      .from("users")
      .insert([{
        id: user.id,
        full_name: fullName,
        email: email,
        role: "pending",
        status: "pending",
        base_salary: 0
      }]);

    if (insertError) {
      console.log("INSERT ERROR:", insertError);
      msg.innerText = "Profile creation failed: " + insertError.message;
      btn.disabled = false;
      return;
    }

    msg.innerText = "Signup successful! Redirecting...";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {
    console.log(err);
    msg.innerText = "Unexpected error: " + err.message;
    btn.disabled = false;
  }
}
</script>

</body>
</html>
