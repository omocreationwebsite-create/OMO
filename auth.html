<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .signup-card {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 45px 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { text-align: center; margin-bottom: 35px; }
    .logo i { font-size: 2.5rem; color: #ff4da6; }
    .logo h1 { font-size: 1.8rem; font-family: 'Playfair Display', serif; color: #1a1a2e; }
    .logo h1 span { color: #ff4da6; }
    .logo p { color: #666; font-size: 0.85rem; margin-top: 5px; }
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
      font-size: 1rem;
    }
    .input-group input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #ff4da6;
      box-shadow: 0 0 0 3px rgba(255,77,166,0.1);
    }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,77,166,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-link { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
    .login-link p { color: #666; font-size: 0.85rem; }
    .login-link a { color: #ff4da6; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 18px;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }
    .back-home:hover { background: rgba(255,77,166,0.8); transform: translateX(-3px); }
    .requirements {
      font-size: 0.7rem;
      color: #999;
      margin-top: 5px;
      padding-left: 15px;
    }
    .requirements i { color: #ff4da6; margin-right: 5px; }
    @media (max-width: 480px) {
      .signup-card { padding: 30px 25px; }
      .logo h1 { font-size: 1.5rem; }
      .back-home { top: 15px; left: 15px; padding: 6px 12px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<a href="index.html" class="back-home">
  <i class="fas fa-arrow-left"></i> Back to Home
</a>

<div class="signup-card">
  <div class="logo">
    <i class="fas fa-gem"></i>
    <h1>O.M.O<span>creation</span></h1>
    <p>Create your account</p>
  </div>
  
  <form id="signupForm">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="fullName" placeholder="Full name" required autocomplete="name">
    </div>
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="signupEmail" placeholder="Email address" required autocomplete="email">
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="signupPassword" placeholder="Password" required autocomplete="new-password">
    </div>
    <div class="input-group">
      <i class="fas fa-check-circle"></i>
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
    </div>
    <div class="requirements">
      <i class="fas fa-info-circle"></i> Password must be at least 6 characters
    </div>
    <button type="submit" class="btn" id="signupBtn">Create Account <i class="fas fa-user-plus"></i></button>
    
    <div class="login-link">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </form>
  
  <div id="messageContainer"></div>
</div>

<script>
  // ============================================
  // YOUR SUPABASE KEYS
  // ============================================
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ";
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  const signupForm = document.getElementById('signupForm');
  const signupBtn = document.getElementById('signupBtn');
  const messageContainer = document.getElementById('messageContainer');
  
  function showMessage(text, type) {
    messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
    setTimeout(() => {
      messageContainer.innerHTML = '';
    }, 5000);
  }
  
  // SIGNUP HANDLER
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!fullName || !email || !password) {
      showMessage('Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showMessage('Passwords do not match', 'error');
      return;
    }
    
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    
    if (error) {
      showMessage(error.message, 'error');
      signupBtn.disabled = false;
      signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
      return;
    }
    
    // Insert into users table
    const { error: insertError } = await supabase
      .from('users')
      .insert([{
        id: data.user.id,
        full_name: fullName,
        email: email,
        role: 'pending',
        status: 'pending',
        created_at: new Date().toISOString()
      }]);
    
    if (insertError) {
      console.error('Insert error:', insertError);
      showMessage(`Profile error: ${insertError.message}`, 'error');
    } else {
      showMessage('Account created successfully! Please login after admin approval.', 'success');
      
      // Reset form
      document.getElementById('fullName').value = '';
      document.getElementById('signupEmail').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      
      // Redirect to login after 2 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2500);
    }
    
    signupBtn.disabled = false;
    signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
  });
  
  console.log('%c📝 Signup page ready', 'color: #ff4da6; font-size: 14px; font-weight: bold;');
</script>
</body>
</html>
