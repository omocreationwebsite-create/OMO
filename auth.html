<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>O.M.Ocreation Signup</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  background:#ff4da6;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:disabled {
  opacity:0.6;
}

.msg {
  margin-top:10px;
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account</h2>

  <input id="name" placeholder="Full Name" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="btn" onclick="signup()">Sign Up</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://gogrmiflvfdetvtggzrk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ"
);

const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

function show(text) {
  msg.innerText = text;
}

async function signup() {

  const fullName = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!fullName || !email || !password) {
    show("Please fill all fields");
    return;
  }

  btn.disabled = true;
  show("Creating account...");

  try {

    // STEP 1: CREATE AUTH USER
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      show(error.message);
      btn.disabled = false;
      return;
    }

    const user = data?.user;

    if (!user) {
      show("Signup failed: no user returned");
      btn.disabled = false;
      return;
    }

    // STEP 2: INSERT INTO USERS TABLE
    const { error: insertError } = await supabase.from("users").insert([{
      id: user.id,
      full_name: fullName,
      email: email,
      role: "pending",
      status: "pending",
      created_at: new Date().toISOString()
    }]);

    if (insertError) {
      console.log(insertError);
      show("DB Error: " + insertError.message);
      btn.disabled = false;
      return;
    }

    show("Account created successfully!");
    btn.disabled = false;

  } catch (err) {
    console.log(err);
    show("Unexpected error occurred");
    btn.disabled = false;
  }
}
</script>

</body>
</html>
