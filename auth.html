<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Login & Signup</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Back to Homepage Button */
    .back-home {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 100;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-home:hover {
      background: rgba(255,77,166,0.8);
      transform: translateX(-5px);
    }
    
    /* Main Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    
    .auth-card {
      max-width: 450px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 45px 35px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 35px;
    }
    
    .auth-header .logo-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    
    .auth-header h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    
    .auth-header h1 span {
      color: #ff4da6;
    }
    
    .auth-header p {
      color: #666;
      font-size: 0.85rem;
      margin-top: 5px;
    }
    
    /* Input Groups */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
      font-size: 1rem;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background: white;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #ff4da6;
      box-shadow: 0 0 0 3px rgba(255,77,166,0.1);
    }
    
    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255,77,166,0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      transform: none;
    }
    
    /* Switch Link */
    .switch-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    
    .switch-link p {
      color: #666;
      font-size: 0.85rem;
    }
    
    .switch-link a {
      color: #ff4da6;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    
    .switch-link a:hover {
      text-decoration: underline;
    }
    
    /* Message */
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.8rem;
      animation: fadeIn 0.3s ease;
    }
    
    .message.success {
      background: rgba(46, 204, 113, 0.1);
      color: #27ae60;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }
    
    .message.error {
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Forgot Password */
    .forgot-password {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 15px;
    }
    
    .forgot-password a {
      color: #999;
      font-size: 0.75rem;
      text-decoration: none;
    }
    
    .forgot-password a:hover {
      color: #ff4da6;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 30px 20px;
      }
      
      .auth-header h1 {
        font-size: 1.5rem;
      }
      
      .back-home {
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

<!-- Back to Homepage Button -->
<a href="index.html" class="back-home">
  <i class="fas fa-arrow-left"></i> Back to Home
</a>

<div class="auth-container">
  <div class="auth-card">
    
    <!-- Header -->
    <div class="auth-header">
      <div class="logo-icon">💎</div>
      <h1>O.M.O<span>creation</span></h1>
      <p>Luxury Stone Fashion System</p>
    </div>
    
    <!-- Login Form (visible by default) -->
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      <div class="forgot-password">
        <a href="#" id="forgotPasswordLink">Forgot Password?</a>
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
      
      <div class="switch-link">
        <p>Don't have an account? <a id="showSignupLink">Sign Up</a></p>
      </div>
    </form>
    
    <!-- Signup Form (hidden initially) -->
    <form id="signupForm" style="display: none;">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="fullName" placeholder="Full name" required>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signupEmail" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
      </div>
      <div class="input-group">
        <i class="fas fa-check-circle"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="submit-btn" id="signupBtn">Create Account <i class="fas fa-user-plus"></i></button>
      
      <div class="switch-link">
        <p>Already have an account? <a id="showLoginLink">Login</a></p>
      </div>
    </form>
    
    <!-- Message Container -->
    <div id="message" class="message" style="display: none;"></div>
    
  </div>
</div>

<script>
  // ============================================
  // SUPABASE CONFIGURATION (YOUR REAL KEYS)
  // ============================================
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-JgM9Qf8t9AV3G_rxYXMAA_6YMm8bSg";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // DOM Elements
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const showSignupLink = document.getElementById('showSignupLink');
  const showLoginLink = document.getElementById('showLoginLink');
  const forgotPasswordLink = document.getElementById('forgotPasswordLink');
  const messageDiv = document.getElementById('message');
  
  // Show message function
  function showMessage(text, type = 'error') {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = 'block';
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  }
  
  // Switch to Signup form
  function switchToSignup() {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    messageDiv.style.display = 'none';
  }
  
  // Switch to Login form
  function switchToLogin() {
    signupForm.style.display = 'none';
    loginForm.style.display = 'block';
    messageDiv.style.display = 'none';
  }
  
  // Login handler
  async function handleLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showMessage('Please enter email and password', 'error');
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
      showMessage(error.message, 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    // Check user role and status from users table
    const { data: profile, error: profileError } = await supabase
      .from('users')
      .select('role, status')
      .eq('id', data.user.id)
      .single();
    
    if (profileError || !profile) {
      showMessage('User profile not found', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    if (profile.status !== 'active') {
      showMessage('Your account is pending admin approval', 'error');
      await supabase.auth.signOut();
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    showMessage('Login successful! Redirecting...', 'success');
    
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1500);
  }
  
  // Signup handler
  async function handleSignup(e) {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!fullName || !email || !password) {
      showMessage('Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showMessage('Passwords do not match', 'error');
      return;
    }
    
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    
    if (error) {
      showMessage(error.message, 'error');
      signupBtn.disabled = false;
      signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
      return;
    }
    
    // Insert user into users table
    const { error: insertError } = await supabase
      .from('users')
      .insert([{
        id: data.user.id,
        full_name: fullName,
        email: email,
        role: 'pending',
        status: 'pending',
        created_at: new Date().toISOString()
      }]);
    
    if (insertError) {
      console.error('Error inserting user:', insertError);
    }
    
    showMessage('Account created! Waiting for admin approval.', 'success');
    signupBtn.disabled = false;
    signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
    
    // Reset form and switch to login
    document.getElementById('fullName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    
    setTimeout(() => {
      switchToLogin();
    }, 2000);
  }
  
  // Forgot password handler
  async function handleForgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    
    if (!email) {
      showMessage('Please enter your email address to reset password', 'error');
      return;
    }
    
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth.html',
    });
    
    if (error) {
      showMessage(error.message, 'error');
    } else {
      showMessage(`Password reset link sent to ${email}. Check your inbox.`, 'success');
    }
  }
  
  // Event listeners
  showSignupLink.addEventListener('click', (e) => {
    e.preventDefault();
    switchToSignup();
  });
  
  showLoginLink.addEventListener('click', (e) => {
    e.preventDefault();
    switchToLogin();
  });
  
  forgotPasswordLink.addEventListener('click', handleForgotPassword);
  loginForm.addEventListener('submit', handleLogin);
  signupForm.addEventListener('submit', handleSignup);
  
  console.log('%c✨ O.M.Ocreation Authentication Ready ✨', 'color: #ff4da6; font-size: 14px; font-weight: bold;');
  console.log('%cSupabase Connected ✅', 'color: #00ff88; font-size: 12px;');
</script>
</body>
</html>
