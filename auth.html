<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Authentication | Login & Signup</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Animated Background Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(255,77,166,0.3), transparent);
      border-radius: 50%;
      animation: floatParticle 15s infinite ease-in-out;
    }
    
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
    }
    
    /* Main Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 5%;
      position: relative;
      z-index: 1;
    }
    
    /* Glass Morphism Card */
    .auth-wrapper {
      max-width: 1200px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      border-radius: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .auth-grid {
      display: flex;
      flex-wrap: wrap;
    }
    
    /* Left Side - Human Illustration */
    .auth-illustration {
      flex: 1;
      min-width: 300px;
      background: linear-gradient(135deg, rgba(255,77,166,0.1), rgba(255,133,193,0.05));
      padding: 50px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Floating human figure SVG */
    .human-figure {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 30px;
      animation: floatHuman 4s ease-in-out infinite;
    }
    
    @keyframes floatHuman {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    
    .human-figure svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
    }
    
    .illustration-text {
      text-align: center;
      color: white;
    }
    
    .illustration-text h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff4da6, #ff85c1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .illustration-text p {
      font-size: 0.9rem;
      opacity: 0.8;
      line-height: 1.6;
    }
    
    .decorative-circles {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .circle {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    .circle:nth-child(2) { animation-delay: 0.3s; }
    .circle:nth-child(3) { animation-delay: 0.6s; }
    .circle:nth-child(4) { animation-delay: 0.9s; }
    .circle:nth-child(5) { animation-delay: 1.2s; }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    
    /* Right Side - Form */
    .auth-form-container {
      flex: 1;
      min-width: 350px;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      margin: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      animation: slideInRight 0.8s ease-out;
    }
    
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .form-header .logo-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    
    .form-header h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      font-weight: 700;
    }
    
    .form-header p {
      color: #666;
      font-size: 0.85rem;
    }
    
    /* Toggle Buttons */
    .toggle-buttons {
      display: flex;
      gap: 15px;
      background: #f0f0f0;
      border-radius: 60px;
      padding: 5px;
      margin-bottom: 30px;
    }
    
    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #666;
    }
    
    .toggle-btn.active {
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      box-shadow: 0 5px 15px rgba(255,77,166,0.3);
    }
    
    /* Form Inputs */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
      font-size: 1rem;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background: white;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #ff4da6;
      box-shadow: 0 0 0 3px rgba(255,77,166,0.1);
    }
    
    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }
    
    .submit-btn:hover::before {
      left: 100%;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255,77,166,0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      transform: none;
    }
    
    /* Message */
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
    }
    
    .message.success {
      background: rgba(46, 204, 113, 0.1);
      color: #27ae60;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }
    
    .message.error {
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive */
    @media (max-width: 992px) {
      .auth-grid {
        flex-direction: column;
      }
      
      .auth-illustration {
        padding: 40px 20px;
      }
      
      .human-figure {
        width: 200px;
        height: 200px;
      }
      
      .auth-form-container {
        margin: 20px;
      }
    }
    
    @media (max-width: 480px) {
      .auth-form-container {
        padding: 30px 20px;
        margin: 15px;
      }
      
      .toggle-btn {
        padding: 10px;
        font-size: 0.9rem;
      }
      
      .human-figure {
        width: 150px;
        height: 150px;
      }
      
      .illustration-text h2 {
        font-size: 1.3rem;
      }
    }
    
    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- Animated Particles -->
<div class="particles" id="particles"></div>

<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-grid">
      
      <!-- Left Side - Human Illustration -->
      <div class="auth-illustration">
        <div class="human-figure">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Glow behind figure -->
            <circle cx="100" cy="100" r="80" fill="url(#glowGradient)" opacity="0.3"/>
            <defs>
              <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ff4da6"/>
                <stop offset="100%" stop-color="transparent"/>
              </radialGradient>
            </defs>
            
            <!-- Body / Dress -->
            <path d="M70 80 L130 80 L140 160 L60 160 Z" fill="url(#dressGradient)" stroke="#ff4da6" stroke-width="1.5"/>
            <defs>
              <linearGradient id="dressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff4da6"/>
                <stop offset="100%" stop-color="#e6398c"/>
              </linearGradient>
            </defs>
            
            <!-- Head -->
            <circle cx="100" cy="55" r="25" fill="#FFE0BD" stroke="#ff4da6" stroke-width="1.5"/>
            
            <!-- Hair -->
            <path d="M75 50 Q75 25 100 25 Q125 25 125 50" fill="#2d1b0e" stroke="#2d1b0e" stroke-width="1"/>
            <path d="M75 50 Q70 40 72 35" stroke="#2d1b0e" stroke-width="3" fill="none"/>
            <path d="M125 50 Q130 40 128 35" stroke="#2d1b0e" stroke-width="3" fill="none"/>
            
            <!-- Eyes -->
            <ellipse cx="90" cy="55" rx="3" ry="4" fill="#1a1a2e"/>
            <ellipse cx="110" cy="55" rx="3" ry="4" fill="#1a1a2e"/>
            <circle cx="91" cy="54" r="1" fill="white"/>
            <circle cx="111" cy="54" r="1" fill="white"/>
            
            <!-- Smile -->
            <path d="M93 63 Q100 70 107 63" stroke="#e6398c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            
            <!-- Crown/Tiara -->
            <path d="M85 32 L90 22 L95 30 L100 20 L105 30 L110 22 L115 32" fill="#ffd700" stroke="#ffd700" stroke-width="1"/>
            <circle cx="100" cy="24" r="2" fill="#ff4da6"/>
            
            <!-- Necklace -->
            <path d="M90 72 Q100 80 110 72" stroke="#ffd700" stroke-width="1.5" fill="none"/>
            <circle cx="100" cy="76" r="2" fill="#ff4da6"/>
            
            <!-- Arms -->
            <path d="M70 90 L50 110 L55 125" stroke="#FFE0BD" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M130 90 L150 110 L145 125" stroke="#FFE0BD" stroke-width="6" fill="none" stroke-linecap="round"/>
            
            <!-- Hands with stones -->
            <circle cx="55" cy="125" r="4" fill="#ff4da6"/>
            <circle cx="145" cy="125" r="4" fill="#ff4da6"/>
          </svg>
        </div>
        <div class="illustration-text">
          <h2>Welcome to O.M.Ocreation</h2>
          <p>Your gateway to luxury stone fashion, premium rhinestones, and bridal elegance.</p>
        </div>
        <div class="decorative-circles">
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
        </div>
      </div>
      
      <!-- Right Side - Login/Signup Form -->
      <div class="auth-form-container">
        <div class="form-header">
          <div class="logo-icon">💎</div>
          <h1>O.M.O<span style="color:#ff4da6">creation</span></h1>
          <p>Luxury Stone Fashion System</p>
        </div>
        
        <!-- Toggle Buttons -->
        <div class="toggle-buttons">
          <button class="toggle-btn" id="loginTab">Login</button>
          <button class="toggle-btn" id="signupTab">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password" required>
          </div>
          <button type="submit" class="submit-btn" id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
        </form>
        
        <!-- Signup Form (hidden by default) -->
        <form id="signupForm" style="display: none;">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="fullName" placeholder="Full name" required>
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
          </div>
          <div class="input-group">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
          </div>
          <button type="submit" class="submit-btn" id="signupBtn">Create Account <i class="fas fa-user-plus"></i></button>
        </form>
        
        <div id="message" class="message" style="display: none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Supabase Configuration
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-JgM9Qf8t9AV3G_rxYXMAA_6YMm8bSg";
  
  // Initialize Supabase
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // DOM Elements
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const messageDiv = document.getElementById('message');
  
  // Current mode
  let isLoginMode = true;
  
  // Show message function
  function showMessage(text, type = 'error') {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = 'block';
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  }
  
  // Toggle between login and signup
  function toggleMode(isLogin) {
    isLoginMode = isLogin;
    
    if (isLogin) {
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
    } else {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
    }
  }
  
  // Login handler
  async function handleLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showMessage('Please enter email and password', 'error');
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    
    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });
    
    if (error) {
      showMessage(error.message, 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    // Check user role from users table
    const { data: userData, error: userError } = await supabase
      .from('users')
      .select('role, status')
      .eq('id', data.user.id)
      .single();
    
    if (userError || !userData) {
      showMessage('User profile not found', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    if (userData.status !== 'approved') {
      showMessage('Your account is pending admin approval', 'error');
      await supabase.auth.signOut();
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    showMessage('Login successful! Redirecting...', 'success');
    
    // Redirect based on role
    setTimeout(() => {
      if (userData.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else if (userData.role === 'attendant') {
        window.location.href = 'attendant-dashboard.html';
      } else {
        window.location.href = 'staff-dashboard.html';
      }
    }, 1500);
  }
  
  // Signup handler
  async function handleSignup(e) {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!fullName || !email || !password) {
      showMessage('Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showMessage('Passwords do not match', 'error');
      return;
    }
    
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });
    
    if (error) {
      showMessage(error.message, 'error');
      signupBtn.disabled = false;
      signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
      return;
    }
    
    // Insert user into users table
    const { error: insertError } = await supabase
      .from('users')
      .insert([
        {
          id: data.user.id,
          full_name: fullName,
          email: email,
          role: 'pending',
          status: 'pending',
          created_at: new Date().toISOString()
        }
      ]);
    
    if (insertError) {
      console.error('Error inserting user:', insertError);
    }
    
    showMessage('Account created! Waiting for admin approval. You will receive an email when approved.', 'success');
    signupBtn.disabled = false;
    signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
    
    // Reset form
    document.getElementById('fullName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    
    // Switch to login mode after 3 seconds
    setTimeout(() => {
      toggleMode(true);
    }, 3000);
  }
  
  // Event listeners
  loginTab.addEventListener('click', () => toggleMode(true));
  signupTab.addEventListener('click', () => toggleMode(false));
  loginForm.addEventListener('submit', handleLogin);
  signupForm.addEventListener('submit', handleSignup);
  
  // Create floating particles
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 100 + 30;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = Math.random() * 20 + 10 + 's';
      container.appendChild(particle);
    }
  }
  createParticles();
  
  console.log('%c✨ O.M.Ocreation Authentication System Ready ✨', 'color: #ff4da6; font-size: 14px; font-weight: bold;');
</script>
</body>
</html>
