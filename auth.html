<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>O.M.Ocreation Signup Debug</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#000;
}

.card {
  background:white;
  padding:25px;
  border-radius:12px;
  width:360px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  background:#ff4da6;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
}

.msg {
  margin-top:10px;
  font-size:13px;
  white-space:pre-wrap;
}

.log {
  background:#111;
  color:#0f0;
  font-size:11px;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">
  <h2>Signup Debug Mode</h2>

  <input id="name" placeholder="Full Name" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="btn" onclick="signup()">Create Account</button>

  <div class="msg" id="msg"></div>
  <div class="log" id="log"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://gogrmiflvfdetvtggzrk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3JtaWZsdmZkZXR2dGdnenJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTg1NzgsImV4cCI6MjA5MjEzNDU3OH0.x3eD41bw8KKBed4IOT18FBon9YtM7MCyF2wkE7fd0TQ"
);

const msg = document.getElementById("msg");
const log = document.getElementById("log");
const btn = document.getElementById("btn");

function show(text) {
  msg.innerText = text;
}

function debug(label, data) {
  const line = `\n[${label}]\n` + JSON.stringify(data, null, 2);
  log.innerText += line + "\n-------------------\n";
  console.log(label, data);
}

async function signup() {

  const fullName = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  log.innerText = "";
  show("Starting signup...");
  btn.disabled = true;

  // STEP 1: AUTH SIGNUP
  const authRes = await supabase.auth.signUp({
    email,
    password
  });

  debug("AUTH RESPONSE", authRes);

  if (authRes.error) {
    show("AUTH ERROR: " + authRes.error.message);
    btn.disabled = false;
    return;
  }

  const user = authRes.data?.user;

  debug("USER OBJECT", user);

  if (!user) {
    show("No user returned from auth");
    btn.disabled = false;
    return;
  }

  // STEP 2: INSERT INTO USERS TABLE
  const insertRes = await supabase.from("users").insert([{
    id: user.id,
    full_name: fullName,
    email: email,
    role: "pending",
    status: "pending",
    created_at: new Date().toISOString()
  }]);

  debug("INSERT RESPONSE", insertRes);

  if (insertRes.error) {
    show("DB ERROR: " + insertRes.error.message);
    btn.disabled = false;
    return;
  }

  show("SUCCESS: Account created!");
  btn.disabled = false;
}
</script>

</body>
</html>
