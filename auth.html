<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Authentication</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      max-width: 500px;
      width: 100%;
    }
    
    .auth-card {
      background: white;
      border-radius: 30px;
      padding: 40px 35px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo i {
      font-size: 2.5rem;
      color: #ff4da6;
    }
    
    .logo h1 {
      font-size: 1.8rem;
      font-family: 'Playfair Display', serif;
      color: #1a1a2e;
    }
    
    .logo h1 span { color: #ff4da6; }
    .logo p { color: #666; font-size: 0.85rem; margin-top: 5px; }
    
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #ff4da6;
      box-shadow: 0 0 0 3px rgba(255,77,166,0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,77,166,0.3); }
    .btn:disabled { opacity: 0.6; transform: none; }
    
    .switch-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    
    .switch-link a {
      color: #ff4da6;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    
    .forgot-link {
      text-align: right;
      margin: -10px 0 15px;
    }
    
    .forgot-link a {
      color: #999;
      font-size: 0.75rem;
      text-decoration: none;
    }
    
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .message.info { background: #d1ecf1; color: #0c5460; display: block; }
    
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .debug-panel {
      margin-top: 20px;
      background: #1a1a2e;
      color: #00ff88;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .debug-panel h4 {
      color: #ff4da6;
      margin-bottom: 10px;
    }
    
    @media (max-width: 480px) {
      .auth-card { padding: 30px 20px; }
      .logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <i class="fas fa-gem"></i>
      <h1>O.M.O<span>creation</span></h1>
      <p>Luxury Stone Fashion System</p>
    </div>
    
    <!-- Login Form -->
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      <div class="forgot-link">
        <a href="#" id="forgotPasswordBtn">Forgot Password?</a>
      </div>
      <button type="submit" class="btn" id="loginSubmitBtn">Login <i class="fas fa-arrow-right"></i></button>
      <div class="switch-link">
        <p>Don't have an account? <a id="showSignupBtn">Create Account</a></p>
      </div>
    </form>
    
    <!-- Signup Form (hidden) -->
    <form id="signupForm" style="display: none;">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="fullName" placeholder="Full name" required>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signupEmail" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
      </div>
      <div class="input-group">
        <i class="fas fa-check-circle"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn" id="signupSubmitBtn">Create Account <i class="fas fa-user-plus"></i></button>
      <div class="switch-link">
        <p>Already have an account? <a id="showLoginBtn">Login</a></p>
      </div>
    </form>
    
    <div id="messageContainer"></div>
    
    <!-- Debug Panel -->
    <div class="debug-panel" id="debugPanel">
      <h4>🔍 Debug Console</h4>
      <div id="debugLog">Waiting for actions...</div>
    </div>
  </div>
</div>

<script>
  // ============================================
  // YOUR SUPABASE KEYS
  // ============================================
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-JgM9Qf8t9AV3G_rxYXMAA_6YMm8bSg";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // Debug function
  function debugLog(message, type = 'info') {
    const debugDiv = document.getElementById('debugLog');
    const timestamp = new Date().toLocaleTimeString();
    const color = type === 'error' ? '#ff6b6b' : (type === 'success' ? '#00ff88' : '#ffaa44');
    debugDiv.innerHTML += `<div style="color: ${color}; margin-bottom: 5px;">[${timestamp}] ${message}</div>`;
    debugDiv.scrollTop = debugDiv.scrollHeight;
    console.log(`[${timestamp}] ${message}`);
  }
  
  // Show message
  function showMessage(text, type) {
    const messageContainer = document.getElementById('messageContainer');
    messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
    setTimeout(() => {
      messageContainer.innerHTML = '';
    }, 5000);
  }
  
  // Elements
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const showSignupBtn = document.getElementById('showSignupBtn');
  const showLoginBtn = document.getElementById('showLoginBtn');
  const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
  const loginSubmitBtn = document.getElementById('loginSubmitBtn');
  const signupSubmitBtn = document.getElementById('signupSubmitBtn');
  
  debugLog('✅ Auth system initialized');
  debugLog(`🔗 Supabase URL: ${SUPABASE_URL}`);
  debugLog(`🔑 Supabase Key: ${SUPABASE_ANON_KEY.substring(0, 20)}...`);
  
  // Test Supabase connection
  async function testConnection() {
    debugLog('🔄 Testing Supabase connection...');
    const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true });
    if (error) {
      debugLog(`❌ Connection failed: ${error.message}`, 'error');
    } else {
      debugLog(`✅ Supabase connected successfully!`, 'success');
    }
  }
  testConnection();
  
  // Show Signup Form
  showSignupBtn.addEventListener('click', (e) => {
    e.preventDefault();
    debugLog('🔄 Switching to Signup form');
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    document.getElementById('messageContainer').innerHTML = '';
  });
  
  // Show Login Form
  showLoginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    debugLog('🔄 Switching to Login form');
    signupForm.style.display = 'none';
    loginForm.style.display = 'block';
    document.getElementById('messageContainer').innerHTML = '';
  });
  
  // ============================================
  // LOGIN FUNCTION
  // ============================================
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    debugLog('🔐 Login form submitted');
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    debugLog(`📧 Email entered: ${email}`);
    debugLog(`🔒 Password length: ${password.length} characters`);
    
    if (!email || !password) {
      debugLog('❌ Login failed: Missing email or password', 'error');
      showMessage('Please enter email and password', 'error');
      return;
    }
    
    loginSubmitBtn.disabled = true;
    loginSubmitBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    
    debugLog('🔄 Attempting Supabase sign in...');
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
      debugLog(`❌ Login error: ${error.message}`, 'error');
      showMessage(error.message, 'error');
      loginSubmitBtn.disabled = false;
      loginSubmitBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    debugLog(`✅ Supabase auth successful! User ID: ${data.user.id}`, 'success');
    
    // Check user status
    debugLog('🔄 Checking user status from users table...');
    const { data: profile, error: profileError } = await supabase
      .from('users')
      .select('status, role, full_name')
      .eq('id', data.user.id)
      .single();
    
    if (profileError) {
      debugLog(`❌ Profile error: ${profileError.message}`, 'error');
      showMessage('User profile not found. Please contact admin.', 'error');
      loginSubmitBtn.disabled = false;
      loginSubmitBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    debugLog(`📋 User profile: Role=${profile.role}, Status=${profile.status}`, 'success');
    
    if (profile.status !== 'active') {
      debugLog(`❌ Access denied: Account status is ${profile.status}`, 'error');
      showMessage(`Your account is ${profile.status}. Please wait for admin approval.`, 'error');
      await supabase.auth.signOut();
      loginSubmitBtn.disabled = false;
      loginSubmitBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    debugLog(`✅ Login successful! Redirecting to dashboard...`, 'success');
    showMessage('Login successful! Redirecting...', 'success');
    
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1500);
  });
  
  // ============================================
  // SIGNUP FUNCTION
  // ============================================
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    debugLog('📝 Signup form submitted');
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    debugLog(`👤 Name: ${fullName}`);
    debugLog(`📧 Email: ${email}`);
    debugLog(`🔒 Password length: ${password.length}`);
    
    if (!fullName || !email || !password) {
      debugLog('❌ Signup failed: Missing fields', 'error');
      showMessage('Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      debugLog('❌ Signup failed: Passwords do not match', 'error');
      showMessage('Passwords do not match', 'error');
      return;
    }
    
    if (password.length < 6) {
      debugLog('❌ Signup failed: Password too short', 'error');
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    signupSubmitBtn.disabled = true;
    signupSubmitBtn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    debugLog('🔄 Attempting Supabase sign up...');
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    
    if (error) {
      debugLog(`❌ Signup error: ${error.message}`, 'error');
      showMessage(error.message, 'error');
      signupSubmitBtn.disabled = false;
      signupSubmitBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
      return;
    }
    
    debugLog(`✅ Supabase auth successful! User ID: ${data.user.id}`, 'success');
    
    // Insert into users table
    debugLog('🔄 Inserting user into users table...');
    const { error: insertError } = await supabase
      .from('users')
      .insert([{
        id: data.user.id,
        full_name: fullName,
        email: email,
        role: 'pending',
        status: 'pending',
        created_at: new Date().toISOString()
      }]);
    
    if (insertError) {
      debugLog(`❌ Insert error: ${insertError.message}`, 'error');
      showMessage(`Profile creation error: ${insertError.message}`, 'error');
    } else {
      debugLog(`✅ User inserted into users table successfully!`, 'success');
      showMessage('Account created! Waiting for admin approval.', 'success');
    }
    
    signupSubmitBtn.disabled = false;
    signupSubmitBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
    
    // Reset form
    document.getElementById('fullName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    
    // Switch to login after 2 seconds
    setTimeout(() => {
      debugLog('🔄 Switching to login form');
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
    }, 2000);
  });
  
  // ============================================
  // FORGOT PASSWORD
  // ============================================
  forgotPasswordBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    debugLog('🔑 Forgot password requested');
    const email = document.getElementById('loginEmail').value;
    
    if (!email) {
      debugLog('❌ No email entered for password reset', 'error');
      showMessage('Please enter your email address', 'error');
      return;
    }
    
    debugLog(`📧 Sending reset email to: ${email}`);
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    
    if (error) {
      debugLog(`❌ Reset error: ${error.message}`, 'error');
      showMessage(error.message, 'error');
    } else {
      debugLog(`✅ Password reset email sent successfully!`, 'success');
      showMessage(`Password reset link sent to ${email}`, 'success');
    }
  });
  
  // ============================================
  // MASTER ADMIN INFO
  // ============================================
  debugLog('========================================', 'info');
  debugLog('👑 MASTER ADMIN INFORMATION', 'success');
  debugLog('========================================', 'info');
  debugLog('📧 Admin Email: admin@omocreation.com', 'info');
  debugLog('🔑 Default Password: Admin@123', 'info');
  debugLog('💡 After creating admin, update status to "active" in Supabase', 'info');
  debugLog('========================================', 'info');
  
  console.log('%c✨ O.M.Ocreation Auth System Ready', 'color: #ff4da6; font-size: 14px; font-weight: bold;');
  console.log('%c📧 Master Admin Email: admin@omocreation.com', 'color: #00ff88; font-size: 12px;');
  console.log('%c🔑 Default Password: Admin@123', 'color: #ffaa44; font-size: 12px;');
</script>
</body>
</html>
