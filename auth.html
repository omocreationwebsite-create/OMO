<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Sign In · FashionStone ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #fff0f6 0%, #ffffff 50%, #fff0f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container { width: 100%; max-width: 480px; }
    .brand-header { text-align: center; margin-bottom: 30px; }
    .logo-text { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span:first-child { color: var(--dark); }
    .logo-text span:last-child { color: var(--primary); }
    .brand-header p { color: var(--gray); font-size: 0.85rem; margin-top: 5px; }
    .auth-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(12px); border-radius: 30px; padding: 35px 30px; box-shadow: 0 25px 50px -12px rgba(255,77,166,0.25); border: 1px solid rgba(255,77,166,0.15); }
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--primary-soft); padding-bottom: 5px; }
    .auth-tab { flex: 1; text-align: center; padding: 12px 0; font-weight: 600; font-size: 1rem; color: var(--gray); cursor: pointer; border: none; background: none; }
    .auth-tab.active { color: var(--primary); position: relative; }
    .auth-tab.active::after { content: ''; position: absolute; bottom: -7px; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1rem; }
    .input-wrapper input { width: 100%; padding: 14px 16px 14px 48px; border: 1.5px solid rgba(255,77,166,0.2); border-radius: 50px; font-size: 0.9rem; outline: none; transition: all 0.2s; }
    .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,77,166,0.1); }
    .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray); background: none; border: none; }
    .btn { width: 100%; padding: 15px; border-radius: 50px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-message { margin-top: 18px; padding: 14px; border-radius: 50px; font-size: 0.8rem; text-align: center; display: none; }
    .auth-message.error { background: rgba(220,53,69,0.1); color: var(--danger); display: block; }
    .auth-message.success { background: rgba(40,167,69,0.1); color: var(--success); display: block; }
    .auth-message.info { background: rgba(255,77,166,0.1); color: var(--primary-dark); display: block; }
    .pending-notice { text-align: center; padding: 30px 20px; }
    .pending-notice i { font-size: 3.5rem; color: var(--warning); margin-bottom: 20px; }
    .pending-notice h3 { font-size: 1.3rem; margin-bottom: 10px; }
    .pending-notice p { color: var(--gray); margin-bottom: 25px; }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--gray); font-size: 0.75rem; }
    .auth-footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="brand-header">
    <div class="logo-text"><span>Fashion</span><span>Stone</span></div>
    <p>Enterprise Resource Management</p>
  </div>
  <div class="auth-card">
    <div id="mainView">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Register</button>
      </div>
      <form id="loginForm" class="auth-form active">
        <div class="form-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="staff@fashionstone.com" required></div></div>
        <div class="form-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="••••••••" required><button type="button" class="password-toggle" data-target="loginPassword"><i class="fas fa-eye"></i></button></div></div>
        <button type="submit" class="btn" id="loginBtn"><span>Sign In</span></button>
        <div id="loginMessage" class="auth-message"></div>
      </form>
      <form id="signupForm" class="auth-form">
        <div class="form-group"><label>Full Name</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="signupName" placeholder="Oluwaseun Adeyemi" required></div></div>
        <div class="form-group"><label>Phone Number</label><div class="input-wrapper"><i class="fas fa-phone"></i><input type="tel" id="signupPhone" placeholder="08012345678" required></div></div>
        <div class="form-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="staff@fashionstone.com" required></div></div>
        <div class="form-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Min. 8 characters" required><button type="button" class="password-toggle" data-target="signupPassword"><i class="fas fa-eye"></i></button></div></div>
        <div class="form-group"><label>Confirm Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="signupConfirm" placeholder="Re-enter password" required><button type="button" class="password-toggle" data-target="signupConfirm"><i class="fas fa-eye"></i></button></div></div>
        <button type="submit" class="btn" id="signupBtn"><span>Register</span></button>
        <div id="signupMessage" class="auth-message"></div>
      </form>
    </div>
    <div id="pendingView" style="display:none;">
      <div class="pending-notice">
        <i class="fas fa-clock"></i>
        <h3>Registration Submitted!</h3>
        <p>Your account has been created and is pending administrator approval.</p>
        <p style="font-size:0.8rem;">You will be able to login once an admin approves your account.</p>
        <button class="btn" id="backToLoginBtn">Return to Sign In</button>
      </div>
    </div>
  </div>
  <div class="auth-footer">
    <p>© 2026 FashionStone · <a href="index.html">Home</a></p>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI",
    authDomain: "fashion-46e5d.firebaseapp.com",
    projectId: "fashion-46e5d",
    storageBucket: "fashion-46e5d.firebasestorage.app",
    messagingSenderId: "408062284317",
    appId: "1:408062284317:web:eb905bce68926c10a0ecf4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const mainView = document.getElementById('mainView');
  const pendingView = document.getElementById('pendingView');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginMessage = document.getElementById('loginMessage');
  const signupMessage = document.getElementById('signupMessage');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');

  function showMessage(el, msg, type) { el.textContent = msg; el.className = `auth-message ${type}`; }
  function setLoading(btn, loading) { btn.disabled = loading; btn.querySelector('span').textContent = loading ? 'Processing...' : (btn.id === 'loginBtn' ? 'Sign In' : 'Register'); }

  document.querySelectorAll('.auth-tab').forEach(t => t.addEventListener('click', function() {
    document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(this.dataset.tab + 'Form').classList.add('active');
  }));

  document.querySelectorAll('.password-toggle').forEach(t => t.addEventListener('click', function() {
    const input = document.getElementById(this.dataset.target);
    const icon = this.querySelector('i');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
  }));

  document.getElementById('backToLoginBtn').addEventListener('click', () => { mainView.style.display = 'block'; pendingView.style.display = 'none'; });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;

    if (!name || !phone || !email || !password) { showMessage(signupMessage, 'All fields required', 'error'); return; }
    if (password.length < 8) { showMessage(signupMessage, 'Password must be at least 8 characters', 'error'); return; }
    if (password !== confirm) { showMessage(signupMessage, 'Passwords do not match', 'error'); return; }

    setLoading(signupBtn, true);
    try {
      const q = query(collection(db, 'users'), where('email', '==', email));
      const snap = await getDocs(q);
      if (!snap.empty) { showMessage(signupMessage, 'Email already registered', 'error'); setLoading(signupBtn, false); return; }

      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, 'users', user.uid), {
        uid: user.uid, fullName: name, phone, email, role: 'pending', status: 'pending_approval',
        baseSalary: 0, totalPoints: 0, pointValueNaira: 100, tasksCompleted: 0, leaveDaysRemaining: 2,
        profileCompleted: false, createdAt: serverTimestamp()
      });

      await signOut(auth);
      mainView.style.display = 'none';
      pendingView.style.display = 'block';
      signupForm.reset();
    } catch (err) { showMessage(signupMessage, 'Registration failed: ' + err.message, 'error'); }
    setLoading(signupBtn, false);
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showMessage(loginMessage, 'Email and password required', 'error'); return; }

    setLoading(loginBtn, true);
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));

      if (!userDoc.exists()) { await signOut(auth); showMessage(loginMessage, 'Account error. Contact support.', 'error'); setLoading(loginBtn, false); return; }

      const userData = userDoc.data();
      if (userData.status === 'pending_approval') { await signOut(auth); showMessage(loginMessage, 'Your account is pending admin approval', 'info'); setLoading(loginBtn, false); return; }
      if (userData.status === 'suspended' || userData.status === 'terminated') { await signOut(auth); showMessage(loginMessage, `Account ${userData.status}`, 'error'); setLoading(loginBtn, false); return; }

      if (userData.role === 'admin' || userData.role === 'super_admin') window.location.href = 'admin-dashboard.html';
      else if (userData.role === 'attendant' || userData.role === 'attendant_chief') window.location.href = 'attendant-dashboard.html';
      else window.location.href = 'staff-dashboard.html';
    } catch (err) { showMessage(loginMessage, err.code === 'auth/invalid-credential' ? 'Invalid email or password' : 'Login failed', 'error'); }
    setLoading(loginBtn, false);
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists() && userDoc.data().status === 'active') {
        const role = userDoc.data().role;
        if (role === 'admin' || role === 'super_admin') window.location.href = 'admin-dashboard.html';
        else if (role === 'attendant' || role === 'attendant_chief') window.location.href = 'attendant-dashboard.html';
        else if (role === 'staff') window.location.href = 'staff-dashboard.html';
      }
    }
  });
</script>
</body>
</html>
