<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>O.M.Ocreation - Login & Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 40px 35px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo i { font-size: 2.5rem; color: #ff4da6; }
    .logo h1 { font-size: 1.8rem; font-family: 'Playfair Display', serif; color: #1a1a2e; }
    .logo h1 span { color: #ff4da6; }
    .logo p { color: #666; font-size: 0.85rem; }
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff4da6;
    }
    .input-group input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border: 2px solid #eee;
      border-radius: 15px;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #ff4da6;
      box-shadow: 0 0 0 3px rgba(255,77,166,0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff4da6, #e6398c);
      color: white;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,77,166,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .switch-link { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
    .switch-link a { color: #ff4da6; text-decoration: none; font-weight: 600; cursor: pointer; }
    .forgot-link { text-align: right; margin: -10px 0 15px; }
    .forgot-link a { color: #999; font-size: 0.75rem; text-decoration: none; }
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) {
      .auth-card { padding: 30px 20px; }
      .logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="logo">
    <i class="fas fa-gem"></i>
    <h1>O.M.O<span>creation</span></h1>
    <p>Luxury Stone Fashion System</p>
  </div>
  
  <!-- LOGIN FORM -->
  <form id="loginForm">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="Email address" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Password" required>
    </div>
    <div class="forgot-link">
      <a href="#" id="forgotPasswordBtn">Forgot Password?</a>
    </div>
    <button type="submit" class="btn" id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
    <div class="switch-link">
      <p>Don't have an account? <a id="showSignupBtn">Create Account</a></p>
    </div>
  </form>
  
  <!-- SIGNUP FORM (HIDDEN INITIALLY) -->
  <form id="signupForm" style="display: none;">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="fullName" placeholder="Full name" required>
    </div>
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="signupEmail" placeholder="Email address" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
    </div>
    <div class="input-group">
      <i class="fas fa-check-circle"></i>
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
    </div>
    <button type="submit" class="btn" id="signupBtn">Create Account <i class="fas fa-user-plus"></i></button>
    <div class="switch-link">
      <p>Already have an account? <a id="showLoginBtn">Login</a></p>
    </div>
  </form>
  
  <div id="messageContainer"></div>
</div>

<script>
  // ============================================
  // ⚠️ IMPORTANT: REPLACE WITH YOUR REAL ANON KEY
  // Go to Supabase Dashboard → Settings → API
  // Copy the "anon public" key (starts with eyJ)
  // ============================================
  const SUPABASE_URL = "https://gogrmiflvfdetvtggzrk.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_REAL_ANON_KEY_HERE_STARTS_WITH_eyJ";
  
  // Create Supabase client
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  // DOM Elements
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const showSignupBtn = document.getElementById('showSignupBtn');
  const showLoginBtn = document.getElementById('showLoginBtn');
  const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const messageContainer = document.getElementById('messageContainer');
  
  // Show message function
  function showMessage(text, type) {
    messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
    setTimeout(() => {
      messageContainer.innerHTML = '';
    }, 5000);
  }
  
  // Test Supabase connection on load
  async function testConnection() {
    console.log('Testing Supabase connection...');
    const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true });
    if (error) {
      console.error('Supabase connection error:', error);
      showMessage('Database connection error. Please check configuration.', 'error');
    } else {
      console.log('Supabase connected successfully!');
    }
  }
  testConnection();
  
  // Toggle to Signup form
  showSignupBtn.addEventListener('click', (e) => {
    e.preventDefault();
    console.log('Switching to signup form');
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    messageContainer.innerHTML = '';
  });
  
  // Toggle to Login form
  showLoginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    console.log('Switching to login form');
    signupForm.style.display = 'none';
    loginForm.style.display = 'block';
    messageContainer.innerHTML = '';
  });
  
  // ============================================
  // LOGIN HANDLER
  // ============================================
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log('Login form submitted');
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showMessage('Please enter email and password', 'error');
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
      console.error('Login error:', error);
      showMessage(error.message, 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    console.log('Login successful:', data.user.id);
    
    // Check user status in users table
    const { data: profile, error: profileError } = await supabase
      .from('users')
      .select('status, role')
      .eq('id', data.user.id)
      .single();
    
    if (profileError) {
      console.error('Profile error:', profileError);
      showMessage('User profile not found', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    if (profile.status !== 'active') {
      showMessage(`Your account is ${profile.status}. Please wait for admin approval.`, 'error');
      await supabase.auth.signOut();
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
      return;
    }
    
    showMessage('Login successful! Redirecting...', 'success');
    
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1500);
  });
  
  // ============================================
  // SIGNUP HANDLER
  // ============================================
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log('Signup form submitted');
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!fullName || !email || !password) {
      showMessage('Please fill all fields', 'error');
      return;
    }
    
    if (password !== confirmPassword) {
      showMessage('Passwords do not match', 'error');
      return;
    }
    
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', 'error');
      return;
    }
    
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    
    if (error) {
      console.error('Signup error:', error);
      showMessage(error.message, 'error');
      signupBtn.disabled = false;
      signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
      return;
    }
    
    console.log('Signup successful:', data.user.id);
    
    // Insert into users table
    const { error: insertError } = await supabase
      .from('users')
      .insert([{
        id: data.user.id,
        full_name: fullName,
        email: email,
        role: 'pending',
        status: 'pending',
        created_at: new Date().toISOString()
      }]);
    
    if (insertError) {
      console.error('Insert error:', insertError);
      showMessage(`Profile error: ${insertError.message}`, 'error');
    } else {
      showMessage('Account created! Waiting for admin approval.', 'success');
    }
    
    signupBtn.disabled = false;
    signupBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
    
    // Reset form
    document.getElementById('fullName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    
    // Switch to login after 2 seconds
    setTimeout(() => {
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
    }, 2000);
  });
  
  // ============================================
  // FORGOT PASSWORD HANDLER
  // ============================================
  forgotPasswordBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    
    if (!email) {
      showMessage('Please enter your email address', 'error');
      return;
    }
    
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    
    if (error) {
      console.error('Reset error:', error);
      showMessage(error.message, 'error');
    } else {
      showMessage(`Password reset link sent to ${email}`, 'success');
    }
  });
  
  console.log('%c✨ O.M.Ocreation Auth System Ready', 'color: #ff4da6; font-size: 14px; font-weight: bold;');
  console.log('%c⚠️ Make sure you replaced SUPABASE_ANON_KEY with your real anon key (starts with eyJ)', 'color: #ffaa44; font-size: 12px;');
</script>
</body>
</html>
