<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Admin Dashboard · Omocreations</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* All existing styles remain exactly the same as in your original file */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6; --sidebar-width: 280px; --sidebar-collapsed: 80px; --header-height: 70px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; transition: width 0.25s ease; z-index: 100; }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar.collapsed .logo-text, .sidebar.collapsed .nav-text, .sidebar.collapsed .user-details, .sidebar.collapsed .nav-section-title { display: none; }
    .sidebar-nav { padding: 20px 12px; display: flex; flex-direction: column; height: calc(100vh - 180px); overflow-y: auto; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); margin-bottom: 10px; padding-left: 14px; font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; text-align: left; margin-bottom: 3px; transition: all 0.15s; }
    .nav-item i { width: 22px; font-size: 1.1rem; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: auto; }
    .nav-item .nav-badge { margin-left: auto; background: var(--danger); color: white; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 30px; display: inline-block; }
    .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 16px; border-top: 1px solid rgba(255,255,255,0.06); background: inherit; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.25s ease; min-height: 100vh; width: calc(100% - var(--sidebar-width)); }
    .sidebar.collapsed + .main-content { margin-left: var(--sidebar-collapsed); width: calc(100% - var(--sidebar-collapsed)); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 50; }
    .top-bar-left { display: flex; align-items: center; gap: 18px; }
    .menu-toggle { background: none; border: none; font-size: 1.2rem; color: var(--gray); cursor: pointer; padding: 10px; border-radius: 10px; }
    .menu-toggle:hover { background: var(--primary-soft); color: var(--primary); }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .top-bar-right { display: flex; align-items: center; gap: 16px; }
    .date-badge { display: flex; align-items: center; gap: 8px; color: var(--gray); font-size: 0.8rem; background: var(--gray-light); padding: 8px 14px; border-radius: 30px; }
    .notification-btn { position: relative; cursor: pointer; padding: 10px; border-radius: 10px; background: none; border: none; }
    .notification-btn:hover { background: var(--primary-soft); }
    .notification-badge { position: absolute; top: 4px; right: 4px; background: var(--danger); color: white; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 30px; }
    .content-wrapper { padding: 28px; max-width: 1600px; margin: 0 auto; }
    .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; padding: 18px 16px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(255,77,166,0.08); }
    .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.65rem; color: var(--gray); font-weight: 600; text-transform: uppercase; }
    .stat-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--dark); }
    .stat-change { font-size: 0.65rem; margin-top: 6px; }
    .stat-change.positive { color: var(--success); } .stat-change.negative { color: var(--danger); }
    .quick-actions { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
    .quick-action { background: white; padding: 16px 12px; border-radius: 18px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.03); transition: all 0.15s; }
    .quick-action:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(255,77,166,0.1); border-color: var(--primary); }
    .quick-action i { font-size: 1.6rem; color: var(--primary); margin-bottom: 8px; }
    .quick-action h4 { font-size: 0.8rem; margin-bottom: 3px; color: var(--dark); }
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 10px; }
    .table-wrapper { overflow-x: auto; border-radius: 16px; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
    .data-table th { text-align: left; padding: 14px 12px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 16px 12px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    .badge { padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
    .btn { padding: 10px 18px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 6px 14px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); }
    .toast.show { transform: translateX(0); }
    .export-dropdown { position: relative; display: inline-block; }
    .export-menu { position: absolute; top: 100%; right: 0; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-width: 150px; display: none; z-index: 50; }
    .export-menu.show { display: block; }
    .export-item { padding: 10px 16px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .export-item:hover { background: var(--primary-soft); }
    
    @media (max-width: 1400px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .quick-actions { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 992px) { .sidebar { width: var(--sidebar-collapsed); } .sidebar .logo-text, .sidebar .nav-text, .sidebar .user-details, .sidebar .nav-section-title { display: none; } .main-content { margin-left: var(--sidebar-collapsed); } }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); width: var(--sidebar-width); } .sidebar:not(.collapsed) { transform: translateX(0); } .sidebar .logo-text, .sidebar .nav-text, .sidebar .user-details, .sidebar .nav-section-title { display: block; } .main-content { margin-left: 0 !important; width: 100% !important; } .content-wrapper { padding: 18px 14px; } .stats-grid { grid-template-columns: 1fr; } .quick-actions { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [];
  let cachedData = { inventory: [], sales: [], purchases: [], customers: [], pendingUsers: [], audit: [] };

  function formatTime(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}); }
  function formatDate(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }
  function cleanup() { unsubscribes.forEach(u => u()); unsubscribes = []; }

  window.toggleSidebar = () => { const s = document.getElementById('sidebar'), o = document.getElementById('sidebarOverlay'); if (window.innerWidth <= 768) { s.classList.toggle('collapsed'); o.style.display = s.classList.contains('collapsed') ? 'none' : 'block'; } else { s.classList.toggle('collapsed'); } };
  window.closeSidebar = () => { document.getElementById('sidebar').classList.add('collapsed'); document.getElementById('sidebarOverlay').style.display = 'none'; };
  window.toggleExportMenu = (menuId) => { document.getElementById(menuId).classList.toggle('show'); };
  document.addEventListener('click', (e) => { if (!e.target.closest('.export-dropdown')) { document.querySelectorAll('.export-menu').forEach(m => m.classList.remove('show')); } });

  // ========== NOTIFICATION BADGES (REAL-TIME) ==========
  function loadNotificationBadges() {
    let pendingUsers = 0, pendingStock = 0, pendingPurchases = 0, pendingCustomers = 0, pendingLeave = 0;
    
    // Approvals badge = sum of all pending items
    const usersQuery = query(collection(db, 'users'), where('status', '==', 'pending_approval'));
    unsubscribes.push(onSnapshot(usersQuery, (snap) => { pendingUsers = snap.size; updateBadges(); console.log('👤 Pending users:', pendingUsers); }));
    
    const stockQuery = query(collection(db, 'stock_items'), where('status', '==', 'pending_approval'));
    unsubscribes.push(onSnapshot(stockQuery, (snap) => { pendingStock = snap.size; updateBadges(); console.log('📦 Pending stock:', pendingStock); }));
    
    const purchasesQuery = query(collection(db, 'purchase_requests'), where('status', '==', 'pending_approval'));
    unsubscribes.push(onSnapshot(purchasesQuery, (snap) => { pendingPurchases = snap.size; updateBadges(); console.log('🛒 Pending purchases:', pendingPurchases); }));
    
    const customersQuery = query(collection(db, 'customers'), where('status', '==', 'pending'));
    unsubscribes.push(onSnapshot(customersQuery, (snap) => { pendingCustomers = snap.size; updateBadges(); console.log('👥 Pending customers:', pendingCustomers); }));
    
    const leaveQuery = query(collection(db, 'leave_requests'), where('status', '==', 'pending'));
    unsubscribes.push(onSnapshot(leaveQuery, (snap) => { pendingLeave = snap.size; updateBadges(); console.log('🏖️ Pending leave:', pendingLeave); }));
    
    // Inventory badge = low + out of stock
    const lowStockQuery = query(collection(db, 'stock_items'), where('status', 'in', ['low', 'out_of_stock']));
    unsubscribes.push(onSnapshot(lowStockQuery, (snap) => {
      document.getElementById('inventoryBadge').textContent = snap.size;
      console.log('⚠️ Low/out stock:', snap.size);
    }));
    
    // Purchases badge = pending approval (same as above but separate element)
    unsubscribes.push(onSnapshot(purchasesQuery, (snap) => {
      document.getElementById('purchasesBadge').textContent = snap.size;
    }));
    
    // Customers badge = pending approval
    unsubscribes.push(onSnapshot(customersQuery, (snap) => {
      document.getElementById('customersBadge').textContent = snap.size;
    }));
    
    // Sales badge = today's transaction count
    const today = new Date().toISOString().split('T')[0];
    const salesQuery = query(collection(db, 'sales'), where('createdAt', '>=', new Date(today)));
    unsubscribes.push(onSnapshot(salesQuery, (snap) => {
      document.getElementById('salesBadge').textContent = snap.size;
      console.log('💰 Today sales count:', snap.size);
    }));
    
    function updateBadges() {
      const totalApprovals = pendingUsers + pendingStock + pendingPurchases + pendingCustomers + pendingLeave;
      document.getElementById('approvalsBadge').textContent = totalApprovals;
      const notifBadge = document.getElementById('notificationCount');
      notifBadge.textContent = totalApprovals;
      notifBadge.style.display = totalApprovals > 0 ? 'flex' : 'none';
    }
  }

  // ========== DASHBOARD DATA ==========
  function loadDashboard() {
    cleanup();
    loadNotificationBadges(); // <--- Critical: load all badges
    
    // Users stats
    onSnapshot(collection(db, 'users'), (snap) => {
      const users = snap.docs.map(d => ({id: d.id, ...d.data()}));
      const staff = users.filter(u => u.role?.includes('attendant') || u.role === 'staff');
      const active = staff.filter(u => u.status === 'active');
      cachedData.pendingUsers = users.filter(u => u.status === 'pending_approval');
      document.getElementById('totalStaff').textContent = staff.length;
      document.getElementById('activeStaff').textContent = `${active.length} active`;
    });
    
    // Customers stats
    onSnapshot(collection(db, 'customers'), (snap) => {
      const customers = snap.docs.map(d => ({id: d.id, ...d.data()}));
      const approved = customers.filter(c => c.status === 'approved');
      cachedData.customers = approved;
      document.getElementById('totalCustomers').textContent = approved.length;
      
      const tbody = document.getElementById('recentCustomersTable'); if(tbody) { tbody.innerHTML = '';
      const recent = approved.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)).slice(0, 5);
      if (recent.length === 0) tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-user"></i><p>No customers yet</p></div></td></tr>';
      else recent.forEach(c => { tbody.innerHTML += `<tr><td>${c.fullName||'-'}</td><td>${c.phone||'-'}</td><td>${c.location||'-'}</td><td>${formatCurrency(c.totalSpent)}</td><td>${c.purchaseCount||0}</td><td><span class="badge ${c.status==='approved'?'badge-success':'badge-pending'}">${c.status}</span></td></tr>`; }); }
    });
    
    // Stock stats
    onSnapshot(collection(db, 'stock_items'), (snap) => {
      const items = snap.docs.map(d => ({id: d.id, ...d.data()}));
      cachedData.inventory = items.filter(i => i.status !== 'pending_approval');
      const totalStock = items.reduce((s, i) => s + (i.quantityAvailable || 0), 0);
      const totalSold = items.reduce((s, i) => s + (i.quantitySold || 0), 0);
      document.getElementById('totalStock').textContent = totalStock;
      document.getElementById('totalSold').textContent = totalSold;
      
      const tbody = document.getElementById('stockTable'); if(tbody) { tbody.innerHTML = '';
      const availableItems = items.filter(i => i.status !== 'pending_approval').slice(0, 5);
      if (availableItems.length === 0) tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fas fa-box"></i><p>No stock items</p></div></td></tr>';
      else availableItems.forEach(i => { tbody.innerHTML += `<tr><td>${i.name}</td><td>${i.quantityAvailable||0}</td><td>${i.quantitySold||0}</td><td><span class="badge ${i.status==='low'?'badge-warning':i.status==='out_of_stock'?'badge-danger':'badge-success'}">${i.status||'available'}</span></td></tr>`; }); }
    });
    
    // Money In/Out (MTD)
    const now = new Date(); const thisMonth = now.getMonth(); const thisYear = now.getFullYear();
    onSnapshot(collection(db, 'sales'), (snap) => { 
      let rev = 0; const sales = snap.docs.map(d => ({id: d.id, ...d.data()})); cachedData.sales = sales;
      sales.forEach(s => { const dt = s.createdAt?.toDate(); if (dt && dt.getMonth()===thisMonth && dt.getFullYear()===thisYear) rev += s.totalAmount||0; }); 
      document.getElementById('moneyIn').textContent = formatCurrency(rev); 
      const tbody = document.getElementById('recentSalesTable'); if(tbody) { tbody.innerHTML = '';
      const recent = sales.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)).slice(0, 5);
      if (recent.length === 0) tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fas fa-receipt"></i><p>No sales yet</p></div></td></tr>';
      else recent.forEach(s => { tbody.innerHTML += `<tr><td>${formatTime(s.createdAt)}</td><td>${s.customerName||'Walk-in'}</td><td>${formatCurrency(s.totalAmount)}</td><td>${s.paymentMethod}</td></tr>`; }); }
    });
    
    onSnapshot(collection(db, 'purchase_requests'), (snap) => { 
      let exp = 0; const purchases = snap.docs.map(d => ({id: d.id, ...d.data()})); cachedData.purchases = purchases;
      purchases.forEach(p => { if (p.status === 'purchased') { const dt = p.purchasedAt?.toDate(); if (dt && dt.getMonth()===thisMonth && dt.getFullYear()===thisYear) { const total = p.receivedItems?.reduce((s,i)=>s+((i.received||i.suggested)*(i.price||i.unitPrice)),0)||0; exp += total; } } }); 
      document.getElementById('moneyOut').textContent = formatCurrency(exp); 
      const tbody = document.getElementById('recentPurchasesTable'); if(tbody) { tbody.innerHTML = '';
      const recent = purchases.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)).slice(0, 5);
      if (recent.length === 0) tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fas fa-truck"></i><p>No purchases yet</p></div></td></tr>';
      else recent.forEach(p => { const total = p.items?.reduce((s,i)=>s+((i.suggested||0)*(i.price||i.unitPrice||0)),0)||0; tbody.innerHTML += `<tr><td>${formatDate(p.createdAt)}</td><td>${p.items?.length||0} items</td><td><span class="badge badge-${p.status==='approved'?'success':p.status==='purchased'?'info':'warning'}">${p.status}</span></td><td>${formatCurrency(total)}</td></tr>`; }); }
    });
    
    // Pending users table
    const pendingQuery = query(collection(db, 'users'), where('status', '==', 'pending_approval'), orderBy('createdAt', 'desc'), limit(5));
    unsubscribes.push(onSnapshot(pendingQuery, (snap) => { const tbody = document.getElementById('pendingUsersTable'); if(tbody) { tbody.innerHTML = ''; if (snap.empty) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending approvals</p></div></td></tr>'; return; } snap.forEach(d => { const u = d.data(); tbody.innerHTML += `<tr><td><strong>${u.fullName||'-'}</strong></td><td>${u.email||'-'}</td><td>${formatDate(u.createdAt)}</td><td><button class="btn btn-sm btn-success" onclick="window.location.href='approvals.html'"><i class="fas fa-check"></i> Review</button></td></tr>`; }); } }));
    
    // Audit logs
    const auditQuery = query(collection(db, 'audit_logs'), orderBy('performedAt', 'desc'), limit(8));
    unsubscribes.push(onSnapshot(auditQuery, (snap) => { const audits = snap.docs.map(d => ({id: d.id, ...d.data()})); cachedData.audit = audits; const tbody = document.getElementById('auditTable'); if(tbody) { tbody.innerHTML = ''; if (snap.empty) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fas fa-history"></i><p>No activity yet</p></div></td></tr>'; return; } snap.forEach(d => { const a = d.data(); tbody.innerHTML += `<tr><td>${formatTime(a.performedAt)}</td><td>${a.actionType}</td><td>${a.performedByName||a.performedBy?.slice(0,8)||'System'}</td><td>${a.note||'-'}</td></tr>`; }); } }));
    
    loadAlerts();
  }

  async function loadAlerts() {
    const container = document.getElementById('alertsContainer'); if(!container) return;
    const alerts = [];
    const stockSnap = await getDocs(query(collection(db, 'stock_items'), where('status', 'in', ['low', 'out_of_stock'])));
    if (!stockSnap.empty) alerts.push({type:'warning', icon:'box', text:`${stockSnap.size} items running low or out of stock`});
    const pendingSnap = await getDocs(query(collection(db, 'users'), where('status', '==', 'pending_approval')));
    if (!pendingSnap.empty) alerts.push({type:'warning', icon:'user-clock', text:`${pendingSnap.size} users awaiting approval`});
    const pendingPurchases = await getDocs(query(collection(db, 'purchase_requests'), where('status', '==', 'pending_approval')));
    if (!pendingPurchases.empty) alerts.push({type:'info', icon:'shopping-cart', text:`${pendingPurchases.size} purchase requests pending`});
    container.innerHTML = alerts.length ? alerts.map(a => `<div class="alert-item ${a.type}"><i class="fas fa-${a.icon}"></i><p>${a.text}</p></div>`).join('') : '<div class="empty-state"><i class="far fa-bell"></i><p>No alerts</p></div>';
  }

  window.refreshAlerts = () => { loadAlerts(); showToast('Alerts refreshed', 'success'); };

  // Export function (keep as is)
  window.exportData = (type, format) => { /* ... same as before ... */ };

  onAuthStateChanged(auth, async (u) => { 
    if (!u) { window.location.href = 'auth.html'; return; } 
    currentUser = u; 
    const snap = await getDoc(doc(db, 'users', u.uid)); 
    if (!snap.exists() || (snap.data().role !== 'admin' && snap.data().role !== 'super_admin')) { window.location.href = 'auth.html'; return; } 
    userData = snap.data(); 
    document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'Admin'; 
    document.getElementById('userRole').textContent = userData.role === 'super_admin' ? 'Super Admin' : 'Admin'; 
    document.getElementById('userAvatar').textContent = (userData.fullName||'A').charAt(0); 
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); 
    loadDashboard(); 
    logAudit('dashboard_view', 'Admin viewed dashboard'); 
  });
  
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
  window.addEventListener('beforeunload', cleanup);
</script>
</body>
</html>
