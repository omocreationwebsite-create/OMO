<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Audit Logs · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 70px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-select { padding: 12px 20px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; background: white; }
    .search-wrapper { flex: 1; min-width: 200px; position: relative; }
    .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .search-input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; outline: none; }
    .panel { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .data-table th { text-align: left; padding: 14px 10px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-danger { background: var(--danger); color: white; }
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='approvals.html'"><i class="fas fa-check-circle"></i><span>Approvals</span></button>
    <button class="nav-item" onclick="window.location.href='staff-management.html'"><i class="fas fa-users-cog"></i><span>Staff Management</span></button>
    <button class="nav-item" onclick="window.location.href='finance.html'"><i class="fas fa-chart-line"></i><span>Finance</span></button>
    <button class="nav-item active"><i class="fas fa-history"></i><span>Audit Logs</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Admin</h4><p id="userRole">Admin</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Audit Logs</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    
    <div class="filter-bar">
      <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search by user or details..."></div>
      <select class="filter-select" id="actionFilter"><option value="all">All Actions</option><option value="approve_user">Approve User</option><option value="reject_user">Reject User</option><option value="task_assigned">Task Assigned</option><option value="task_submit">Task Submitted</option><option value="sale">Sale</option><option value="add_item">Add Item</option><option value="restock">Restock</option><option value="purchase_completed">Purchase Completed</option><option value="attendance_kiosk">Attendance</option><option value="login">Login</option><option value="logout">Logout</option></select>
      <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> Export</button>
      <button class="btn btn-outline" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-history"></i> System Activity Log</h3><button class="btn btn-danger btn-sm" id="requestDeleteBtn"><i class="fas fa-trash-alt"></i> Request Deletion</button></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Timestamp</th><th>Action</th><th>User</th><th>Collection</th><th>Document ID</th><th>Details</th></tr></thead><tbody id="auditTable"></tbody></table></div>
    </div>
    
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allLogs = [], currentFilter = 'all';

  function formatDateTime(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  async function logAudit(action, note) { try { await addDoc(collection(db, 'audit_logs'), { actionType: action, performedBy: currentUser?.uid, performedByName: userData?.fullName, performedAt: serverTimestamp(), note }); } catch(e) {} }

  function renderAudit() {
    let filtered = [...allLogs]; const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(l => (l.performedByName||'').toLowerCase().includes(search) || (l.note||'').toLowerCase().includes(search));
    if (currentFilter !== 'all') filtered = filtered.filter(l => l.actionType === currentFilter);
    
    const tbody = document.getElementById('auditTable'); tbody.innerHTML = '';
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No audit logs found</div></td></tr>'; return; }
    filtered.slice(0, 100).forEach(l => { tbody.innerHTML += `<tr><td>${formatDateTime(l.performedAt)}</td><td>${l.actionType}</td><td>${l.performedByName||l.performedBy?.slice(0,8)||'System'}</td><td>${l.collectionName||'-'}</td><td>${l.documentId?.slice(0,12)||'-'}</td><td>${l.note||'-'}</td></tr>`; });
  }

  function loadAuditLogs() { unsubscribes.forEach(u => u()); unsubscribes = []; unsubscribes.push(onSnapshot(query(collection(db, 'audit_logs'), orderBy('performedAt', 'desc')), snap => { allLogs = snap.docs.map(d => ({id:d.id, ...d.data()})); renderAudit(); })); }

  window.requestDeleteAudit = async () => { const days = prompt('Delete logs older than how many days? (e.g., 30)'); if (!days) return; const reqRef = await addDoc(collection(db, 'deletion_requests'), { type: 'audit_logs', days: parseInt(days), requestedBy: currentUser.uid, requestedByName: userData.fullName, status: 'pending_approval', createdAt: serverTimestamp(), approvedBy: [] }); const admins = await getDocs(query(collection(db, 'users'), where('role', 'in', ['admin','super_admin']))); admins.forEach(async d => { if (d.id !== currentUser.uid) await addDoc(collection(db, 'notifications'), { userId: d.id, type: 'deletion_approval', title: 'Audit Deletion Request', message: `${userData.fullName} requested deletion of logs older than ${days} days.`, isRead: false, requestId: reqRef.id, createdAt: serverTimestamp() }); }); await logAudit('deletion_request', `Requested deletion of logs > ${days} days`); showToast('Deletion request sent for approval', 'info'); };

  window.refreshData = () => loadAuditLogs();

  document.getElementById('exportBtn').addEventListener('click', () => { let filtered = allLogs; const search = document.getElementById('searchInput').value.toLowerCase(); if (search) filtered = filtered.filter(l => (l.performedByName||'').toLowerCase().includes(search) || (l.note||'').toLowerCase().includes(search)); if (currentFilter !== 'all') filtered = filtered.filter(l => l.actionType === currentFilter); const csv = ['Timestamp,Action,User,Collection,Document ID,Details'].concat(filtered.map(l => `"${formatDateTime(l.performedAt)}","${l.actionType}","${l.performedByName||l.performedBy}","${l.collectionName||''}","${l.documentId||''}","${l.note||''}"`)).join('\n'); const b = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `audit_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Exported', 'success'); });
  document.getElementById('searchInput').addEventListener('input', renderAudit);
  document.getElementById('actionFilter').addEventListener('change', e => { currentFilter = e.target.value; renderAudit(); });
  document.getElementById('requestDeleteBtn').addEventListener('click', requestDeleteAudit);

  onAuthStateChanged(auth, async (u) => { if (!u) { window.location.href = 'auth.html'; return; } currentUser = u; const snap = await getDoc(doc(db, 'users', u.uid)); if (!snap.exists() || (snap.data().role !== 'admin' && snap.data().role !== 'super_admin')) { window.location.href = 'auth.html'; return; } userData = snap.data(); document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'Admin'; document.getElementById('userRole').textContent = userData.role; document.getElementById('userAvatar').textContent = (userData.fullName||'A').charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadAuditLogs(); });
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
</script>
</body>
</html>
