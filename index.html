<!DOCTYPE html>
<html>
<head>
  <title>Image Test - Absolute Path</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    img { max-width: 150px; margin: 5px; border: 2px solid #ccc; }
    .good { border-color: green; }
    .bad { border-color: red; }
  </style>
</head>
<body>
  <h1>Testing with /OMO/assets/ path</h1>
  <div id="hero"></div>
  <div id="gallery"></div>
  <div id="logo"></div>

  <script>
    const hero = ['p1','p2','p3','p4','p5','p6'];
    const gallery = ['pp1','pp2','pp3','pp4','pp5','pp6'];
    const logo = 'log1';

    const heroDiv = document.getElementById('hero');
    const galleryDiv = document.getElementById('gallery');
    const logoDiv = document.getElementById('logo');

    hero.forEach(f => {
      const img = new Image();
      img.src = `/OMO/assets/${f}.jpg`;
      img.onload = () => { img.style.borderColor = 'green'; console.log('✅', img.src); };
      img.onerror = () => { img.style.borderColor = 'red'; console.log('❌', img.src); };
      heroDiv.appendChild(img);
      heroDiv.appendChild(document.createTextNode(` ${img.src} `));
      heroDiv.appendChild(document.createElement('br'));
    });

    gallery.forEach(f => {
      const img = new Image();
      img.src = `/OMO/assets/${f}.jpg`;
      img.onload = () => { img.style.borderColor = 'green'; console.log('✅', img.src); };
      img.onerror = () => { img.style.borderColor = 'red'; console.log('❌', img.src); };
      galleryDiv.appendChild(img);
      galleryDiv.appendChild(document.createTextNode(` ${img.src} `));
      galleryDiv.appendChild(document.createElement('br'));
    });

    const logoImg = new Image();
    logoImg.src = `/OMO/assets/${logo}.jpg`;
    logoImg.onload = () => { logoImg.style.borderColor = 'green'; console.log('✅', logoImg.src); };
    logoImg.onerror = () => { logoImg.style.borderColor = 'red'; console.log('❌', logoImg.src); };
    logoDiv.appendChild(logoImg);
    logoDiv.appendChild(document.createTextNode(` ${logoImg.src} `));
  </script>
</body>
</html>
