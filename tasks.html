<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Tasks · Omocreations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6; --header-height: 70px; --sidebar-width: 280px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 24px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
    .logo-text { font-size: 1.25rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .nav-item i { width: 22px; } .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.85rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 40; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 28px; max-width: 1600px; }
    
    .tabs-container { background: white; border-radius: 20px; padding: 6px; margin-bottom: 24px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tab { padding: 14px 24px; border-radius: 16px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; background: none; color: var(--gray); flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .tab.active { background: var(--primary); color: white; }
    
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrapper { flex: 1; min-width: 200px; position: relative; }
    .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .search-input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 40px; font-size: 0.85rem; outline: none; }
    
    .panel { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .panel-header h3 { font-size: 1.1rem; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 10px; }
    
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    .data-table th { text-align: left; padding: 14px 10px; font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    
    .badge { padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-info { background: rgba(59,130,246,0.1); color: var(--info); }
    .badge-pending { background: rgba(107,114,128,0.1); color: var(--gray); }
    
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid rgba(0,0,0,0.08); transition: all 0.15s; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-outline { border: 1.5px solid rgba(255,77,166,0.3); color: var(--primary); background: transparent; }
    .btn-sm { padding: 6px 12px; }
    .btn-success { background: var(--success); color: white; }
    
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal { background: white; border-radius: 28px; padding: 28px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px; font-size: 0.9rem; outline: none; background: white; }
    
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 12px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    
    .page-view { display: none; } .page-view.active { display: block; }
    
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .content-wrapper { padding: 16px; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">✨</div><div class="logo-text"><span>Omo</span>creations</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="window.location.href='attendant-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='inventory.html'"><i class="fas fa-box"></i><span>Inventory</span></button>
    <button class="nav-item" onclick="window.location.href='purchases.html'"><i class="fas fa-shopping-cart"></i><span>Purchases</span></button>
    <button class="nav-item" onclick="window.location.href='customers.html'"><i class="fas fa-users"></i><span>Customers</span></button>
    <button class="nav-item" onclick="window.location.href='sales.html'"><i class="fas fa-cash-register"></i><span>Sales</span></button>
    <button class="nav-item active"><i class="fas fa-clipboard-list"></i><span>Tasks</span></button>
    <button class="nav-item" onclick="window.location.href='attendant-profile.html'"><i class="fas fa-user"></i><span>Profile</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Attendant</h4><p id="userRole">Attendant</p></div></div></div>
</aside>

<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Task Management</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    
    <div class="tabs-container">
      <button class="tab active" data-tab="all">All Tasks</button>
      <button class="tab" data-tab="pending">Pending</button>
      <button class="tab" data-tab="inprogress">In Progress</button>
      <button class="tab" data-tab="completed">Completed</button>
    </div>
    
    <div class="filter-bar">
      <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search tasks..."></div>
      <button class="btn btn-primary" onclick="openAssignTaskModal()"><i class="fas fa-plus"></i> Assign Task</button>
    </div>
    
    <div id="allPanel" class="page-view active">
      <div class="panel">
        <div class="panel-header"><h3><i class="fas fa-list"></i> All Tasks</h3></div>
        <div class="table-wrapper"><table class="data-table"><thead><tr><th>Task</th><th>Assigned To</th><th>Deadline</th><th>Status</th><th>Points</th><th>Actions</th></tr></thead><tbody id="allTasksTable"></tbody></table></div>
      </div>
    </div>
    
    <div id="pendingPanel" class="page-view"><div class="panel"><div class="panel-header"><h3>Pending Tasks</h3></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Task</th><th>Assigned To</th><th>Deadline</th><th>Actions</th></tr></thead><tbody id="pendingTable"></tbody></table></div></div></div>
    <div id="inprogressPanel" class="page-view"><div class="panel"><div class="panel-header"><h3>In Progress</h3></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Task</th><th>Assigned To</th><th>Started</th><th>Deadline</th><th>Actions</th></tr></thead><tbody id="inprogressTable"></tbody></table></div></div></div>
    <div id="completedPanel" class="page-view"><div class="panel"><div class="panel-header"><h3>Completed Tasks</h3></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Task</th><th>Assigned To</th><th>Completed</th><th>Points</th></tr></thead><tbody id="completedTable"></tbody></table></div></div></div>
    
  </div>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-header"><h3 id="modalTitle">Assign Task</h3><button class="modal-close" onclick="hideModal()">&times;</button></div><div id="modalContent"></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp, getDocs, where, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null, userData = null, unsubscribes = [], allTasks = [], allStaff = [];

  function formatDate(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }
  function formatDateTime(d) { if (!d) return '-'; const date = d.toDate ? d.toDate() : new Date(d); return date.toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  window.hideModal = () => document.getElementById('modalOverlay').style.display = 'none';
  function showModal(title, content) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalContent').innerHTML = content; document.getElementById('modalOverlay').style.display = 'flex'; }

  function getUserName(uid) { const u = allStaff.find(s => s.id === uid); return u?.fullName?.split(' ')[0] || 'Unknown'; }

  async function loadStaff() {
    const snap = await getDocs(query(collection(db, 'users'), where('role', '==', 'staff'), where('status', '==', 'active')));
    allStaff = snap.docs.map(d => ({id: d.id, ...d.data()}));
  }

  function renderTasks() {
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = allTasks.filter(t => (t.title || '').toLowerCase().includes(searchTerm) || getUserName(t.assignedTo).toLowerCase().includes(searchTerm));
    
    const allTbody = document.getElementById('allTasksTable'); allTbody.innerHTML = '';
    const pendingTbody = document.getElementById('pendingTable'); pendingTbody.innerHTML = '';
    const inprogressTbody = document.getElementById('inprogressTable'); inprogressTbody.innerHTML = '';
    const completedTbody = document.getElementById('completedTable'); completedTbody.innerHTML = '';
    
    if (filtered.length === 0) { allTbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No tasks found</div></td></tr>'; return; }
    
    filtered.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    
    filtered.forEach(t => {
      const userName = getUserName(t.assignedTo);
      allTbody.innerHTML += `<tr><td>${t.title}</td><td>${userName}</td><td>${formatDateTime(t.deadline)}</td><td><span class="badge badge-${t.status==='completed'?'success':t.status==='in_progress'?'info':'warning'}">${t.status}</span></td><td>${t.pointsEarned || 0}/${t.pointsValue || 5}</td><td>${t.status === 'in_progress' ? `<button class="btn btn-sm btn-success" onclick="submitForStaff('${t.assignedTo}', '${t.id}')">Submit</button>` : '-'}</td></tr>`;
      
      if (t.status === 'pending') pendingTbody.innerHTML += `<tr><td>${t.title}</td><td>${userName}</td><td>${formatDateTime(t.deadline)}</td><td>-</td></tr>`;
      else if (t.status === 'in_progress') inprogressTbody.innerHTML += `<tr><td>${t.title}</td><td>${userName}</td><td>${formatDate(t.startedAt)}</td><td>${formatDateTime(t.deadline)}</td><td><button class="btn btn-sm btn-success" onclick="submitForStaff('${t.assignedTo}', '${t.id}')">Submit</button></td></tr>`;
      else if (t.status === 'completed') completedTbody.innerHTML += `<tr><td>${t.title}</td><td>${userName}</td><td>${formatDateTime(t.submittedAt)}</td><td>${t.pointsEarned || 0}</td></tr>`;
    });
    
    if (pendingTbody.children.length === 0) pendingTbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No pending tasks</div></td></tr>';
    if (inprogressTbody.children.length === 0) inprogressTbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No tasks in progress</div></td></tr>';
    if (completedTbody.children.length === 0) completedTbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No completed tasks</div></td></tr>';
  }

  function loadTasks() { 
    unsubscribes.forEach(u => u()); unsubscribes = []; 
    unsubscribes.push(onSnapshot(query(collection(db, 'tasks'), orderBy('createdAt', 'desc')), async (snap) => { 
      await loadStaff();
      allTasks = snap.docs.map(d => ({id: d.id, ...d.data()})); 
      renderTasks(); 
    })); 
  }

  window.openAssignTaskModal = () => {
    let opts = ''; allStaff.forEach(s => opts += `<option value="${s.id}">${s.fullName}</option>`);
    showModal('Assign Task', `<div class="form-group"><label>Task Title</label><input class="form-control" id="taskTitle" placeholder="e.g., Restock shelves"></div><div class="form-group"><label>Assign To</label><select class="form-control" id="taskAssignee">${opts}</select></div><div class="form-group"><label>Deadline</label><input type="datetime-local" class="form-control" id="taskDeadline"></div><button class="btn btn-primary" onclick="createTask()">Assign Task (5 points)</button>`);
  };

  window.createTask = async () => {
    const title = document.getElementById('taskTitle')?.value.trim(), assignee = document.getElementById('taskAssignee')?.value, deadline = document.getElementById('taskDeadline')?.value;
    if (!title || !assignee || !deadline) { showToast('All fields required', 'error'); return; }
    await addDoc(collection(db, 'tasks'), { title, assignedTo: assignee, assignedBy: currentUser.uid, assignedByName: userData.fullName, deadline: new Date(deadline), status: 'pending', pointsValue: 5, createdAt: serverTimestamp() });
    await addDoc(collection(db, 'notifications'), { userId: assignee, type: 'task_assigned', title: 'New Task', message: title, isRead: false, createdAt: serverTimestamp() });
    showToast('Task assigned', 'success'); hideModal();
  };

  window.submitForStaff = async (staffId, taskId) => {
    const taskRef = doc(db, 'tasks', taskId); const taskSnap = await getDoc(taskRef); const task = taskSnap.data();
    const early = new Date() <= task.deadline.toDate(); const points = early ? 5 : -5;
    await updateDoc(taskRef, { status: 'completed', submittedAt: serverTimestamp(), submittedBy: currentUser.uid, pointsEarned: points });
    await updateDoc(doc(db, 'users', staffId), { totalPoints: increment(points), tasksCompleted: increment(1) });
    await addDoc(collection(db, 'coin_transactions'), { userId: staffId, points, reason: task.title, createdAt: serverTimestamp() });
    showToast(`Task submitted! ${points>0?'+':''}${points} points`, 'success');
  };

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', function() { 
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); this.classList.add('active'); 
    document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active')); 
    document.getElementById(this.dataset.tab + 'Panel').classList.add('active'); 
  }));
  document.getElementById('searchInput').addEventListener('input', renderTasks);

  onAuthStateChanged(auth, async (u) => { 
    if (!u) { window.location.href = 'auth.html'; return; } 
    currentUser = u; 
    const snap = await getDoc(doc(db, 'users', u.uid)); 
    if (!snap.exists() || !snap.data().role?.includes('attendant')) { window.location.href = 'auth.html'; return; } 
    userData = snap.data(); 
    document.getElementById('userName').textContent = userData.fullName?.split(' ')[0] || 'Attendant'; 
    document.getElementById('userRole').textContent = userData.role === 'attendant_chief' ? 'Chief Attendant' : 'Attendant'; 
    document.getElementById('userAvatar').textContent = (userData.fullName||'A').charAt(0); 
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); 
    loadTasks(); 
  });
  
  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'auth.html'; });
  window.addEventListener('beforeunload', () => unsubscribes.forEach(u => u()));
</script>
</body>
</html>
