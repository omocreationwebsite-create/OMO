<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Admin · FashionStone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --header-height: 64px; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; min-height: 100vh; display: flex; }
    .sidebar { width: 280px; background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-header { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
    .logo-text { font-size: 1.2rem; font-weight: 700; } .logo-text span { color: var(--primary); }
    .sidebar-nav { padding: 20px 12px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
    .nav-item i { width: 22px; }
    .nav-item:hover { background: rgba(255,77,166,0.12); color: white; }
    .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .nav-item.logout { color: rgba(239,68,68,0.7); margin-top: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); position: absolute; bottom: 0; width: 100%; background: inherit; }
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .user-details h4 { font-size: 0.9rem; } .user-details p { font-size: 0.7rem; opacity: 0.6; }
    .main-content { flex: 1; margin-left: 280px; }
    .top-bar { height: var(--header-height); background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.04); position: sticky; top: 0; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: var(--dark); }
    .content-wrapper { padding: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .stat-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .stat-header span { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; font-weight: 600; }
    .stat-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--primary-soft); display: flex; align-items: center; justify-content: center; color: var(--primary); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--dark); }
    .panel { background: white; border-radius: 20px; padding: 22px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
    .panel-header { display: flex; justify-content: space-between; margin-bottom: 18px; }
    .panel-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .data-table th { text-align: left; padding: 12px 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray); text-transform: uppercase; border-bottom: 1.5px solid var(--primary-soft); }
    .data-table td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
    .badge-pending { background: rgba(107,114,128,0.1); color: var(--gray); }
    .btn { padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; background: white; border: 1px solid rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; }
    .btn-sm { padding: 5px 12px; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .alert-item { padding: 10px 12px; background: #fef3c7; border-radius: 10px; margin-bottom: 8px; font-size: 0.8rem; }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    .toast { background: white; padding: 12px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 10px; transform: translateX(400px); transition: transform 0.25s; }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header"><div class="logo-icon">💎</div><div class="logo-text"><span>Fashion</span>Stone</div></div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" onclick="window.location.href='approvals.html'"><i class="fas fa-check-circle"></i><span>Approvals</span></button>
    <button class="nav-item" onclick="window.location.href='staff-management.html'"><i class="fas fa-users-cog"></i><span>Staff Management</span></button>
    <button class="nav-item" onclick="window.location.href='finance.html'"><i class="fas fa-chart-line"></i><span>Finance</span></button>
    <button class="nav-item" onclick="window.location.href='audit.html'"><i class="fas fa-history"></i><span>Audit Logs</span></button>
    <button class="nav-item logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </nav>
  <div class="sidebar-footer"><div class="user-profile"><div class="user-avatar" id="userAvatar">A</div><div class="user-details"><h4 id="userName">Admin</h4><p id="userRole">Admin</p></div></div></div>
</aside>
<main class="main-content">
  <header class="top-bar"><h1 class="page-title">Admin Dashboard</h1><div style="color:var(--gray);"><span id="currentDate"></span></div></header>
  <div class="content-wrapper">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-header"><span>Total Staff</span><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-value" id="totalStaff">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Pending Approvals</span><div class="stat-icon"><i class="fas fa-clock"></i></div></div><div class="stat-value" id="pendingCount">0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Revenue (MTD)</span><div class="stat-icon"><i class="fas fa-naira-sign"></i></div></div><div class="stat-value" id="revenueMTD">₦0</div></div>
      <div class="stat-card"><div class="stat-header"><span>Tasks Completed</span><div class="stat-icon"><i class="fas fa-check-circle"></i></div></div><div class="stat-value" id="tasksCompleted">0</div></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-user-clock" style="color:var(--primary);"></i> Pending User Approvals</h3><button class="btn btn-outline btn-sm" onclick="window.location.href='approvals.html'">View All</button></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Registered</th><th>Actions</th></tr></thead><tbody id="pendingUsersTable"></tbody></table></div>
    </div>
    
    <div class="two-column">
      <div class="panel">
        <div class="panel-header"><h3><i class="fas fa-calendar-check"></i> Today's Attendance</h3></div>
        <div class="table-wrapper"><table class="data-table"><thead><tr><th>Staff</th><th>Check-in</th><th>Status</th></tr></thead><tbody id="attendanceTable"></tbody></table></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3><i class="fas fa-exclamation-triangle"></i> Recent Alerts</h3></div>
        <div id="alertsContainer"></div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3><i class="fas fa-history"></i> Recent Audit Logs</h3><button class="btn btn-outline btn-sm" onclick="window.location.href='audit.html'">View All</button></div>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Time</th><th>Action</th><th>User</th><th>Details</th></tr></thead><tbody id="auditTable"></tbody></table></div>
    </div>
  </div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot, updateDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
  let currentUser = null;

  function formatTime(d) { if (!d) return '-'; return d.toDate().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}); }
  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }

  function loadDashboard() {
    const usersQuery = collection(db, 'users');
    onSnapshot(usersQuery, (snap) => {
      const users = snap.docs.map(d => d.data());
      const staff = users.filter(u => u.role === 'staff' || u.role?.includes('attendant'));
      const pending = users.filter(u => u.status === 'pending_approval');
      document.getElementById('totalStaff').textContent = staff.length;
      document.getElementById('pendingCount').textContent = pending.length;
    });

    const pendingQuery = query(collection(db, 'users'), where('status', '==', 'pending_approval'), orderBy('createdAt', 'desc'), limit(5));
    onSnapshot(pendingQuery, (snap) => {
      const tbody = document.getElementById('pendingUsersTable');
      tbody.innerHTML = '';
      if (snap.empty) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;">No pending users</td></tr>'; return; }
      snap.forEach(d => { const u = d.data(); tbody.innerHTML += `<tr><td>${u.fullName}</td><td>${u.email}</td><td>${new Date(u.createdAt?.toDate()).toLocaleDateString()}</td><td><button class="btn btn-sm btn-success" onclick="window.location.href='approvals.html'">Review</button></td></tr>`; });
    });

    const today = new Date().toISOString().split('T')[0];
    const attQuery = query(collection(db, 'attendance'), where('date', '==', today), limit(10));
    onSnapshot(attQuery, async (snap) => {
      const tbody = document.getElementById('attendanceTable'); tbody.innerHTML = '';
      if (snap.empty) { tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;">No attendance</td></tr>'; return; }
      for (const d of snap.docs) { const a = d.data(); const u = await getDoc(doc(db, 'users', a.userId)); tbody.innerHTML += `<tr><td>${u.exists()?u.data().fullName:'Unknown'}</td><td>${formatTime(a.checkInTime)}</td><td><span class="badge ${a.status==='late'?'badge-warning':'badge-success'}">${a.status}</span></td></tr>`; }
    });

    const auditQuery = query(collection(db, 'audit_logs'), orderBy('performedAt', 'desc'), limit(5));
    onSnapshot(auditQuery, (snap) => {
      const tbody = document.getElementById('auditTable'); tbody.innerHTML = '';
      snap.forEach(d => { const a = d.data(); tbody.innerHTML += `<tr><td>${formatTime(a.performedAt)}</td><td>${a.actionType}</td><td>${a.performedByName||'-'}</td><td>${a.note||'-'}</td></tr>`; });
    });

    getDocs(collection(db, 'sales')).then(snap => { const now = new Date(); let rev = 0; snap.forEach(d => { const s = d.data(); const dt = s.createdAt?.toDate(); if (dt && dt.getMonth()===now.getMonth()) rev += s.totalAmount||0; }); document.getElementById('revenueMTD').textContent = formatCurrency(rev); });
    getDocs(collection(db, 'tasks')).then(snap => { const now = new Date(); let comp = 0; snap.forEach(d => { const t = d.data(); if (t.status==='completed' && t.submittedAt?.toDate().getMonth()===now.getMonth()) comp++; }); document.getElementById('tasksCompleted').textContent = comp; });

    // Alerts
    getDocs(query(collection(db, 'users'), where('role', '==', 'staff'))).then(async snap => {
      const alerts = []; const threeDays = new Date(); threeDays.setDate(threeDays.getDate()-3);
      for (const d of snap.docs) { const att = await getDocs(query(collection(db, 'attendance'), where('userId', '==', d.id), orderBy('date', 'desc'), limit(1))); if (!att.empty) { const last = att.docs[0].data(); if (new Date(last.date) < threeDays) alerts.push(`${d.data().fullName} absent 3+ days`); } }
      document.getElementById('alertsContainer').innerHTML = alerts.length ? alerts.map(a => `<div class="alert-item">⚠️ ${a}</div>`).join('') : '<div style="text-align:center;padding:20px;color:var(--gray);">No alerts</div>';
    });
  }

  onAuthStateChanged(auth, async (u) => { if (!u || !(await getDoc(doc(db, 'users', u.uid))).data()?.role?.includes('admin')) { window.location.href = 'auth.html'; return; } currentUser = u; const data = (await getDoc(doc(db, 'users', u.uid))).data(); document.getElementById('userName').textContent = data.fullName?.split(' ')[0]; document.getElementById('userRole').textContent = data.role; document.getElementById('userAvatar').textContent = data.fullName?.charAt(0); document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); loadDashboard(); });
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href='auth.html'));
</script>
</body>
</html>
