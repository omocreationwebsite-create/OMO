<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Kiosk · FashionStone Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --dark: #0f0f1a; --gray: #6b7280; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); min-height: 100vh; padding: 15px; }
    
    .kiosk-container { max-width: 600px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 15px; }
    .header h1 { color: white; font-size: 1.5rem; }
    .header h1 i { color: var(--primary); } .header h1 span { color: var(--primary); }
    .header p { color: var(--gray); font-size: 0.8rem; margin-top: 5px; }
    
    .clock { text-align: center; margin-bottom: 15px; }
    .clock-time { font-size: 2.5rem; font-weight: 800; color: white; }
    .clock-date { font-size: 0.85rem; color: var(--gray); }
    
    .mode-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .mode-btn { padding: 10px 25px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
    .mode-btn.active { background: var(--success); }
    .mode-btn.checkout.active { background: var(--warning); }
    
    .stats { display: flex; justify-content: space-around; margin-bottom: 15px; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 10px; }
    .stat { text-align: center; } .stat-value { font-size: 1.3rem; font-weight: 700; color: white; } .stat-label { font-size: 0.6rem; color: var(--gray); }
    
    .camera-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 10px; margin-bottom: 15px; }
    .camera-container { border-radius: 12px; overflow: hidden; background: #000; }
    #webcamVideo { width: 100%; height: auto; display: block; object-fit: cover; }
    .camera-toggle { display: flex; justify-content: center; margin-top: 8px; }
    .camera-toggle button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
    
    .staff-section { background: white; border-radius: 16px; padding: 15px; max-height: 300px; overflow-y: auto; }
    .staff-section h3 { font-size: 0.95rem; margin-bottom: 12px; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    
    .staff-table { width: 100%; border-collapse: collapse; }
    .staff-table tr { border-bottom: 1px solid #eee; }
    .staff-table tr:last-child { border-bottom: none; }
    .staff-table td { padding: 12px 5px; font-size: 0.9rem; }
    .staff-table .staff-name { font-weight: 600; color: var(--dark); }
    .staff-table .staff-role { font-size: 0.7rem; color: var(--gray); display: block; }
    .staff-table .status-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 20px; background: #eee; white-space: nowrap; }
    .staff-table .status-badge.checked-in { background: #d1fae5; color: var(--success); }
    .staff-table .status-badge.late { background: #fee2e2; color: var(--danger); }
    .staff-table .status-badge.completed { background: #e0e7ff; color: #4f46e5; }
    
    .check-btn { padding: 8px 16px; border-radius: 30px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; background: var(--primary); color: white; white-space: nowrap; }
    .check-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--gray); }
    .check-btn.checkout-btn { background: var(--warning); color: white; }
    
    .message { text-align: center; margin-top: 12px; padding: 12px; border-radius: 30px; font-weight: 500; font-size: 0.9rem; display: none; }
    .message.show { display: block; }
    .message.success { background: rgba(16,185,129,0.2); color: var(--success); }
    .message.warning { background: rgba(245,158,11,0.2); color: var(--warning); }
    .message.error { background: rgba(239,68,68,0.2); color: var(--danger); }
    
    .footer { display: flex; justify-content: space-between; margin-top: 15px; }
    .btn { padding: 10px 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: 500; font-size: 0.85rem; background: transparent; border: 1px solid var(--gray); color: white; }
    
    .pin-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .pin-modal.show { display: flex; }
    .pin-box { background: white; border-radius: 24px; padding: 25px; text-align: center; max-width: 320px; width: 100%; }
    .pin-box h3 { margin-bottom: 15px; font-size: 1.1rem; }
    .pin-inputs { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
    .pin-input { width: 50px; height: 60px; text-align: center; font-size: 1.5rem; border: 2px solid #ddd; border-radius: 12px; }
    .pin-actions { display: flex; gap: 8px; } .pin-actions button { flex: 1; }
    
    .loading { text-align: center; padding: 20px; color: var(--gray); }
  </style>
</head>
<body>

<div class="kiosk-container">
  
  <div class="header">
    <h1><i class="fas fa-camera"></i> Fashion<span>Stone</span></h1>
    <p>Tap CHECK-IN or CHECK-OUT · Photo captured automatically</p>
  </div>
  
  <div class="clock">
    <div class="clock-time" id="liveClock">--:--:--</div>
    <div class="clock-date" id="liveDate"></div>
  </div>
  
  <div class="stats">
    <div class="stat"><div class="stat-value" id="presentCount">0</div><div class="stat-label">Present</div></div>
    <div class="stat"><div class="stat-value" id="lateCount">0</div><div class="stat-label">Late</div></div>
    <div class="stat"><div class="stat-value" id="absentCount">0</div><div class="stat-label">Absent</div></div>
  </div>
  
  <div class="mode-toggle">
    <button class="mode-btn active" id="checkinModeBtn"><i class="fas fa-sign-in-alt"></i> CHECK-IN MODE</button>
    <button class="mode-btn checkout" id="checkoutModeBtn"><i class="fas fa-sign-out-alt"></i> CHECK-OUT MODE</button>
  </div>
  
  <div class="camera-section">
    <div class="camera-container">
      <video id="webcamVideo" autoplay playsinline></video>
    </div>
    <div class="camera-toggle">
      <button onclick="switchCamera()"><i class="fas fa-sync-alt"></i> Switch Camera</button>
    </div>
  </div>
  
  <div class="staff-section">
    <h3><i class="fas fa-users" style="color:var(--primary);"></i> Staff List <span style="margin-left:auto; font-size:0.7rem; color:var(--gray);" id="staffCount">0 staff</span></h3>
    <div id="staffListContainer">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading staff...</div>
    </div>
  </div>
  
  <div class="message" id="messageBanner"></div>
  
  <div class="footer">
    <button class="btn" onclick="loadStaffList()"><i class="fas fa-sync-alt"></i> Refresh</button>
    <button class="btn" onclick="showExitModal()"><i class="fas fa-lock"></i> Exit Kiosk</button>
  </div>
</div>

<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <i class="fas fa-lock" style="font-size: 2rem; color: var(--primary); margin-bottom: 10px;"></i>
    <h3>Admin Verification</h3>
    <p style="color: var(--gray); margin-bottom: 15px; font-size: 0.85rem;">Enter admin PIN to exit</p>
    <div class="pin-inputs">
      <input type="password" maxlength="1" class="pin-input" id="pin1" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-input" id="pin2" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-input" id="pin3" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-input" id="pin4" inputmode="numeric">
    </div>
    <div class="pin-actions">
      <button class="btn" onclick="hidePinModal()" style="background:#eee;color:var(--dark);">Cancel</button>
      <button class="btn" onclick="verifyExitPin()" style="background:var(--primary);color:white;">Exit</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, query, where, addDoc, serverTimestamp, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI",
    authDomain: "fashion-46e5d.firebaseapp.com",
    projectId: "fashion-46e5d",
    storageBucket: "fashion-46e5d.firebasestorage.app",
    messagingSenderId: "408062284317",
    appId: "1:408062284317:web:eb905bce68926c10a0ecf4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let webcamStream = null;
  let allStaff = [];
  let todayAttendance = new Map();
  let kioskSettings = { checkInHour: 9, checkInMinute: 0, checkOutHour: 18, checkOutMinute: 0, latePenalty: 5, earlyPenalty: 5, adminPin: '1234' };
  let currentMode = 'checkin';
  let currentFacingMode = 'user';

  // ========== CLOCK ==========
  function updateClock() {
    const now = new Date();
    document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-GB');
    document.getElementById('liveDate').textContent = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ========== CAMERA ==========
  async function initCamera(facingMode = 'user') {
    try {
      if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
      webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } } });
      document.getElementById('webcamVideo').srcObject = webcamStream;
      currentFacingMode = facingMode;
    } catch (e) {
      console.error('Camera error:', e);
      showMessage('Camera access denied', 'error');
    }
  }

  window.switchCamera = async () => {
    const newMode = currentFacingMode === 'user' ? 'environment' : 'user';
    await initCamera(newMode);
  };

  // ========== LOAD SETTINGS ==========
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db, 'system_settings', 'kiosk'));
      if (snap.exists()) kioskSettings = { ...kioskSettings, ...snap.data() };
    } catch (e) { console.error('Settings error:', e); }
  }

  // ========== LOAD STAFF ==========
  async function loadStaffList() {
    try {
      console.log('Loading staff...');
      const staffQuery = query(
        collection(db, 'users'), 
        where('role', 'in', ['staff', 'attendant', 'attendant_chief']), 
        where('status', '==', 'active')
      );
      const staffSnap = await getDocs(staffQuery);
      allStaff = staffSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('Staff loaded:', allStaff.length);
      
      const today = new Date().toISOString().split('T')[0];
      const attSnap = await getDocs(query(collection(db, 'attendance'), where('date', '==', today)));
      todayAttendance.clear();
      attSnap.docs.forEach(d => { const a = d.data(); todayAttendance.set(a.userId, { ...a, docId: d.id }); });
      
      const present = attSnap.size;
      const late = attSnap.docs.filter(d => d.data().status === 'late').length;
      document.getElementById('presentCount').textContent = present;
      document.getElementById('lateCount').textContent = late;
      document.getElementById('absentCount').textContent = allStaff.length - present;
      
      renderStaffTable();
    } catch (e) {
      console.error('Load staff error:', e);
      document.getElementById('staffListContainer').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Error loading staff</div>';
    }
  }

  function renderStaffTable() {
    const container = document.getElementById('staffListContainer');
    
    if (allStaff.length === 0) {
      container.innerHTML = '<div class="loading"><i class="fas fa-users"></i> No active staff found</div>';
      document.getElementById('staffCount').textContent = '0 staff';
      return;
    }
    
    allStaff.sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''));
    document.getElementById('staffCount').textContent = `${allStaff.length} staff`;
    
    let html = '<table class="staff-table">';
    
    allStaff.forEach(staff => {
      const att = todayAttendance.get(staff.id);
      const hasCheckedIn = att && att.checkInTime;
      const hasCheckedOut = att && att.checkOutTime;
      
      let statusText = 'Not checked in';
      let statusClass = '';
      let buttonText = currentMode === 'checkin' ? 'CHECK IN' : 'CHECK OUT';
      let buttonDisabled = false;
      let buttonClass = currentMode === 'checkin' ? '' : 'checkout-btn';
      
      if (hasCheckedIn && !hasCheckedOut) {
        statusText = att.status === 'late' ? 'LATE' : 'Checked In';
        statusClass = att.status === 'late' ? 'late' : 'checked-in';
        if (currentMode === 'checkin') buttonDisabled = true;
      } else if (hasCheckedIn && hasCheckedOut) {
        statusText = 'Completed';
        statusClass = 'completed';
        buttonDisabled = true;
      }
      
      if (currentMode === 'checkout') {
        if (!hasCheckedIn) buttonDisabled = true;
        if (hasCheckedOut) buttonDisabled = true;
      }
      
      html += `<tr>
        <td>
          <span class="staff-name">${staff.fullName || 'Staff'}</span>
          <span class="staff-role">${staff.role || 'staff'}</span>
        </td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td style="text-align:right;">
          <button class="check-btn ${buttonClass}" onclick="handleAction('${staff.id}')" ${buttonDisabled ? 'disabled' : ''}>
            <i class="fas fa-${currentMode === 'checkin' ? 'sign-in-alt' : 'sign-out-alt'}"></i> ${buttonText}
          </button>
        </td>
      </tr>`;
    });
    
    html += '</table>';
    container.innerHTML = html;
    
    // Make handleAction globally available
    window.handleAction = async (staffId) => {
      const staff = allStaff.find(s => s.id === staffId);
      if (!staff) return;
      
      const att = todayAttendance.get(staffId);
      
      if (currentMode === 'checkin') {
        await processCheckIn(staff);
      } else {
        await processCheckOut(staff, att);
      }
    };
  }

  function capturePhoto() {
    const video = document.getElementById('webcamVideo');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', 0.8);
  }

  async function processCheckIn(staff) {
    try {
      const photoData = capturePhoto();
      const now = new Date();
      const checkInTime = new Date();
      checkInTime.setHours(kioskSettings.checkInHour, kioskSettings.checkInMinute, 0);
      const isLate = now > checkInTime;
      const status = isLate ? 'late' : 'on_time';
      const pointsDeducted = isLate ? kioskSettings.latePenalty : 0;
      
      await addDoc(collection(db, 'attendance'), {
        userId: staff.id, checkInTime: serverTimestamp(), date: now.toISOString().split('T')[0],
        status, pointsDeducted, photoData
      });
      
      if (pointsDeducted > 0) {
        await updateDoc(doc(db, 'users', staff.id), { totalPoints: increment(-pointsDeducted) });
      }
      
      showMessage(`${staff.fullName} checked in ${isLate ? '(LATE)' : '✓'}`, isLate ? 'warning' : 'success');
      await loadStaffList();
    } catch (e) {
      console.error('Check-in error:', e);
      showMessage('Check-in failed', 'error');
    }
  }

  async function processCheckOut(staff, att) {
    try {
      const photoData = capturePhoto();
      const now = new Date();
      const checkOutTime = new Date();
      checkOutTime.setHours(kioskSettings.checkOutHour, kioskSettings.checkOutMinute, 0);
      const isEarly = now < checkOutTime;
      const checkOutStatus = isEarly ? 'early' : 'on_time';
      const pointsDeducted = isEarly ? kioskSettings.earlyPenalty : 0;
      
      await updateDoc(doc(db, 'attendance', att.docId), {
        checkOutTime: serverTimestamp(), checkOutStatus,
        pointsDeducted: (att.pointsDeducted || 0) + pointsDeducted, checkOutPhotoData: photoData
      });
      
      if (pointsDeducted > 0) {
        await updateDoc(doc(db, 'users', staff.id), { totalPoints: increment(-pointsDeducted) });
      }
      
      showMessage(`${staff.fullName} checked out ${isEarly ? '(EARLY)' : '✓'}`, isEarly ? 'warning' : 'success');
      await loadStaffList();
    } catch (e) {
      console.error('Check-out error:', e);
      showMessage('Check-out failed', 'error');
    }
  }

  function showMessage(msg, type) {
    const el = document.getElementById('messageBanner');
    el.textContent = msg;
    el.className = `message show ${type}`;
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ========== MODE TOGGLE ==========
  document.getElementById('checkinModeBtn').addEventListener('click', () => {
    currentMode = 'checkin';
    document.getElementById('checkinModeBtn').classList.add('active');
    document.getElementById('checkoutModeBtn').classList.remove('active');
    renderStaffTable();
  });
  
  document.getElementById('checkoutModeBtn').addEventListener('click', () => {
    currentMode = 'checkout';
    document.getElementById('checkoutModeBtn').classList.add('active');
    document.getElementById('checkinModeBtn').classList.remove('active');
    renderStaffTable();
  });

  // ========== PIN MODAL ==========
  window.showExitModal = () => { document.getElementById('pinModal').classList.add('show'); document.getElementById('pin1').focus(); };
  window.hidePinModal = () => { document.getElementById('pinModal').classList.remove('show'); ['pin1','pin2','pin3','pin4'].forEach(id => document.getElementById(id).value = ''); };
  window.verifyExitPin = () => {
    const pin = ['pin1','pin2','pin3','pin4'].map(id => document.getElementById(id).value).join('');
    if (pin === kioskSettings.adminPin) {
      if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
      window.location.href = 'admin-dashboard.html';
    } else { alert('Invalid PIN'); }
  };
  
  document.querySelectorAll('.pin-input').forEach((inp, i, arr) => inp.addEventListener('input', e => { if (e.target.value && i < arr.length - 1) arr[i + 1].focus(); }));

  // ========== INIT ==========
  (async () => {
    await loadSettings();
    await initCamera();
    await loadStaffList();
  })();
  
  window.loadStaffList = loadStaffList;
</script>
</body>
</html>
