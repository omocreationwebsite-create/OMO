<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>Kiosk · FashionStone Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --dark: #0f0f1a; --gray: #6b7280; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); min-height: 100vh; padding: 20px; }
    
    .kiosk-container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: white; font-size: 2.2rem; }
    .header h1 i { color: var(--primary); } .header h1 span { color: var(--primary); }
    
    .clock { text-align: center; margin-bottom: 20px; }
    .clock-time { font-size: 3.5rem; font-weight: 800; color: white; }
    .clock-date { font-size: 1rem; color: var(--gray); }
    
    .mode-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .mode-btn { padding: 12px 30px; border-radius: 40px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
    .mode-btn.active { background: var(--success); }
    .mode-btn.checkout.active { background: var(--warning); }
    
    .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
    .stat { text-align: center; } .stat-value { font-size: 1.8rem; font-weight: 700; color: white; } .stat-label { font-size: 0.7rem; color: var(--gray); }
    
    .camera-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
    .camera-container { border-radius: 12px; overflow: hidden; background: #000; max-width: 400px; margin: 0 auto; }
    #webcamVideo { width: 100%; height: auto; display: block; }
    
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; max-height: 350px; overflow-y: auto; padding: 5px; }
    
    .staff-card { background: white; border-radius: 16px; padding: 15px 10px; text-align: center; cursor: pointer; border: 3px solid transparent; }
    .staff-card:hover { transform: scale(1.02); border-color: var(--primary); }
    .staff-card.checked { opacity: 0.6; border-color: var(--success); }
    .staff-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.5rem; font-weight: 700; color: white; }
    .staff-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; }
    .staff-role { font-size: 0.65rem; color: var(--gray); margin-bottom: 5px; }
    .status-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 20px; display: inline-block; background: #eee; }
    .status-badge.checked-in { background: #d1fae5; color: var(--success); }
    .status-badge.late { background: #fee2e2; color: var(--danger); }
    
    .message { text-align: center; margin-top: 15px; padding: 12px; border-radius: 40px; font-weight: 500; display: none; }
    .message.show { display: block; }
    .message.success { background: rgba(16,185,129,0.2); color: var(--success); }
    .message.warning { background: rgba(245,158,11,0.2); color: var(--warning); }
    .message.error { background: rgba(239,68,68,0.2); color: var(--danger); }
    
    .footer { display: flex; justify-content: space-between; margin-top: 20px; }
    .btn { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: 500; }
    .btn-outline { background: transparent; border: 1px solid var(--gray); color: white; }
    .btn-primary { background: var(--primary); color: white; }
    
    .pin-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .pin-modal.show { display: flex; }
    .pin-box { background: white; border-radius: 24px; padding: 30px; text-align: center; max-width: 350px; width: 90%; }
    .pin-box h3 { margin-bottom: 20px; }
    .pin-inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .pin-input { width: 55px; height: 65px; text-align: center; font-size: 1.8rem; border: 2px solid #ddd; border-radius: 12px; }
    .pin-actions { display: flex; gap: 10px; }
    .pin-actions button { flex: 1; }
    
    .loading { text-align: center; color: white; padding: 40px; }
    .loading i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="kiosk-container">
  
  <div class="header">
    <h1><i class="fas fa-camera"></i> Fashion<span>Stone</span> Kiosk</h1>
  </div>
  
  <div class="clock">
    <div class="clock-time" id="liveClock">--:--:--</div>
    <div class="clock-date" id="liveDate"></div>
  </div>
  
  <div class="stats">
    <div class="stat"><div class="stat-value" id="presentCount">0</div><div class="stat-label">Present</div></div>
    <div class="stat"><div class="stat-value" id="lateCount">0</div><div class="stat-label">Late</div></div>
    <div class="stat"><div class="stat-value" id="absentCount">0</div><div class="stat-label">Absent</div></div>
  </div>
  
  <div class="mode-toggle">
    <button class="mode-btn active" id="checkinModeBtn"><i class="fas fa-sign-in-alt"></i> CHECK-IN</button>
    <button class="mode-btn checkout" id="checkoutModeBtn"><i class="fas fa-sign-out-alt"></i> CHECK-OUT</button>
  </div>
  
  <div class="camera-section">
    <div class="camera-container">
      <video id="webcamVideo" autoplay playsinline></video>
    </div>
  </div>
  
  <div class="staff-grid" id="staffGrid">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading staff...</p></div>
  </div>
  
  <div class="message" id="messageBanner"></div>
  
  <div class="footer">
    <button class="btn btn-outline" onclick="loadStaffList()"><i class="fas fa-sync-alt"></i> Refresh</button>
    <button class="btn btn-outline" onclick="showExitModal()"><i class="fas fa-lock"></i> Exit Kiosk</button>
  </div>
</div>

<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <i class="fas fa-lock" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 10px;"></i>
    <h3>Admin Verification</h3>
    <p style="color: var(--gray); margin-bottom: 20px;">Enter admin PIN to exit</p>
    <div class="pin-inputs">
      <input type="password" maxlength="1" class="pin-input" id="pin1">
      <input type="password" maxlength="1" class="pin-input" id="pin2">
      <input type="password" maxlength="1" class="pin-input" id="pin3">
      <input type="password" maxlength="1" class="pin-input" id="pin4">
    </div>
    <div class="pin-actions">
      <button class="btn btn-outline" onclick="hidePinModal()">Cancel</button>
      <button class="btn btn-primary" onclick="verifyExitPin()">Exit</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, query, where, addDoc, serverTimestamp, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI",
    authDomain: "fashion-46e5d.firebaseapp.com",
    projectId: "fashion-46e5d",
    storageBucket: "fashion-46e5d.firebasestorage.app",
    messagingSenderId: "408062284317",
    appId: "1:408062284317:web:eb905bce68926c10a0ecf4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let webcamStream = null;
  let allStaff = [];
  let todayAttendance = new Map();
  let kioskSettings = { checkInHour: 9, checkInMinute: 0, checkOutHour: 18, checkOutMinute: 0, latePenalty: 5, earlyPenalty: 5, adminPin: '1234' };
  let currentMode = 'checkin';

  // ========== CLOCK ==========
  function updateClock() {
    const now = new Date();
    document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-GB');
    document.getElementById('liveDate').textContent = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ========== CAMERA ==========
  async function initCamera() {
    try {
      if (webcamStream) {
        webcamStream.getTracks().forEach(t => t.stop());
      }
      webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
      document.getElementById('webcamVideo').srcObject = webcamStream;
      console.log('Camera started');
    } catch (e) {
      console.error('Camera error:', e);
      showMessage('Camera access denied. Please allow camera permissions.', 'error');
    }
  }

  // ========== LOAD SETTINGS ==========
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db, 'system_settings', 'kiosk'));
      if (snap.exists()) {
        kioskSettings = { ...kioskSettings, ...snap.data() };
      }
    } catch (e) {
      console.error('Settings error:', e);
    }
  }

  // ========== LOAD STAFF ==========
  async function loadStaffList() {
    try {
      const staffQuery = query(
        collection(db, 'users'), 
        where('role', 'in', ['staff', 'attendant', 'attendant_chief']), 
        where('status', '==', 'active')
      );
      const staffSnap = await getDocs(staffQuery);
      allStaff = staffSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      const today = new Date().toISOString().split('T')[0];
      const attSnap = await getDocs(query(collection(db, 'attendance'), where('date', '==', today)));
      todayAttendance.clear();
      attSnap.docs.forEach(d => {
        const a = d.data();
        todayAttendance.set(a.userId, { ...a, docId: d.id });
      });
      
      const present = attSnap.size;
      const late = attSnap.docs.filter(d => d.data().status === 'late').length;
      document.getElementById('presentCount').textContent = present;
      document.getElementById('lateCount').textContent = late;
      document.getElementById('absentCount').textContent = allStaff.length - present;
      
      renderStaffGrid();
    } catch (e) {
      console.error('Load staff error:', e);
      document.getElementById('staffGrid').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i><p>Error loading staff</p></div>';
    }
  }

  function renderStaffGrid() {
    const grid = document.getElementById('staffGrid');
    
    if (allStaff.length === 0) {
      grid.innerHTML = '<div class="loading"><i class="fas fa-users"></i><p>No active staff found</p></div>';
      return;
    }
    
    allStaff.sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''));
    
    grid.innerHTML = '';
    allStaff.forEach(staff => {
      const att = todayAttendance.get(staff.id);
      const hasCheckedIn = att && att.checkInTime;
      const hasCheckedOut = att && att.checkOutTime;
      
      let statusText = 'Not checked in';
      let statusClass = '';
      let isChecked = false;
      
      if (hasCheckedIn && !hasCheckedOut) {
        statusText = att.status === 'late' ? 'LATE' : 'Checked In';
        statusClass = att.status === 'late' ? 'late' : 'checked-in';
        isChecked = true;
      } else if (hasCheckedIn && hasCheckedOut) {
        statusText = 'Completed';
        statusClass = 'checked-in';
        isChecked = true;
      }
      
      const card = document.createElement('div');
      card.className = `staff-card ${isChecked ? 'checked' : ''}`;
      card.innerHTML = `
        <div class="staff-avatar">${(staff.fullName || 'S').charAt(0).toUpperCase()}</div>
        <h3>${staff.fullName?.split(' ')[0] || 'Staff'}</h3>
        <div class="staff-role">${staff.role || 'staff'}</div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      `;
      card.addEventListener('click', () => handleStaffClick(staff));
      grid.appendChild(card);
    });
  }

  function capturePhoto() {
    const video = document.getElementById('webcamVideo');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', 0.8);
  }

  function handleStaffClick(staff) {
    const att = todayAttendance.get(staff.id);
    const hasCheckedIn = att && att.checkInTime;
    const hasCheckedOut = att && att.checkOutTime;
    
    if (currentMode === 'checkin') {
      if (hasCheckedIn) {
        showMessage(`${staff.fullName} already checked in today`, 'warning');
        return;
      }
      processCheckIn(staff);
    } else {
      if (!hasCheckedIn) {
        showMessage(`${staff.fullName} must check in first`, 'error');
        return;
      }
      if (hasCheckedOut) {
        showMessage(`${staff.fullName} already checked out today`, 'warning');
        return;
      }
      processCheckOut(staff, att);
    }
  }

  async function processCheckIn(staff) {
    try {
      const photoData = capturePhoto();
      const now = new Date();
      const checkInTime = new Date();
      checkInTime.setHours(kioskSettings.checkInHour, kioskSettings.checkInMinute, 0);
      const isLate = now > checkInTime;
      const status = isLate ? 'late' : 'on_time';
      const pointsDeducted = isLate ? kioskSettings.latePenalty : 0;
      
      await addDoc(collection(db, 'attendance'), {
        userId: staff.id,
        checkInTime: serverTimestamp(),
        date: now.toISOString().split('T')[0],
        status,
        pointsDeducted,
        photoData
      });
      
      if (pointsDeducted > 0) {
        await updateDoc(doc(db, 'users', staff.id), { totalPoints: increment(-pointsDeducted) });
      }
      
      showMessage(`${staff.fullName} checked in ${isLate ? '(LATE)' : '✓' }`, isLate ? 'warning' : 'success');
      loadStaffList();
    } catch (e) {
      console.error('Check-in error:', e);
      showMessage('Check-in failed', 'error');
    }
  }

  async function processCheckOut(staff, att) {
    try {
      const photoData = capturePhoto();
      const now = new Date();
      const checkOutTime = new Date();
      checkOutTime.setHours(kioskSettings.checkOutHour, kioskSettings.checkOutMinute, 0);
      const isEarly = now < checkOutTime;
      const checkOutStatus = isEarly ? 'early' : 'on_time';
      const pointsDeducted = isEarly ? kioskSettings.earlyPenalty : 0;
      
      await updateDoc(doc(db, 'attendance', att.docId), {
        checkOutTime: serverTimestamp(),
        checkOutStatus,
        pointsDeducted: (att.pointsDeducted || 0) + pointsDeducted,
        checkOutPhotoData: photoData
      });
      
      if (pointsDeducted > 0) {
        await updateDoc(doc(db, 'users', staff.id), { totalPoints: increment(-pointsDeducted) });
      }
      
      showMessage(`${staff.fullName} checked out ${isEarly ? '(EARLY)' : '✓'}`, isEarly ? 'warning' : 'success');
      loadStaffList();
    } catch (e) {
      console.error('Check-out error:', e);
      showMessage('Check-out failed', 'error');
    }
  }

  function showMessage(msg, type) {
    const el = document.getElementById('messageBanner');
    el.textContent = msg;
    el.className = `message show ${type}`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ========== MODE TOGGLE ==========
  document.getElementById('checkinModeBtn').addEventListener('click', () => {
    currentMode = 'checkin';
    document.getElementById('checkinModeBtn').classList.add('active');
    document.getElementById('checkoutModeBtn').classList.remove('active');
  });
  
  document.getElementById('checkoutModeBtn').addEventListener('click', () => {
    currentMode = 'checkout';
    document.getElementById('checkoutModeBtn').classList.add('active');
    document.getElementById('checkinModeBtn').classList.remove('active');
  });

  // ========== PIN MODAL ==========
  window.showExitModal = () => {
    document.getElementById('pinModal').classList.add('show');
    document.getElementById('pin1').focus();
  };
  
  window.hidePinModal = () => {
    document.getElementById('pinModal').classList.remove('show');
    ['pin1','pin2','pin3','pin4'].forEach(id => document.getElementById(id).value = '');
  };
  
  window.verifyExitPin = () => {
    const pin = ['pin1','pin2','pin3','pin4'].map(id => document.getElementById(id).value).join('');
    if (pin === kioskSettings.adminPin) {
      if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
      window.location.href = 'admin-dashboard.html';
    } else {
      alert('Invalid PIN');
    }
  };
  
  document.querySelectorAll('.pin-input').forEach((inp, i, arr) => {
    inp.addEventListener('input', (e) => {
      if (e.target.value && i < arr.length - 1) arr[i + 1].focus();
    });
  });

  // ========== INIT ==========
  (async () => {
    await loadSettings();
    await initCamera();
    await loadStaffList();
  })();
  
  window.loadStaffList = loadStaffList;
</script>
</body>
</html>
