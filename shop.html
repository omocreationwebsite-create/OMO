<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4da6">
  <title>OmoCreations · Luxury Fashion Stones</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #ff4da6; --primary-dark: #e6398c; --primary-soft: #fff0f6; --dark: #0f0f1a; --gray: #6b7280; --gray-light: #f3f4f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; min-height: 100vh; }
    
    /* ========== TOP NAVIGATION BAR ========== */
    .top-nav { background: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 50; }
    .nav-brand { font-size: 1.4rem; font-weight: 800; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    .nav-brand span { color: var(--primary); }
    .nav-brand i { color: var(--primary); font-size: 1.2rem; }
    .nav-search { flex: 1; max-width: 500px; margin: 0 20px; position: relative; }
    .nav-search input { width: 100%; padding: 10px 16px 10px 42px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; outline: none; background: #f9fafb; }
    .nav-search input:focus { border-color: var(--primary); background: white; }
    .nav-search i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray); }
    .nav-actions { display: flex; align-items: center; gap: 15px; }
    .cart-icon { position: relative; cursor: pointer; padding: 10px; border-radius: 8px; background: var(--primary-soft); }
    .cart-icon i { font-size: 1.2rem; color: var(--primary); }
    .cart-count { position: absolute; top: -6px; right: -6px; background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 30px; font-weight: 700; min-width: 18px; text-align: center; }
    
    /* ========== CATEGORY BAR ========== */
    .category-bar { background: white; padding: 8px 20px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #eee; }
    .cat-btn { padding: 8px 18px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; border: 1px solid #e5e7eb; background: white; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .cat-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* ========== MAIN CONTENT ========== */
    .content-wrapper { max-width: 1300px; margin: 0 auto; padding: 20px; }
    .section-title { font-size: 1.1rem; font-weight: 700; margin: 20px 0 15px; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--primary); }
    
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    
    .product-card { background: white; border-radius: 8px; overflow: hidden; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: var(--primary); }
    .product-image { width: 100%; aspect-ratio: 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-image .no-img { font-size: 2.5rem; color: #ccc; }
    .product-discount { position: absolute; top: 10px; left: 10px; background: var(--danger); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .product-info { padding: 12px; }
    .product-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: var(--dark); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { color: var(--dark); font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
    .product-old-price { font-size: 0.75rem; color: var(--gray); text-decoration: line-through; margin-left: 5px; }
    .product-stock { font-size: 0.7rem; color: var(--success); margin-bottom: 8px; }
    .product-stock.low { color: var(--warning); }
    .product-stock.out { color: var(--danger); }
    .add-cart-btn { width: 100%; padding: 10px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; border: none; cursor: pointer; background: var(--primary); color: white; transition: all 0.15s; }
    .add-cart-btn:hover { background: var(--primary-dark); }
    .add-cart-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--gray); }
    
    /* ========== CART SLIDE-OUT ========== */
    .cart-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; }
    .cart-overlay.show { display: block; }
    .cart-panel { position: fixed; top: 0; right: -420px; width: 100%; max-width: 420px; height: 100vh; background: white; z-index: 101; transition: right 0.3s; display: flex; flex-direction: column; box-shadow: -5px 0 25px rgba(0,0,0,0.1); }
    .cart-panel.show { right: 0; }
    .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .cart-header h3 { font-size: 1.1rem; font-weight: 700; }
    .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { display: flex; gap: 12px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
    .cart-item-img { width: 70px; height: 70px; border-radius: 8px; background: #f0f0f0; flex-shrink: 0; overflow: hidden; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
    .cart-item-price { color: var(--primary); font-weight: 600; font-size: 0.85rem; }
    .cart-item-actions { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
    .qty-value { font-weight: 600; min-width: 20px; text-align: center; }
    .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.8rem; margin-left: auto; }
    .cart-footer { padding: 20px; border-top: 1px solid #eee; background: white; }
    .cart-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; }
    .checkout-btn { width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; background: var(--primary); color: white; }
    
    /* ========== CHECKOUT MODAL ========== */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal { background: white; border-radius: 12px; padding: 28px; max-width: 520px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-header h3 { font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
    .form-label-required::after { content: ' *'; color: var(--danger); }
    .form-control { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    .form-control:focus { border-color: var(--primary); }
    textarea.form-control { min-height: 70px; resize: vertical; }
    .radio-group { display: flex; gap: 12px; margin-top: 5px; }
    .radio-option { flex: 1; }
    .radio-option input { display: none; }
    .radio-option label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
    .radio-option input:checked + label { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    
    .whatsapp-btn { background: #25D366; color: white; width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .whatsapp-btn:hover { background: #1ebe57; }
    
    .order-summary { background: #f9fafb; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .order-summary h4 { margin-bottom: 10px; font-size: 0.9rem; }
    .summary-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.85rem; }
    .summary-row.total { font-weight: 700; border-top: 1px dashed #ddd; padding-top: 10px; margin-top: 5px; font-size: 1rem; }
    
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast { background: white; padding: 14px 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; transform: translateX(400px); transition: transform 0.25s; border-left: 4px solid var(--primary); margin-top: 10px; }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left-color: var(--success); }
    
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); background: white; border-radius: 12px; }
    .empty-state i { font-size: 3rem; color: #ddd; margin-bottom: 15px; }
    .loading-state { text-align: center; padding: 60px 20px; }
    .loader-spin { width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ========== BANNER ========== */
    .hero-banner { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; padding: 30px; color: white; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .hero-text h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
    .hero-text p { opacity: 0.9; font-size: 0.95rem; }
    .hero-badge { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 500; }
    
    @media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } .cart-panel { max-width: 100%; } .nav-search { display: none; } .hero-text h2 { font-size: 1.3rem; } }
    @media (max-width: 480px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
  </style>
</head>
<body>

<!-- TOP NAVIGATION -->
<div class="top-nav">
  <div class="nav-brand"><i class="fas fa-gem"></i> Omo<span>Creations</span></div>
  <div class="nav-search">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search products, categories...">
  </div>
  <div class="nav-actions">
    <div class="cart-icon" onclick="toggleCart()">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<!-- CATEGORY BAR -->
<div class="category-bar" id="categoryBar">
  <button class="cat-btn active" data-cat="all">All Products</button>
  <button class="cat-btn" data-cat="rhinestones">Rhinestones</button>
  <button class="cat-btn" data-cat="beads">Beads</button>
  <button class="cat-btn" data-cat="bridal">Bridal Materials</button>
  <button class="cat-btn" data-cat="paperstones">Paperstones</button>
  <button class="cat-btn" data-cat="other">Other</button>
</div>

<!-- MAIN CONTENT -->
<div class="content-wrapper">
  
  <!-- HERO BANNER -->
  <div class="hero-banner">
    <div class="hero-text">
      <h2>✨ Luxury Fashion Stones</h2>
      <p>Premium rhinestones, beads & bridal materials delivered to you</p>
    </div>
    <div class="hero-badge"><i class="fas fa-truck"></i> Nationwide Delivery</div>
  </div>
  
  <div class="section-title"><i class="fas fa-fire"></i> All Products</div>
  
  <div class="product-grid" id="productGrid">
    <div class="loading-state"><div class="loader-spin"></div><p style="color:var(--gray);">Loading products...</p></div>
  </div>
</div>

<!-- CART SLIDE-OUT -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
    <button style="background:none;border:none;font-size:1.2rem;cursor:pointer;" onclick="toggleCart()">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p></div>
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total:</span><span id="cartTotal">₦0</span></div>
    <button class="checkout-btn" onclick="openCheckout()"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <div class="modal-header"><h3>📦 Checkout</h3><button class="modal-close" onclick="hideCheckout()">&times;</button></div>
    <div id="checkoutContent"></div>
  </div>
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h3 id="detailTitle">Product</h3><button class="modal-close" onclick="hideDetail()">&times;</button></div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyA_JPUfHVotadGfntwk8qQXFp64pvDfTRI", authDomain: "fashion-46e5d.firebaseapp.com", projectId: "fashion-46e5d", storageBucket: "fashion-46e5d.firebasestorage.app", messagingSenderId: "408062284317", appId: "1:408062284317:web:eb905bce68926c10a0ecf4" };
  const app = initializeApp(firebaseConfig); const db = getFirestore(app);
  
  const WHATSAPP_NUMBER = '2348107595812';
  
  let allProducts = [], cart = JSON.parse(localStorage.getItem('omocreations_cart') || '[]');
  let currentCategory = 'all', selectedDelivery = 'pickup';

  function formatCurrency(n) { return '₦' + (n || 0).toLocaleString(); }
  function showToast(msg, type='success') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`; c.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => t.remove(), 4000); }
  function saveCart() { localStorage.setItem('omocreations_cart', JSON.stringify(cart)); updateCartUI(); }

  function updateCartUI() {
    const count = cart.reduce((s,i) => s + i.quantity, 0);
    const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotal').textContent = formatCurrency(total);
    
    const container = document.getElementById('cartItems');
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p></div>';
    } else {
      container.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div class="cart-item-img">${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.name}">` : '<i class="fas fa-image" style="color:#ccc;font-size:1.5rem;"></i>'}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${formatCurrency(item.price)}</div>
            <div class="cart-item-actions">
              <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
              <button class="remove-btn" onclick="removeItem(${idx})"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      `).join('');
    }
  }

  window.changeQty = (idx, delta) => { cart[idx].quantity += delta; if (cart[idx].quantity < 1) cart.splice(idx, 1); saveCart(); };
  window.removeItem = (idx) => { cart.splice(idx, 1); saveCart(); };
  window.toggleCart = () => { 
    const panel = document.getElementById('cartPanel'), overlay = document.getElementById('cartOverlay');
    const isOpen = panel.classList.contains('show');
    panel.classList.toggle('show', !isOpen); overlay.classList.toggle('show', !isOpen);
  };
  window.hideCheckout = () => document.getElementById('checkoutModal').style.display = 'none';
  window.hideDetail = () => document.getElementById('detailModal').style.display = 'none';

  // ========== RENDER PRODUCTS ==========
  function renderProducts() {
    let filtered = [...allProducts].filter(p => p.published === true);
    if (currentCategory !== 'all') filtered = filtered.filter(p => p.category === currentCategory);
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(p => (p.name||'').toLowerCase().includes(search) || (p.description||'').toLowerCase().includes(search) || (p.category||'').toLowerCase().includes(search));
    
    const grid = document.getElementById('productGrid');
    
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>No products available at the moment</p><p style="font-size:0.8rem;margin-top:5px;">Please check back later or browse another category</p></div>';
      return;
    }
    
    grid.innerHTML = filtered.map(p => {
      const stockClass = p.inStock === 0 ? 'out' : p.inStock <= 5 ? 'low' : '';
      const stockText = p.inStock === 0 ? 'Out of Stock' : p.inStock <= 5 ? `Only ${p.inStock} left` : `${p.inStock} in stock`;
      return `
        <div class="product-card" onclick="openDetail('${p.id}')">
          <div class="product-image">
            ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy">` : '<i class="fas fa-image no-img"></i>'}
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${formatCurrency(p.price)}</div>
            <div class="product-stock ${stockClass}">${stockText}</div>
            <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${p.id}')" ${p.inStock < 1 ? 'disabled' : ''}>
              <i class="fas fa-cart-plus"></i> ${p.inStock < 1 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== PRODUCT DETAIL ==========
  window.openDetail = (id) => {
    const p = allProducts.find(x => x.id === id); if (!p) return;
    document.getElementById('detailTitle').textContent = p.name;
    document.getElementById('detailContent').innerHTML = `
      <div style="text-align:center;margin-bottom:20px;">
        ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%;max-height:300px;object-fit:cover;border-radius:8px;">` : '<i class="fas fa-image" style="font-size:5rem;color:#ccc;"></i>'}
      </div>
      <h2 style="font-size:1.3rem;margin-bottom:5px;">${p.name}</h2>
      <p style="color:var(--gray);font-size:0.85rem;margin-bottom:10px;">${p.category || 'Uncategorized'}</p>
      <p style="font-size:1.8rem;font-weight:700;color:var(--primary);margin-bottom:10px;">${formatCurrency(p.price)}</p>
      <p style="margin-bottom:10px;line-height:1.6;">${p.description || 'No description available'}</p>
      <p style="margin-bottom:15px;">📦 ${p.inStock || 0} in stock</p>
      <button class="add-cart-btn" onclick="addToCart('${p.id}'); hideDetail();" ${p.inStock < 1 ? 'disabled' : ''} style="width:100%;padding:14px;font-size:1rem;">
        ${p.inStock < 1 ? 'Out of Stock' : '<i class="fas fa-cart-plus"></i> Add to Cart'}
      </button>
    `;
    document.getElementById('detailModal').style.display = 'flex';
  };

  window.addToCart = (id) => {
    const p = allProducts.find(x => x.id === id); if (!p || p.inStock < 1) return;
    const existing = cart.find(i => i.id === id);
    if (existing) { existing.quantity++; } else { cart.push({ id: p.id, name: p.name, price: p.price, imageUrl: p.imageUrl, quantity: 1 }); }
    saveCart(); showToast(`${p.name} added to cart!`, 'success');
  };

  // ========== CHECKOUT ==========
  window.openCheckout = () => {
    if (cart.length === 0) { showToast('Your cart is empty', 'warning'); return; }
    const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
    
    document.getElementById('checkoutContent').innerHTML = `
      <div class="form-group"><label class="form-label-required">Full Name</label><input class="form-control" id="custName" placeholder="Enter your full name"></div>
      <div class="form-group"><label class="form-label-required">Phone Number</label><input class="form-control" id="custPhone" type="tel" placeholder="08012345678"></div>
      
      <div class="form-group"><label>Delivery Method</label>
        <div class="radio-group">
          <div class="radio-option"><input type="radio" name="delivery" id="delPickup" value="pickup" checked onchange="selectDelivery('pickup')"><label for="delPickup"><i class="fas fa-store"></i> Pick Up at Office</label></div>
          <div class="radio-option"><input type="radio" name="delivery" id="delWaybill" value="waybill" onchange="selectDelivery('waybill')"><label for="delWaybill"><i class="fas fa-truck"></i> Waybill Delivery</label></div>
        </div>
      </div>
      
      <div id="addressSection">
        <div class="form-group"><label>Delivery Address</label><textarea class="form-control" id="custAddress" placeholder="Enter delivery address for waybill"></textarea></div>
      </div>
      
      <div class="order-summary">
        <h4>📋 Order Summary</h4>
        ${cart.map(i => `<div class="summary-row"><span>${i.name} x${i.quantity}</span><span>${formatCurrency(i.price * i.quantity)}</span></div>`).join('')}
        <div class="summary-row total"><span>Total</span><span>${formatCurrency(total)}</span></div>
      </div>
      
      <p style="font-size:0.75rem;color:var(--gray);margin-bottom:15px;text-align:center;"><i class="fas fa-lock"></i> Your information is secure</p>
      
      <button class="whatsapp-btn" onclick="proceedToWhatsApp()"><i class="fab fa-whatsapp"></i> Pay via WhatsApp</button>
      <button class="checkout-btn" onclick="confirmOrder()" style="margin-top:10px;background:var(--dark);"><i class="fas fa-check-circle"></i> I've Made Payment</button>
    `;
    
    document.getElementById('checkoutModal').style.display = 'flex';
  };

  window.selectDelivery = (method) => {
    selectedDelivery = method;
    document.getElementById('addressSection').style.display = method === 'waybill' ? 'block' : 'none';
  };

  window.proceedToWhatsApp = () => {
    const name = document.getElementById('custName')?.value?.trim() || 'Customer';
    const phone = document.getElementById('custPhone')?.value?.trim() || '';
    const address = selectedDelivery === 'waybill' ? (document.getElementById('custAddress')?.value?.trim() || 'Not specified') : 'Pick Up at Office';
    const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
    const itemsList = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
    const deliveryText = selectedDelivery === 'pickup' ? 'Pick Up at Office' : `Waybill to: ${address}`;
    
    const message = `Hello OmoCreations,%0A%0AI want to place an order:%0A${itemsList}%0A%0ATotal: ₦${total.toLocaleString()}%0A%0AName: ${name}%0APhone: ${phone}%0ADelivery: ${deliveryText}`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
  };

  window.confirmOrder = async () => {
    const name = document.getElementById('custName')?.value?.trim();
    const phone = document.getElementById('custPhone')?.value?.trim();
    if (!name || !phone) { showToast('Please enter your name and phone number', 'warning'); return; }
    
    const address = selectedDelivery === 'waybill' ? (document.getElementById('custAddress')?.value?.trim() || 'Pick Up') : 'Pick Up at Office';
    const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
    
    try {
      await addDoc(collection(db, 'orders'), {
        customerName: name, customerPhone: phone, shippingAddress: address,
        deliveryMethod: selectedDelivery,
        items: cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.price })),
        totalAmount: total, status: 'pending', paymentMethod: 'whatsapp',
        createdAt: serverTimestamp()
      });
      
      cart = []; saveCart(); hideCheckout();
      showToast('✅ Order placed successfully! We will contact you shortly.', 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  };

  // ========== CATEGORY BUTTONS ==========
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentCategory = this.dataset.cat;
      renderProducts();
    });
  });

  document.getElementById('searchInput').addEventListener('input', renderProducts);

  // ========== LOAD PRODUCTS FROM FIRESTORE ==========
  function loadProducts() {
    // Load ALL catalog products - filter published in JavaScript (avoids index requirements)
    onSnapshot(collection(db, 'catalog'), (snap) => {
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`Loaded ${allProducts.length} products from catalog`);
      renderProducts();
    }, (error) => {
      console.error('Error loading products:', error);
      document.getElementById('productGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Unable to load products</p><p style="font-size:0.8rem;">Please try again later</p></div>';
    });
  }

  loadProducts();
  updateCartUI();
  
  console.log('🛍️ OmoCreations Shop Ready');
</script>
</body>
</html>
